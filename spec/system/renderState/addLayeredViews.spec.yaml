              tween:
                y:
                  initialValue: 20
                  keyframes:
                    - duration: 300
                      value: 0
    variables: {}
    autoMode: false
    skipMode: false
    screen:
      width: 1920
      height: 1080
    layeredViews:
      - resourceId: animatedLayout
        resourceType: layout
