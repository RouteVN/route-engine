case: add transitions from layout to animations
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - resources:
      layouts:
        animatedLayout:
          elements:
            - type: "text"
              content: "Animated"
          transitions:
            - id: "animated-layout-fade-in"
              type: "live"
              tween:
                alpha:
                  initialValue: 0
                  keyframes:
                    - duration: 500
                      value: 1
            - id: "animated-layout-slide-up"
