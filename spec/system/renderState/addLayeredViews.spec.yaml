---
case: normalize legacy keyframes transitions for layered views
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - resources:
      layouts:
        creditsLayout:
          elements:
            - id: "credits-body"
              type: "container"
              children: []
          transitions:
            - id: "credits-scroll"
              type: "keyframes"
              event: "add"
              elementId: "credits-body"
              properties:
                y:
                  relative: true
                  keyframes:
                    - duration: 20000
                      value: -1600
                      easing: "linear"
    variables: {}
    autoMode: false
    skipMode: false
    screen:
      width: 1920
      height: 1080
    layeredViews:
      - resourceId: creditsLayout
        resourceType: layout
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children: []
    - id: "layeredView-0"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "layeredView-0-blocker"
          type: "rect"
          fill: "transparent"
          width: 1920
          height: 1080
          x: 0
          y: 0
          click:
            actionPayload:
              actions: {}
        - id: "credits-body"
          type: "container"
          children: []
  animations:
    - id: "credits-scroll"
      type: "live"
      targetId: "credits-body"
      tween:
        y:
          keyframes:
            - duration: 20000
              value: -1600
              easing: "linear"
              relative: true
