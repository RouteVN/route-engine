      - id: "story"
        type: "container"
        x: 0
        y: 0
        children:
          - id: "existingChild"
            type: "text"
            content: "Hello"
    animations:
      - id: "existingTransition"
        type: "existing"
  - presentationState:
      background:
        resourceId: "bg2"
        animations:
          in:
            resourceId: "slideIn"
    resources:
      images:
        bg2:
          fileId: "background.jpg"
          width: 1920
          height: 1080
      animations:
