---
suite: addBackgroundOrCg
exportName: addBackgroundOrCg
---
case: add background image to story container
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState:
      background:
        resourceId: "bg1"
    resources:
      images:
        bg1:
          fileId: "image1.png"
          width: 1920
          height: 1080
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "bg-cg-background-sprite"
          type: "sprite"
          alpha: 1
          anchorX: 0.5
          anchorY: 0.5
          rotation: 0
          scaleX: 1
          scaleY: 1
          x: 960
          y: 540
          src: "image1.png"
          width: 1920
          height: 1080
  animations: []
