file: "../../../src/stores/constructRenderState.js"
group: constructRenderState.addLayout
suites: [addLayout]
---
suite: addLayout
exportName: addLayout
---
case: no presentationState.layout - return unchanged state
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState: {}
    resources: {}
    variables: {}
    autoMode: false
    skipMode: false
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children: []
  animations: []
---
case: story container does not exist - return unchanged state
in:
  - elements:
      - id: "notStory"
        type: "container"
        children: []
    animations: []
  - presentationState:
      layout:
        resourceId: "testLayout"
    resources:
      layouts:
        testLayout:
          elements:
            - type: "text"
              content: "Test"
    variables: {}
    autoMode: false
    skipMode: false
out:
  elements:
    - id: "notStory"
      type: "container"
      children: []
  animations: []
---
case: resolves textStyleId in layout elements
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState:
      layout:
        resourceId: "styledLayout"
    resources:
      layouts:
        styledLayout:
          elements:
            - id: "layout-text"
              type: "text"
              content: "Styled"
              textStyleId: "body"
              click:
                textStyleId: "active"
      textStyles:
        body:
          fontId: "fontMain"
          colorId: "fg"
          fontSize: 22
          fontWeight: "400"
          fontStyle: "normal"
          lineHeight: 1
        active:
          fontId: "fontMain"
          colorId: "activeColor"
          fontSize: 22
          fontWeight: "400"
          fontStyle: "normal"
          lineHeight: 1
      fonts:
        fontMain:
          fileId: "Arial"
      colors:
        fg:
          hex: "#FFFFFF"
        activeColor:
          hex: "#FF0000"
    variables: {}
    autoMode: false
    skipMode: false
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "layout-styledLayout"
          type: "container"
          x: 0
          y: 0
          children:
            - id: "layout-text"
              type: "text"
              content: "Styled"
              textStyle:
                fontFamily: "Arial"
                fontSize: 22
                fontWeight: "400"
                fontStyle: "normal"
                lineHeight: 1
                fill: "#FFFFFF"
              click:
                textStyle:
                  fontFamily: "Arial"
                  fontSize: 22
                  fontWeight: "400"
                  fontStyle: "normal"
                  lineHeight: 1
                  fill: "#FF0000"
  animations: []
---
case: resolves colorAlpha and strokeAlpha in layout text elements
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState:
      layout:
        resourceId: "alphaLayout"
    resources:
      layouts:
        alphaLayout:
          elements:
            - id: "layout-text"
              type: "text"
              content: "Alpha"
              textStyleId: "body"
              hover:
                textStyleId: "hovered"
      textStyles:
        body:
          fontId: "fontMain"
          colorId: "fg"
          colorAlpha: 0.8
          fontSize: 22
          fontWeight: "400"
          fontStyle: "normal"
          lineHeight: 1
          strokeColorId: "outline"
          strokeAlpha: 0.3
          strokeWidth: 2
        hovered:
          fontId: "fontMain"
          colorId: "hoverColor"
          colorAlpha: 0.5
          fontSize: 22
          fontWeight: "500"
          fontStyle: "normal"
          lineHeight: 1
      fonts:
        fontMain:
          fileId: "Arial"
      colors:
        fg:
          hex: "#FFFFFF"
        outline:
          hex: "#000000"
        hoverColor:
          hex: "#FFFF00"
    variables: {}
    autoMode: false
    skipMode: false
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "layout-alphaLayout"
          type: "container"
          x: 0
          y: 0
          children:
            - id: "layout-text"
              type: "text"
              content: "Alpha"
              textStyle:
                fontFamily: "Arial"
                fontSize: 22
                fontWeight: "400"
                fontStyle: "normal"
                lineHeight: 1
                fill: "rgba(255, 255, 255, 0.8)"
                strokeColor: "rgba(0, 0, 0, 0.3)"
                strokeWidth: 2
              hover:
                textStyle:
                  fontFamily: "Arial"
                  fontSize: 22
                  fontWeight: "500"
                  fontStyle: "normal"
                  lineHeight: 1
                  fill: "rgba(255, 255, 0, 0.5)"
  animations: []
---
case: resolves colorId in layout rect elements
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState:
      layout:
        resourceId: "colorLayout"
    resources:
      layouts:
        colorLayout:
          elements:
            - id: "layout-panel"
              type: "rect"
              width: 300
              height: 120
              colorId:
                $if autoMode: "activeColor"
                $else: "idleColor"
              hover:
                colorId: "hoverColor"
              click:
                colorId: "clickColor"
                actionPayload:
                  actions: {}
      colors:
        idleColor:
          hex: "#101010"
        activeColor:
          hex: "#202020"
        hoverColor:
          hex: "#303030"
        clickColor:
          hex: "#404040"
    variables: {}
    autoMode: true
    skipMode: false
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "layout-colorLayout"
          type: "container"
          x: 0
          y: 0
          children:
            - id: "layout-panel"
              type: "rect"
              width: 300
              height: 120
              fill: "#202020"
              hover:
                fill: "#303030"
              click:
                fill: "#404040"
                actionPayload:
                  actions: {}
  animations: []
---
case: resolves imageId in layout elements
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState:
      layout:
        resourceId: "imageLayout"
    resources:
      layouts:
        imageLayout:
          elements:
            - id: "layout-image"
              type: "sprite"
              imageId: "normal"
              hoverImageId: "hover"
              clickImageId: "active"
              x: 40
              y: 50
      images:
        normal:
          fileId: "button.png"
          width: 320
          height: 180
        hover:
          fileId: "button-hover.png"
          width: 320
          height: 180
        active:
          fileId: "button-active.png"
          width: 320
          height: 180
    variables: {}
    autoMode: false
    skipMode: false
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "layout-imageLayout"
          type: "container"
          x: 0
          y: 0
          children:
            - id: "layout-image"
              type: "sprite"
              x: 40
              y: 50
              width: 320
              height: 180
              src: "button.png"
              hover:
                src: "button-hover.png"
              click:
                src: "button-active.png"
  animations: []
---
