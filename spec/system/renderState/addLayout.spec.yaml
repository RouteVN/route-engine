---
case: inline textStyle in layout elements throws clear error
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState:
      layout:
        resourceId: "invalidLayout"
    resources:
      layouts:
        invalidLayout:
          elements:
            - id: "layout-text"
              type: "text"
              content: "Styled"
              textStyle:
                fontSize: 22
                fill: "#FFFFFF"
    variables: {}
    autoMode: false
    skipMode: false
throws: 'Inline textStyle is not allowed in layout elements at "children[0]". Use textStyleId instead'
