---
case: add transitions from layout to animations
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - resources:
      layouts:
        animatedLayout:
          elements:
            - type: "text"
              content: "Animated"
          transitions:
            - id: "animated-layout-fade-in"
              type: "update"
              tween:
                alpha:
                  initialValue: 0
                  keyframes:
                    - duration: 500
                      value: 1
            - id: "animated-layout-slide-up"
              type: "update"
              tween:
                y:
                  initialValue: 20
                  keyframes:
                    - duration: 300
                      value: 0
    variables: {}
    autoMode: false
    skipMode: false
    screen:
      width: 1920
      height: 1080
    overlayStack:
      - resourceId: animatedLayout
        resourceType: layout
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children: []
    - id: "overlayStack-0"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "overlayStack-0-blocker"
          type: "rect"
