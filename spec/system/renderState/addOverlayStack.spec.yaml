---
suite: addOverlayStack
exportName: addOverlayStack
---
case: return unchanged state when overlayStack array is empty
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - resources: {}
    variables: {}
    autoMode: false
    skipMode: false
    overlayStack: []
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children: []
  animations: []
