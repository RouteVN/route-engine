file: "../../../src/stores/constructRenderState.js"
group: constructRenderState.addCharacters
suites: [addCharacters]
---
suite: addCharacters
exportName: addCharacters
---
case: add character container with sprites to story container
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState:
      character:
        items:
          - id: "char1"
            transformId: "transform1"
            sprites:
              - id: "body"
                resourceId: "body"
              - id: "face"
                resourceId: "face"
    resources:
      transforms:
        transform1:
          x: 100
          y: 200
          anchorX: 0.5
          anchorY: 0.5
          rotation: 0
          scaleX: 1
          scaleY: 1
      images:
        body:
          fileId: "body.png"
          width: 200
          height: 200
        face:
          fileId: "face.png"
          width: 200
          height: 200
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - type: "container"
          id: "character-container-char1"
          x: 100
          y: 200
          anchorX: 0.5
          anchorY: 0.5
          rotation: 0
          scaleX: 1
          scaleY: 1
          children:
            - type: "sprite"
              id: "character-container-char1-body"
              src: "body.png"
              width: 200
              height: 200
              x: 0
              y: 0
            - type: "sprite"
              id: "character-container-char1-face"
              src: "face.png"
              width: 200
              height: 200
              x: 0
              y: 0
  animations: []
---
case: add character with single transition animation reference
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState:
      character:
        items:
          - id: "char1"
            transformId: "transform1"
            sprites:
              - id: "body"
                resourceId: "body"
            animations:
              resourceId: "fadeIn"
    resources:
      transforms:
        transform1:
          x: 50
          y: 100
          anchorX: 0
          anchorY: 0
          rotation: 0
          scaleX: 1
          scaleY: 1
      images:
        body:
          fileId: "body.png"
          width: 200
          height: 200
      animations:
        fadeIn:
          type: transition
          next:
            tween:
              alpha:
                initialValue: 0
                keyframes:
                  - duration: 500
                    value: 1
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - type: "container"
          id: "character-container-char1"
          x: 50
          y: 100
          anchorX: 0
          anchorY: 0
          rotation: 0
          scaleX: 1
          scaleY: 1
          children:
            - type: "sprite"
              id: "character-container-char1-body"
              src: "body.png"
              width: 200
              height: 200
              x: 0
              y: 0
  animations:
    - id: "character-animation-in"
      type: "transition"
      targetId: "character-container-char1"
      next:
        tween:
          alpha:
            initialValue: 0
            keyframes:
              - duration: 500
                value: 1
