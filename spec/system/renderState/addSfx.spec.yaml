file: "../../../src/stores/constructRenderState.js"
group: constructRenderState.addSfx
suites: [addSfx]
---
suite: addSfx
exportName: addSfx
---
case: add sfx audio to story container
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
    audio: []
  - presentationState:
      sfx:
        items:
          - id: "sfx1"
            resourceId: "soundEffect"
    resources:
      sounds:
        soundEffect:
          fileId: "effect.mp3"
          loop: false
          volume: 70
          startDelayMs: 0
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children: []
  animations: []
  audio:
    - id: "sfx:0:soundEffect"
      type: "sound"
      src: "effect.mp3"
      loop: false
      volume: 35
      startDelayMs: 0
