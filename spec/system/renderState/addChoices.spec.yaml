file: "../../../src/stores/constructRenderState.js"
group: constructRenderState.addChoices
suites: [addChoices]
---
suite: addChoices
exportName: addChoices
---
case: add choice elements to story container
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState:
      choice:
        resourceId: "choiceLayout"
        items:
          - id: "choice1"
            text: "Option 1"
          - id: "choice2"
            text: "Option 2"
    resources:
      layouts:
        choiceLayout:
          elements:
            - type: "button"
              id: "choice-button"
              text: "Select an option"
    screen:
      width: 1920
      height: 1080
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "choice-blocker"
          type: "rect"
          fill: "transparent"
          width: 1920
          height: 1080
          x: 0
          y: 0
          click:
            payload:
              actions: {}
        - type: "button"
          id: "choice-button"
          text: "Select an option"
  animations: []
---
case: tags nextLine actions from choice buttons and exposes choice visibility template data
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState:
      choice:
        resourceId: "choiceLayout"
        items:
          - id: "choice1"
            text: "Option 1"
    resources:
      layouts:
        choiceLayout:
          elements:
            - id: "choice-copy"
              type: "text"
              content:
                $if isChoiceVisible: "Choice shown"
                $else: "Choice hidden"
            - id: "choice-button"
              type: "button"
              text: "Continue"
              click:
                payload:
                  actions:
                    nextLine: {}
    screen:
      width: 1920
      height: 1080
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "choice-blocker"
          type: "rect"
          fill: "transparent"
          width: 1920
          height: 1080
          x: 0
          y: 0
          click:
            payload:
              actions: {}
        - id: "choice-copy"
          type: "text"
          content: "Choice shown"
        - id: "choice-button"
          type: "button"
          text: "Continue"
          click:
            payload:
              _interactionSource: "choice"
              actions:
                nextLine: {}
  animations: []
---
case: tags non-nextLine choice clicks at the payload level
in:
