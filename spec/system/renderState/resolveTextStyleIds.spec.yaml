---
case: colorAlpha must be a number between 0 and 1
in:
  - type: "text"
    content: "Hello"
    textStyleId: "body"
  - textStyles:
      body:
        fontId: "fontMain"
        colorId: "fg"
        colorAlpha: 1.5
        fontSize: 24
        fontWeight: "400"
        fontStyle: "normal"
        lineHeight: 1
    fonts:
      fontMain:
        fileId: "Arial"
    colors:
      fg:
        hex: "#FFFFFF"
throws: 'colorAlpha for text style "body" must be a number between 0 and 1'
---
case: strokeAlpha requires strokeColorId
in:
  - type: "text"
    content: "Hello"
    textStyleId: "body"
  - textStyles:
      body:
        fontId: "fontMain"
        colorId: "fg"
        fontSize: 24
        fontWeight: "400"
        fontStyle: "normal"
        lineHeight: 1
        strokeAlpha: 0.5
    fonts:
      fontMain:
        fileId: "Arial"
    colors:
      fg:
        hex: "#FFFFFF"
throws: 'strokeAlpha for text style "body" requires strokeColorId'
---
case: colorAlpha requires the referenced color to be hex
in:
  - type: "text"
    content: "Hello"
    textStyleId: "body"
  - textStyles:
      body:
        fontId: "fontMain"
        colorId: "fg"
        colorAlpha: 0.5
        fontSize: 24
        fontWeight: "400"
        fontStyle: "normal"
        lineHeight: 1
    fonts:
      fontMain:
        fileId: "Arial"
    colors:
      fg:
        hex: "white"
throws: 'Color "fg" for text style "body" must resolve to a hex color'
