file: "../../../src/stores/constructRenderState.js"
group: constructRenderState.resolveTextStyleIds
suites: [resolveTextStyleIds]
---
suite: resolveTextStyleIds
exportName: resolveTextStyleIds
---
case: resolves textStyleId into inline textStyle
in:
  - type: "text"
    content: "Hello"
    textStyleId: "body"
  - textStyles:
      body:
        fontId: "fontMain"
        colorId: "fg"
        fontSize: 24
        fontWeight: "400"
        fontStyle: "normal"
        lineHeight: 1.2
        strokeColorId: "outline"
        strokeWidth: 2
    fonts:
      fontMain:
        fileId: "Arial"
    colors:
      fg:
        hex: "#FFFFFF"
      outline:
        hex: "#000000"
out:
  type: "text"
  content: "Hello"
  textStyle:
    fontFamily: "Arial"
    fontSize: 24
    fontWeight: "400"
    fontStyle: "normal"
    lineHeight: 1.2
    fill: "#FFFFFF"
    strokeColor: "#000000"
    strokeWidth: 2
---
case: resolves nested interaction textStyleIds and extended text style fields
in:
  - id: "container"
    type: "container"
    children:
      - id: "title"
        type: "text"
        content: "Start"
        textStyleId: "title"
        hover:
          textStyleId: "titleHover"
        click:
          textStyleId: "titleClick"
        rightClick:
          textStyleId: "titleRightClick"
  - textStyles:
      title:
        fontId: "fontMain"
        colorId: "fg"
        fontSize: 48
        fontWeight: "bold"
        fontStyle: "normal"
        lineHeight: 1
        align: "center"
        wordWrap: true
        breakWords: true
        wordWrapWidth: 600
      titleHover:
        fontId: "fontMain"
        colorId: "hover"
        fontSize: 48
        fontWeight: "500"
        fontStyle: "normal"
        lineHeight: 1
      titleClick:
        fontId: "fontMain"
        colorId: "active"
        fontSize: 48
        fontWeight: "400"
        fontStyle: "normal"
        lineHeight: 1
      titleRightClick:
        fontId: "fontMain"
        colorId: "muted"
        fontSize: 48
        fontWeight: "400"
        fontStyle: "italic"
        lineHeight: 1
    fonts:
      fontMain:
        fileId: "Arial"
    colors:
      fg:
        hex: "#FFFFFF"
      hover:
        hex: "#FFFF00"
      active:
        hex: "#FF0000"
      muted:
        hex: "#999999"
out:
  id: "container"
  type: "container"
  children:
    - id: "title"
      type: "text"
      content: "Start"
      textStyle:
        fontFamily: "Arial"
        fontSize: 48
        fontWeight: "bold"
        fontStyle: "normal"
        lineHeight: 1
        fill: "#FFFFFF"
        align: "center"
        wordWrap: true
        breakWords: true
        wordWrapWidth: 600
      hover:
        textStyle:
          fontFamily: "Arial"
          fontSize: 48
          fontWeight: "500"
          fontStyle: "normal"
          lineHeight: 1
          fill: "#FFFF00"
      click:
        textStyle:
          fontFamily: "Arial"
          fontSize: 48
          fontWeight: "400"
          fontStyle: "normal"
          lineHeight: 1
          fill: "#FF0000"
      rightClick:
        textStyle:
          fontFamily: "Arial"
          fontSize: 48
          fontWeight: "400"
          fontStyle: "italic"
          lineHeight: 1
          fill: "#999999"
---
case: resolves colorAlpha and strokeAlpha into renderer color strings
in:
  - type: "text"
    content: "Hello"
    textStyleId: "body"
  - textStyles:
      body:
        fontId: "fontMain"
        colorId: "fg"
        colorAlpha: 0.5
        fontSize: 24
        fontWeight: "400"
        fontStyle: "normal"
        lineHeight: 1.2
        strokeColorId: "outline"
        strokeAlpha: 0.25
        strokeWidth: 2
    fonts:
      fontMain:
        fileId: "Arial"
    colors:
      fg:
        hex: "#FFFFFF"
      outline:
        hex: "#000000"
out:
  type: "text"
  content: "Hello"
  textStyle:
    fontFamily: "Arial"
    fontSize: 24
    fontWeight: "400"
    fontStyle: "normal"
    lineHeight: 1.2
    fill: "rgba(255, 255, 255, 0.5)"
    strokeColor: "rgba(0, 0, 0, 0.25)"
    strokeWidth: 2
---
