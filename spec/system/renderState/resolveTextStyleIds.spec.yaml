---
case: leaves nodes without textStyleId unchanged
in:
  - type: "text"
    content: "Hello"
  - {}
out:
  type: "text"
  content: "Hello"
---
case: inline textStyle throws clear error
in:
  - type: "text"
    content: "Hello"
    textStyle:
      fontSize: 20
      fill: "#FFFFFF"
  - {}
throws: 'Inline textStyle is not allowed in layout elements at "root". Use textStyleId instead'
---
case: nested inline interaction textStyle throws clear error
in:
  - type: "text"
    content: "Hello"
    textStyleId: "body"
    hover:
      textStyle:
        fill: "#FFFFFF"
  - textStyles:
      body:
        fontId: "fontMain"
        colorId: "fg"
        fontSize: 24
        fontWeight: "400"
        fontStyle: "normal"
        lineHeight: 1
    fonts:
      fontMain:
        fileId: "Arial"
    colors:
      fg:
        hex: "#FFFFFF"
throws: 'Inline textStyle is not allowed in layout elements at "hover". Use textStyleId instead'
---
case: missing textStyle resource throws clear error
in:
  - type: "text"
    content: "Hello"
    textStyleId: "missing"
  - textStyles: {}
throws: 'Text style "missing" not found'
---
case: textStyleId must resolve to a non-empty string
in:
  - type: "text"
    content: "Hello"
    textStyleId: 123
  - textStyles: {}
throws: 'textStyleId at "root" must resolve to a non-empty string'
---
case: does not fallback to legacy typography resources
in:
  - type: "text"
    content: "Hello"
    textStyleId: "body"
  - typography:
      body:
        fontId: "fontMain"
        colorId: "fg"
        fontSize: 24
        fontWeight: "400"
        fontStyle: "normal"
        lineHeight: 1
    fonts:
      fontMain:
        fileId: "Arial"
    colors:
      fg:
        hex: "#FFFFFF"
throws: 'Text style "body" not found'
---
case: does not fallback to singular textStyle resources
in:
  - type: "text"
    content: "Hello"
    textStyleId: "body"
  - textStyle:
      body:
        fontId: "fontMain"
        colorId: "fg"
