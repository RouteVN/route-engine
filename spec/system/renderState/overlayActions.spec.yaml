file: "../../../src/stores/system.store.js"
group: systemStore.overlayActions
suites: [pushOverlay, popOverlay, replaceLastOverlay, clearOverlays]
---
suite: pushOverlay
exportName: pushOverlay
---
case: push an overlay to an empty stack
in:
  - state:
      global:
        overlayStack: []
        pendingEffects: []
  - resourceId: layout1
    resourceType: layout
out:
  global:
    overlayStack:
      - resourceId: layout1
        resourceType: layout
    pendingEffects:
      - name: render
---
suite: popOverlay
exportName: popOverlay
---
case: pop last overlay from array
in:
  - state:
      global:
        overlayStack:
          - resourceId: layout1
            resourceType: layout
          - resourceId: layout2
            resourceType: layout
        pendingEffects: []
out:
  global:
    overlayStack:
      - resourceId: layout1
        resourceType: layout
    pendingEffects:
      - name: render
---
suite: replaceLastOverlay
exportName: replaceLastOverlay
---
case: replace last overlay in array
in:
  - state:
      global:
        overlayStack:
          - resourceId: layout1
            resourceType: layout
          - resourceId: layout2
            resourceType: layout
        pendingEffects: []
  - resourceId: layout3
    resourceType: layout
out:
  global:
    overlayStack:
      - resourceId: layout1
        resourceType: layout
      - resourceId: layout3
        resourceType: layout
    pendingEffects:
      - name: render
---
suite: clearOverlays
exportName: clearOverlays
---
case: clear all overlays
in:
  - state:
      global:
        confirmDialog:
          resourceId: saveOverwriteConfirmLayout
          confirmActions:
            saveSlot:
              slotId: 1
            hideConfirmDialog: {}
          cancelActions:
            hideConfirmDialog: {}
        overlayStack:
          - resourceId: layout1
            resourceType: layout
          - resourceId: layout2
            resourceType: layout
        pendingEffects: []
out:
  global:
    confirmDialog: null
    overlayStack: []
    pendingEffects:
      - name: render
