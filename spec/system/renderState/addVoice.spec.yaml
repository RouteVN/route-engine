file: "../../../src/stores/constructRenderState.js"
group: constructRenderState.addVoice
suites: [addVoice]
---
suite: addVoice
exportName: addVoice
---
case: add voice audio from current scene resources
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
    audio: []
  - presentationState:
      voice:
        resourceId: "alice_001"
        volume: 80
        loop: false
    resources:
      voices:
        scene_intro:
          alice_001:
            fileId: "voices/scene_intro/alice_001.ogg"
    currentSceneId: "scene_intro"
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children: []
  animations: []
  audio:
    - id: "channel:voice"
      type: "audio-channel"
      volume: 80
      muted: false
      pan: 0
      children:
        - id: "voice:scene_intro:default"
          type: "sound"
          src: "voices/scene_intro/alice_001.ogg"
          volume: 100
          loop: false
          startDelayMs: 0
