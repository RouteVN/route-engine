---
case: add visual sprite with transform to story container
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
    audio: []
  - presentationState:
      visual:
        items:
          - id: "visual1"
            resourceId: "image1"
            transformId: "transform1"
    resources:
      images:
        image1:
          fileId: "visual.png"
      transforms:
        transform1:
          x: 100
          y: 200
          anchorX: 0.5
          anchorY: 0.5
          rotation: 45
          scaleX: 1.5
          scaleY: 1.5
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "visual-visual1"
          type: "sprite"
          src: "visual.png"
          x: 100
          y: 200
          anchorX: 0.5
          anchorY: 0.5
          rotation: 45
          scaleX: 1.5
          scaleY: 1.5
  animations: []
  audio: []
