          y: 100
          anchorX: 0
          anchorY: 0
          rotation: 0
          scaleX: 1
          scaleY: 1
  animations:
    - id: "visual1-animation-in"
      type: "transition"
      targetId: "visual-visual1"
      next:
        tween:
          alpha:
            initialValue: 0
            keyframes:
