---
case: add visual with in animation
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
    audio: []
  - presentationState:
      visual:
        items:
          - id: "visual1"
            resourceId: "image1"
            transformId: "transform1"
            animations:
              in:
                resourceId: "fadeIn"
    resources:
      images:
        image1:
          fileId: "fade.png"
      transforms:
        transform1:
          x: 50
          y: 100
          anchorX: 0
          anchorY: 0
          rotation: 0
          scaleX: 1
          scaleY: 1
      animations:
        fadeIn:
          type: update
          tween:
            alpha:
              initialValue: 0
              keyframes:
                - duration: 500
                  value: 1
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "visual-visual1"
          type: "sprite"
          src: "fade.png"
          x: 50
          y: 100
          anchorX: 0
          anchorY: 0
          rotation: 0
          scaleX: 1
          scaleY: 1
  animations:
    - id: "visual1-animation-in"
      type: "update"
      targetId: "visual-visual1"
      tween:
        alpha:
          initialValue: 0
          keyframes:
            - duration: 500
              value: 1
  audio: []
---
case: add visual with out animation
