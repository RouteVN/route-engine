case: add visual text with transform overrides, templated content, opacity, and blur
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
    audio: []
  - presentationState:
      visual:
        items:
          - id: "title"
            text:
              content: "${variables.chapterTitle}"
              textStyleId: "title"
              width: 640
            transformId: "titleTransform"
            x: 960
            y: 140
            anchorX: 0.5
            anchorY: 0.5
            scaleX: 1.1
            scaleY: 1.1
            rotation: -3
            originX: 320
            originY: 40
            opacity: 0.9
            blur:
              x: 2
              y: 3
    resources:
      textStyles:
        title:
          fontId: "fontMain"
          colorId: "fg"
          fontSize: 42
          fontWeight: "700"
          fontStyle: "normal"
          lineHeight: 1.1
          align: "center"
      fonts:
        fontMain:
          fileId: "Arial"
      colors:
        fg:
          hex: "#FFFFFF"
      transforms:
        titleTransform:
          x: 100
          y: 200
          anchorX: 0
          anchorY: 0
          rotation: 0
          scaleX: 1
          scaleY: 1
    variables:
      chapterTitle: "Chapter 1"
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "visual-title"
          type: "text"
          content: "Chapter 1"
          width: 640
          x: 960
          y: 140
          anchorX: 0.5
          anchorY: 0.5
          rotation: -3
          scaleX: 1.1
          scaleY: 1.1
          originX: 320
          originY: 40
          alpha: 0.9
          blur:
            x: 2
            y: 3
          textStyle:
            fontFamily: "Arial"
            fontSize: 42
            fontWeight: "700"
            fontStyle: "normal"
            lineHeight: 1.1
            fill: "#FFFFFF"
            align: "center"
  animations: []
  audio: []
