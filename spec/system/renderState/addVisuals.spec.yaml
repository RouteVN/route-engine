case: add visual with single transition animation reference
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
    audio: []
  - presentationState:
      visual:
        items:
          - id: "visual1"
            resourceId: "image1"
            transformId: "transform1"
            animations:
              resourceId: "fadeIn"
    resources:
      images:
        image1:
          fileId: "fade.png"
      transforms:
        transform1:
          x: 50
          y: 100
          anchorX: 0
          anchorY: 0
          rotation: 0
          scaleX: 1
          scaleY: 1
      animations:
        fadeIn:
          type: transition
          next:
            tween:
              alpha:
                initialValue: 0
                keyframes:
                  - duration: 500
                    value: 1
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "visual-visual1"
