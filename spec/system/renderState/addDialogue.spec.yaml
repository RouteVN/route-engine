case: resolves textStyleId in dialogue ui layout elements
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState:
      dialogue:
        ui:
          resourceId: "dialogueLayout"
