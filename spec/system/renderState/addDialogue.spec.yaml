        fontMain:
          fileId: "Arial"
      colors:
        fg:
          hex: "#FFFFFF"
        hoverColor:
          hex: "#FFFF00"
    dialogueUIHidden: false
    autoMode: false
    skipMode: false
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "dialogue-text"
          type: "text"
          content: "Hello"
          textStyle:
            fontFamily: "Arial"
            fontSize: 24
            fontWeight: "400"
            fontStyle: "normal"
            lineHeight: 1
            fill: "#FFFFFF"
          hover:
            textStyle:
              fill: "#FFFF00"
              fontFamily: "Arial"
              fontSize: 24
              fontWeight: "500"
              fontStyle: "normal"
              lineHeight: 1
  animations: []
