file: "../../../src/stores/constructRenderState.js"
group: constructRenderState.addDialogue
suites: [addDialogue]
---
suite: addDialogue
exportName: addDialogue
---
case: dialogueUIHidden true - return unchanged state
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState:
      dialogue:
        ui:
          resourceId: "dialogueLayout"
        content:
          - text: "Hello world"
    resources:
      layouts:
        dialogueLayout:
          elements:
            - type: "text"
              content: "Dialogue text"
    dialogueUIHidden: true
    autoMode: false
    skipMode: false
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children: []
  animations: []
---
case: no presentationState.dialogue - return unchanged state
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState: {}
    resources: {}
    dialogueUIHidden: false
    autoMode: false
    skipMode: false
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children: []
  animations: []
---
case: nvl-template-receives-lines
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState:
      dialogue:
        mode: "nvl"
        ui:
          resourceId: "nvl-layout"
        characterId: "bob"
        content:
          - text: "Third line"
        lines:
          - content:
              - text: "First line"
            characterId: "narrator"
          - content:
              - text: "Second line"
            characterId: "alice"
          - content:
              - text: "Third line"
            characterId: "bob"
    resources:
      layouts:
        nvl-layout:
          elements:
            - id: "nvl-container"
              type: "container"
              children: []
      characters:
        narrator:
          name: "Narrator"
        alice:
          name: "Alice"
        bob:
          name: "Bob"
    dialogueUIHidden: false
    autoMode: false
    skipMode: false
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "nvl-container"
          type: "container"
          children: []
  animations: []
---
case: resolves textStyleId in dialogue ui layout elements
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState:
      dialogue:
        ui:
          resourceId: "dialogueLayout"
        content:
          - text: "Hello"
    resources:
      layouts:
        dialogueLayout:
          elements:
            - id: "dialogue-text"
              type: "text"
              content: "${dialogue.content[0].text}"
              textStyleId: "body"
              hover:
                textStyleId: "hover"
      textStyles:
        body:
          fontId: "fontMain"
          colorId: "fg"
          fontSize: 24
          fontWeight: "400"
          fontStyle: "normal"
          lineHeight: 1
        hover:
          fontId: "fontMain"
          colorId: "hoverColor"
          fontSize: 24
          fontWeight: "500"
          fontStyle: "normal"
          lineHeight: 1
      fonts:
        fontMain:
          fileId: "Arial"
      colors:
        fg:
          hex: "#FFFFFF"
        hoverColor:
          hex: "#FFFF00"
    dialogueUIHidden: false
    autoMode: false
    skipMode: false
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "dialogue-text"
          type: "text"
          content: "Hello"
          textStyle:
            fontFamily: "Arial"
            fontSize: 24
            fontWeight: "400"
            fontStyle: "normal"
            lineHeight: 1
            fill: "#FFFFFF"
          hover:
            textStyle:
              fill: "#FFFF00"
              fontFamily: "Arial"
              fontSize: 24
              fontWeight: "500"
              fontStyle: "normal"
              lineHeight: 1
  animations: []
---
case: completed line settles text-revealing dialogue elements
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState:
      dialogue:
        ui:
          resourceId: "dialogueLayout"
        content:
          - text: "Hello world"
    resources:
      layouts:
        dialogueLayout:
          elements:
            - id: "dialogue-text"
              type: "text-revealing"
              content: "${dialogue.content}"
              revealEffect: "typewriter"
      colors: {}
      fonts: {}
      textStyles: {}
    dialogueUIHidden: false
    autoMode: false
    skipMode: false
    isLineCompleted: true
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "dialogue-text"
          type: "text-revealing"
          content:
            - text: "Hello world"
          revealEffect: "none"
  animations: []
---
case: resolves colorId in dialogue ui layout elements
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState:
      dialogue:
        ui:
          resourceId: "dialogueLayout"
        content:
          - text: "Hello"
    resources:
      layouts:
        dialogueLayout:
          elements:
            - id: "dialogue-panel"
              type: "rect"
              width: 1400
              height: 300
              colorId: "panel"
              hover:
                colorId: "hoverPanel"
      colors:
        panel:
          hex: "#000000"
        hoverPanel:
          hex: "#222222"
    dialogueUIHidden: false
    autoMode: false
    skipMode: false
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "dialogue-panel"
          type: "rect"
          width: 1400
          height: 300
          fill: "#000000"
          hover:
            fill: "#222222"
  animations: []
---
case: resolves imageId in dialogue ui layout elements
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState:
      dialogue:
        ui:
          resourceId: "dialogueLayout"
        content:
          - text: "Hello"
    resources:
      layouts:
        dialogueLayout:
          elements:
            - id: "dialogue-image"
              type: "sprite"
              imageId: "dialogueFrame"
      images:
        dialogueFrame:
          fileId: "dialogue-frame.png"
          width: 1400
          height: 300
    dialogueUIHidden: false
    autoMode: false
    skipMode: false
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "dialogue-image"
          type: "sprite"
          src: "dialogue-frame.png"
          width: 1400
          height: 300
  animations: []
---
case: invalid dialogue content string should throw clear error
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState:
      dialogue:
        ui:
          resourceId: "dialogueLayout"
        content: "Hello world"
    resources:
      layouts:
        dialogueLayout:
          elements:
            - id: "dialogue-text"
              type: "text"
              content: "${dialogue.content[0].text}"
    dialogueUIHidden: false
    autoMode: false
    skipMode: false
throws: "dialogue.content must be an array of objects"
---
case: interpolates dialogue content with variables
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState:
      dialogue:
        ui:
          resourceId: "dialogueLayout"
        content:
          - text: "${variables.line1}"
    resources:
      layouts:
        dialogueLayout:
          elements:
            - id: "dialogue-text"
              type: "text"
              content: "${dialogue.content[0].text}"
    dialogueUIHidden: false
    autoMode: false
    skipMode: false
    variables:
      line1: "Localized line"
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "dialogue-text"
          type: "text"
          content: "Localized line"
  animations: []
---
case: nvl-multi-line-display
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState:
      dialogue:
        mode: "nvl"
        ui:
          resourceId: "nvl-layout"
        content:
          - text: "Narration without character"
        lines:
          - content:
              - text: "Line with character"
            characterId: "alice"
          - content:
              - text: "Narration without character"
            characterId: null
    resources:
      layouts:
        nvl-layout:
          elements:
            - id: "nvl-container"
              type: "container"
              children: []
      characters:
        alice:
          name: "Alice"
    dialogueUIHidden: false
    autoMode: false
    skipMode: false
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "nvl-container"
          type: "container"
          children: []
  animations: []
