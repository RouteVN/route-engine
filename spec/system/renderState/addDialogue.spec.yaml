        dialogueLayout:
          elements:
            - id: "dialogue-text"
              type: "text"
              content: "${dialogue.content[0].text}"
              textStyleId: "body"
              hover:
                textStyleId: "hover"
      textStyles:
        body:
          fontId: "fontMain"
          colorId: "fg"
          fontSize: 24
          fontWeight: "400"
          fontStyle: "normal"
          lineHeight: 1
        hover:
          fontId: "fontMain"
          colorId: "hoverColor"
          fontSize: 24
          fontWeight: "500"
          fontStyle: "normal"
          lineHeight: 1
