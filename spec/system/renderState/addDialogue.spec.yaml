file: "../../../src/stores/constructRenderState.js"
group: constructRenderState.addDialogue
suites: [addDialogue]
---
suite: addDialogue
exportName: addDialogue
---
case: dialogueUIHidden true - return unchanged state
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState:
      dialogue:
        ui:
          resourceId: "dialogueLayout"
        content:
          - text: "Hello world"
    resources:
      layouts:
        dialogueLayout:
          elements:
            - type: "text"
              content: "Dialogue text"
    dialogueUIHidden: true
    autoMode: false
    skipMode: false
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children: []
  animations: []
---
case: no presentationState.dialogue - return unchanged state
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState: {}
    resources: {}
    dialogueUIHidden: false
    autoMode: false
    skipMode: false
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children: []
  animations: []
---
case: character override name replaces character resource name
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState:
      dialogue:
        ui:
          resourceId: "dialogueLayout"
        characterId: "alice"
        character:
          name: "Alias"
        content:
          - text: "Hello world"
    resources:
      layouts:
        dialogueLayout:
          elements:
            - id: "dialogue-name"
              type: "text"
              content: "${dialogue.character.name}"
            - id: "dialogue-id"
              type: "text"
              content: "${dialogue.characterId}"
            - id: "dialogue-text"
              type: "text"
              content: "${dialogue.content[0].text}"
      characters:
        alice:
          name: "Alice"
    dialogueUIHidden: false
    autoMode: false
    skipMode: false
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "dialogue-name"
          type: "text"
          content: "Alias"
        - id: "dialogue-id"
          type: "text"
          content: "alice"
        - id: "dialogue-text"
          type: "text"
          content: "Hello world"
  animations: []
---
case: dialogue character sprite renders layered image group above dialogue ui
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState:
      dialogue:
        ui:
          resourceId: "dialogueLayout"
        characterId: "alice"
        character:
          name: "Alias"
          sprite:
            transformId: "dialoguePortraitLeft"
            items:
              - id: "base"
                resourceId: "aliceBody"
              - id: "face"
                resourceId: "aliceSmile"
            animations:
              resourceId: "portraitIn"
        content:
          - text: "Hello world"
    previousPresentationState: {}
    resources:
      transforms:
        dialoguePortraitLeft:
          x: 240
          y: 900
          anchorX: 0.5
          anchorY: 1
          rotation: 0
          scaleX: 1
          scaleY: 1
      images:
        aliceBody:
          fileId: "alice-body.png"
          width: 320
          height: 640
        aliceSmile:
          fileId: "alice-smile.png"
          width: 320
          height: 640
      layouts:
        dialogueLayout:
          elements:
            - id: "dialogue-name"
              type: "text"
              content: "${dialogue.character.name}"
            - id: "dialogue-sprite-resource"
              type: "text"
              content: "${dialogue.character.sprite.items[1].resourceId}"
            - id: "dialogue-text"
              type: "text"
              content: "${dialogue.content[0].text}"
      animations:
        portraitIn:
          type: transition
          next:
            tween:
              alpha:
                initialValue: 0
                keyframes:
                  - duration: 500
                    value: 1
    dialogueUIHidden: false
    autoMode: false
    skipMode: false
    isLineCompleted: false
    skipTransitionsAndAnimations: false
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "dialogue-name"
          type: "text"
          content: "Alias"
        - id: "dialogue-sprite-resource"
          type: "text"
          content: "aliceSmile"
        - id: "dialogue-text"
          type: "text"
          content: "Hello world"
        - type: "container"
          id: "dialogue-character-sprite"
          x: 240
          y: 900
          anchorX: 0.5
          anchorY: 1
          rotation: 0
          scaleX: 1
          scaleY: 1
          children:
            - type: "sprite"
              id: "dialogue-character-sprite-base"
              src: "alice-body.png"
              width: 320
              height: 640
              x: 0
              y: 0
            - type: "sprite"
              id: "dialogue-character-sprite-face"
              src: "alice-smile.png"
              width: 320
              height: 640
              x: 0
              y: 0
  animations:
    - id: "dialogue-character-sprite-animation-in"
      type: "transition"
      targetId: "dialogue-character-sprite"
      next:
        tween:
          alpha:
            initialValue: 0
            keyframes:
              - duration: 500
                value: 1
---
case: dialogue character sprite supports animation-only removal
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState:
      dialogue:
        character:
          sprite:
            animations:
              resourceId: "portraitOut"
        content:
          - text: "Goodbye"
    previousPresentationState:
      dialogue:
        character:
          sprite:
            transformId: "dialoguePortraitLeft"
            items:
              - id: "base"
                resourceId: "aliceBody"
    resources:
      animations:
        portraitOut:
          type: transition
          prev:
            tween:
              alpha:
                keyframes:
                  - duration: 500
                    value: 0
    dialogueUIHidden: false
    autoMode: false
    skipMode: false
    isLineCompleted: false
    skipTransitionsAndAnimations: false
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children: []
  animations:
    - id: "dialogue-character-sprite-animation-out"
      type: "transition"
      targetId: "dialogue-character-sprite"
      prev:
        tween:
          alpha:
            keyframes:
              - duration: 500
                value: 0
---
case: persisted adv shell keeps dialogue template data for dialogue ui
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState:
      dialogue:
        mode: "adv"
        ui:
          resourceId: "dialogueLayout"
        characterId: "alice"
        persistCharacter: true
    resources:
      layouts:
        dialogueLayout:
          elements:
            - id: "dialogue-name"
              type: "text"
              content: "${dialogue.character.name}"
            - id: "dialogue-text"
              type: "text-revealing"
              content: "${dialogue.content}"
              revealEffect: "typewriter"
      characters:
        alice:
          name: "Alice"
    dialogueUIHidden: false
    autoMode: false
    skipMode: false
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "dialogue-name"
          type: "text"
          content: "Alice"
        - id: "dialogue-text"
          type: "text-revealing"
          content:
            - text: ""
          revealEffect: "typewriter"
  animations: []
---
case: nvl-template-receives-lines
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
  - presentationState:
      dialogue:
        mode: "nvl"
        ui:
          resourceId: "nvl-layout"
        characterId: "bob"
        content:
          - text: "Third line"
        lines:
          - content:
              - text: "First line"
            characterId: "narrator"
          - content:
              - text: "Second line"
            characterId: "alice"
          - content:
              - text: "Third line"
            characterId: "bob"
    resources:
      layouts:
        nvl-layout:
          elements:
            - id: "nvl-container"
              type: "container"
              children:
                - $for line, i in dialogueLines:
                    - id: "line-${i}"
                      type: "container"
                      children:
                        - $if line.characterName:
                            - id: "name-${i}"
                              type: "text"
                              content: "${line.characterName}"
                        - id: "text-${i}"
                          type: "text"
                          content: "${line.content[0].text}"
      characters:
        narrator:
          name: "Narrator"
        alice:
          name: "Alice"
        bob:
          name: "Bob"
    dialogueUIHidden: false
    autoMode: false
    skipMode: false
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "nvl-container"
          type: "container"
          children:
            - id: "line-0"
              type: "container"
              children:
                - id: "name-0"
                  type: "text"
                  content: "Narrator"
                - id: "text-0"
                  type: "text"
                  content: "First line"
            - id: "line-1"
              type: "container"
              children:
                - id: "name-1"
                  type: "text"
                  content: "Alice"
                - id: "text-1"
                  type: "text"
                  content: "Second line"
            - id: "line-2"
              type: "container"
              children:
                - id: "name-2"
                  type: "text"
                  content: "Bob"
                - id: "text-2"
                  type: "text"
                  content: "Third line"
  animations: []
