file: "../../../src/stores/constructRenderState.js"
group: constructRenderState.addBgm
suites: [addBgm]
---
suite: addBgm
exportName: addBgm
---
case: add bgm audio to story container
in:
  - elements:
      - id: "story"
        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
    audio: []
  - presentationState:
      bgm:
        resourceId: "backgroundMusic"
        loop: true
        startDelayMs: 0
    resources:
      sounds:
        backgroundMusic:
          fileId: "bgm.mp3"
    runtime:
      musicVolume: 70
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children: []
  animations: []
  audio:
    - id: "channel:bgm"
      type: "audio-channel"
      volume: 70
      muted: false
      pan: 0
      children:
        - id: "bgm:default"
          type: "sound"
          src: "bgm.mp3"
          loop: true
          volume: 100
          startDelayMs: 0
---
