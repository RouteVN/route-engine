        type: "container"
        x: 0
        y: 0
        children: []
    animations: []
    audio: []
  - presentationState: {}
    resources:
      sounds:
        backgroundMusic:
          fileId: "bgm.mp3"
          loop: true
          volume: 70
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children: []
  animations: []
  audio: []
