file: "../../src/util.js"
group: processActionTemplates
suites: [processActionTemplates]
---
suite: processActionTemplates
exportName: processActionTemplates
---
case: returns actions unchanged when no context provided
in:
  - updateVariable:
      id: test
      operations:
        - variableId: volume
          op: set
          value: 50
out:
  updateVariable:
    id: test
    operations:
      - variableId: volume
        op: set
        value: 50
---
case: resolves _event.value binding
in:
  - updateVariable:
      id: test
      operations:
        - variableId: volume
          op: set
          value: "_event.value"
  - _event:
      id: slider1
      value: 75
out:
  updateVariable:
    id: test
    operations:
      - variableId: volume
        op: set
        value: 75
---
case: resolves nested _event path
in:
  - updateVariable:
      id: test
      operations:
        - variableId: volume
          op: set
          value: "_event.detail.value"
  - _event:
      detail:
        value: 43
out:
  updateVariable:
    id: test
    operations:
      - variableId: volume
        op: set
        value: 43
---
case: resolves mixed _event bindings and variables templates
in:
  - updateVariable:
      id: test
      operations:
        - variableId: "${variables.targetId}"
          op: set
          value: "_event.value"
  - _event:
      value: 33
    variables:
      targetId: sliderValue
out:
  updateVariable:
    id: test
    operations:
      - variableId: sliderValue
        op: set
        value: 33
---
case: throws when _event is missing for binding
in:
  - updateVariable:
      id: test
      operations:
        - variableId: volume
          op: set
          value: "_event.value"
  - variables:
      volume: 75
throws: 'Action template binding "_event.value" requires event context "_event".'
---
case: throws when _event path is unresolved
in:
  - updateVariable:
      id: test
      operations:
        - variableId: volume
          op: set
          value: "_event.missing"
  - _event:
      value: 75
throws: 'Action template binding "_event.missing" could not be resolved from "_event".'
---
case: throws when legacy event context key is provided
in:
  - updateVariable:
      id: test
      operations:
        - variableId: volume
          op: set
          value: "_event.value"
  - event:
      value: 75
throws: 'Action template context key "event" is no longer supported. Use "_event".'
---
case: resolves top-level confirm dialog fields while preserving deferred confirm and cancel batches
in:
  - showConfirmDialog:
      resourceId: "${variables.confirmLayoutId}"
      confirmActions:
        updateVariable:
          id: deferred-confirm
          operations:
            - variableId: "${variables.deferredVariableId}"
              op: set
              value: "_event.value"
      cancelActions:
        sectionTransition:
          sectionId: "${variables.cancelSectionId}"
    updateVariable:
      id: immediate
      operations:
        - variableId: marker
          op: set
          value: "_event.value"
  - _event:
      value: 12
    variables:
      confirmLayoutId: confirm-layout
      deferredVariableId: deferred-marker
      cancelSectionId: section-cancel
out:
  showConfirmDialog:
    resourceId: confirm-layout
    confirmActions:
      updateVariable:
        id: deferred-confirm
        operations:
          - variableId: "${variables.deferredVariableId}"
            op: set
            value: "_event.value"
    cancelActions:
      sectionTransition:
        sectionId: "${variables.cancelSectionId}"
  updateVariable:
    id: immediate
    operations:
      - variableId: marker
        op: set
        value: 12
---
case: does not throw when deferred confirm dialog batches contain unresolved _event bindings
in:
  - showConfirmDialog:
      resourceId: confirm-layout
      confirmActions:
        updateVariable:
          id: deferred-confirm
          operations:
            - variableId: marker
              op: set
              value: "_event.missing"
      cancelActions:
        updateVariable:
          id: deferred-cancel
          operations:
            - variableId: marker
              op: set
              value: "_event.alsoMissing"
  - _event:
      id: open-dialog
out:
  showConfirmDialog:
    resourceId: confirm-layout
    confirmActions:
      updateVariable:
        id: deferred-confirm
        operations:
          - variableId: marker
            op: set
            value: "_event.missing"
    cancelActions:
      updateVariable:
        id: deferred-cancel
        operations:
          - variableId: marker
            op: set
            value: "_event.alsoMissing"
