        mode: "adv"
        content:
          - text: "Held prefix: "
    - dialogue:
        append: true
        content:
          - text: "continued suffix"
    - dialogue:
        content:
          - text: "Replacement"
out:
  dialogue:
    mode: "adv"
    content:
      - text: "Replacement"
