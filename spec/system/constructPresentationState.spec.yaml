file: "../../src/stores/constructPresentationState.js"
group: constructPresentationState
suites: [constructPresentationState]
---
suite: constructPresentationState
exportName: constructPresentationState
---
case: construct presentation state with single background action
in:
  - - background:
        resourceId: "mainBackground"
out:
  background:
    resourceId: "mainBackground"
---
case: construct presentation state with control action
in:
  - - control:
        resourceId: "gameplay"
out:
  control:
    resourceId: "gameplay"
---
case: control persists when next presentation omits control
in:
  - - control:
        resourceId: "gameplay"
    - dialogue:
        mode: "adv"
        content:
          - text: "Next line"
out:
  control:
    resourceId: "gameplay"
  dialogue:
    mode: "adv"
    content:
      - text: "Next line"
---
case: construct presentation state with multiple actions in one presentation
in:
  - - background:
        resourceId: "bgImage"
      bgm:
        resourceId: "backgroundMusic"
        loop: true
out:
  background:
    resourceId: "bgImage"
  bgm:
    resourceId: "backgroundMusic"
    loop: true
---
case: construct presentation state with clean all and multiple presentations
in:
  - - cleanAll: true
      background:
        resourceId: "oldBg"
    - background:
        resourceId: "newBg"
out:
  background:
    resourceId: "newBg"
---
case: dialogue characterId should be cleared when second presentation has undefined characterId
in:
  - - dialogue:
        mode: "adv"
        ui:
          resourceId: "simple-dialogue"
        characterId: "character-123"
        content:
          - text: "Hello"
    - dialogue:
        mode: "adv"
        ui:
          resourceId: "simple-dialogue"
out:
  dialogue:
    mode: "adv"
    ui:
      resourceId: "simple-dialogue"
    content:
      - text: "Hello"
---
case: dialogue character override should be cleared when next line omits it
in:
  - - dialogue:
        mode: "adv"
        ui:
          resourceId: "simple-dialogue"
        characterId: "alice"
        character:
          name: "Alias"
        content:
          - text: "Hello"
    - dialogue:
        mode: "adv"
        ui:
          resourceId: "simple-dialogue"
        characterId: "bob"
        content:
          - text: "Hi"
out:
  dialogue:
    mode: "adv"
    ui:
      resourceId: "simple-dialogue"
    characterId: "bob"
    content:
      - text: "Hi"
---
case: dialogue character override creates a character override
in:
  - - dialogue:
        mode: "adv"
        ui:
          resourceId: "simple-dialogue"
        characterId: "alice"
        character:
          name: "Alias"
        content:
          - text: "Hello"
out:
  dialogue:
    mode: "adv"
    ui:
      resourceId: "simple-dialogue"
    characterId: "alice"
    character:
      name: "Alias"
    content:
      - text: "Hello"
---
case: dialogue characterName alias still creates a character override
in:
  - - dialogue:
        mode: "adv"
        ui:
          resourceId: "simple-dialogue"
        characterId: "alice"
        characterName: "Alias"
        content:
          - text: "Hello"
out:
  dialogue:
    mode: "adv"
    ui:
      resourceId: "simple-dialogue"
    characterId: "alice"
    character:
      name: "Alias"
    content:
      - text: "Hello"
---
case: dialogue speaker persists when persistCharacter is true
in:
  - - dialogue:
        mode: "adv"
        ui:
          resourceId: "simple-dialogue"
        characterId: "alice"
        character:
          name: "Alias"
        persistCharacter: true
        content:
          - text: "Hello"
    - dialogue:
        mode: "adv"
        ui:
          resourceId: "simple-dialogue"
        content:
          - text: "Hi again"
out:
  dialogue:
    mode: "adv"
    ui:
      resourceId: "simple-dialogue"
    characterId: "alice"
    character:
      name: "Alias"
    persistCharacter: true
    content:
      - text: "Hi again"
---
case: dialogue character override persists when the same speaker id repeats
in:
  - - dialogue:
        mode: "adv"
        ui:
          resourceId: "simple-dialogue"
        characterId: "alice"
        character:
          name: "Alias"
        persistCharacter: true
        content:
          - text: "Hello"
    - dialogue:
        mode: "adv"
        ui:
          resourceId: "simple-dialogue"
        characterId: "alice"
        persistCharacter: true
        content:
          - text: "Hi again"
out:
  dialogue:
    mode: "adv"
    ui:
      resourceId: "simple-dialogue"
    characterId: "alice"
    character:
      name: "Alias"
    persistCharacter: true
    content:
      - text: "Hi again"
---
case: dialogue character override clears when speaker changes
in:
  - - dialogue:
        mode: "adv"
        ui:
          resourceId: "simple-dialogue"
        characterId: "alice"
        character:
          name: "Alias"
        persistCharacter: true
        content:
          - text: "Hello"
    - dialogue:
        mode: "adv"
        ui:
          resourceId: "simple-dialogue"
        characterId: "bob"
        persistCharacter: true
        content:
          - text: "Hi"
out:
  dialogue:
    mode: "adv"
    ui:
      resourceId: "simple-dialogue"
    characterId: "bob"
    persistCharacter: true
    content:
      - text: "Hi"
---
case: clear background animations when next presentation has no background action
in:
  - - background:
        resourceId: "bg-school"
        animations:
          resourceId: "fade"
    - dialogue:
        mode: "adv"
        content:
          - text: "Hello!"
out:
  background:
    resourceId: "bg-school"
    animations: {}
  dialogue:
    mode: "adv"
    content:
      - text: "Hello!"
---
case: clear character item animations when next presentation has no character action
in:
  - - character:
        items:
          - id: "sakura"
            resourceId: "char-sakura"
            animations:
              resourceId: "slide"
    - dialogue:
        mode: "adv"
        content:
          - text: "Nice to meet you!"
out:
  character:
    items:
      - id: "sakura"
        resourceId: "char-sakura"
        animations: {}
  dialogue:
    mode: "adv"
    content:
      - text: "Nice to meet you!"
---
case: clear visual item animations when next presentation has no visual action
in:
  - - visual:
        items:
          - id: "sparkle"
            resourceId: "effect-sparkle"
            animations:
              resourceId: "fade"
    - dialogue:
        mode: "adv"
        content:
          - text: "So beautiful!"
out:
  visual:
    items:
      - id: "sparkle"
        resourceId: "effect-sparkle"
        animations: {}
  dialogue:
    mode: "adv"
    content:
      - text: "So beautiful!"
---
case: preserve background without animations (no empty animations added)
in:
  - - background:
        resourceId: "bg-school"
    - dialogue:
        mode: "adv"
        content:
          - text: "Hello!"
out:
  background:
    resourceId: "bg-school"
  dialogue:
    mode: "adv"
    content:
      - text: "Hello!"
---
case: preserve existing background resource when next line only adds animations
in:
  - - background:
        resourceId: "bg-school"
    - background:
        animations:
          resourceId: "fade-in"
out:
  background:
    resourceId: "bg-school"
    animations:
      resourceId: "fade-in"
---
case: clear animations across multiple lines
in:
  - - background:
        resourceId: "bg-school"
        animations:
          resourceId: "fade"
    - dialogue:
        mode: "adv"
        content:
          - text: "Line 2"
    - dialogue:
        content:
          - text: "Line 3"
out:
  background:
    resourceId: "bg-school"
    animations: {}
  dialogue:
    mode: "adv"
    content:
      - text: "Line 3"
---
case: clear only items with animations (mixed character items)
in:
  - - character:
        items:
          - id: "char-1"
            resourceId: "res-1"
            animations:
              resourceId: "fade"
          - id: "char-2"
            resourceId: "res-2"
    - dialogue:
        mode: "adv"
        content:
          - text: "Hello!"
out:
  character:
    items:
      - id: "char-1"
        resourceId: "res-1"
        animations: {}
      - id: "char-2"
        resourceId: "res-2"
  dialogue:
    mode: "adv"
    content:
      - text: "Hello!"
---
case: nvl-mode-lines-accumulate
in:
  - - dialogue:
        mode: "nvl"
        ui:
          resourceId: "nvl-layout"
        characterId: "narrator"
        content:
          - text: "First line"
    - dialogue:
        mode: "nvl"
        characterId: "alice"
        content:
          - text: "Second line"
    - dialogue:
        mode: "nvl"
        characterId: "bob"
        content:
          - text: "Third line"
out:
  dialogue:
    mode: "nvl"
    ui:
      resourceId: "nvl-layout"
    characterId: "bob"
    content:
      - text: "Third line"
    lines:
      - content:
          - text: "First line"
        characterId: "narrator"
      - content:
          - text: "Second line"
        characterId: "alice"
      - content:
          - text: "Third line"
        characterId: "bob"
---
case: nvl-mode-lines-accumulate-with-implicit-mode
in:
  - - dialogue:
        mode: "nvl"
        ui:
          resourceId: "nvl-layout"
        characterId: "narrator"
        content:
          - text: "First line"
    - dialogue:
        characterId: "alice"
        content:
          - text: "Second line"
    - dialogue:
        characterId: "bob"
        content:
          - text: "Third line"
out:
  dialogue:
    mode: "nvl"
    ui:
      resourceId: "nvl-layout"
    characterId: "bob"
    content:
      - text: "Third line"
    lines:
      - content:
          - text: "First line"
        characterId: "narrator"
      - content:
          - text: "Second line"
        characterId: "alice"
      - content:
          - text: "Third line"
        characterId: "bob"
---
case: nvl-mode-clearPage
in:
  - - dialogue:
        mode: "nvl"
        ui:
          resourceId: "nvl-layout"
        characterId: "narrator"
        content:
          - text: "First page line 1"
    - dialogue:
        mode: "nvl"
        characterId: "alice"
        content:
          - text: "First page line 2"
    - dialogue:
        mode: "nvl"
        clearPage: true
        characterId: "bob"
        content:
          - text: "Second page line 1"
out:
  dialogue:
    mode: "nvl"
    ui:
      resourceId: "nvl-layout"
    characterId: "bob"
    content:
      - text: "Second page line 1"
    lines:
      - content:
          - text: "Second page line 1"
        characterId: "bob"
---
case: nvl-mode-clearPage-with-content
in:
  - - dialogue:
        mode: "nvl"
        ui:
          resourceId: "nvl-layout"
        characterId: "alice"
        content:
          - text: "Old page content"
    - dialogue:
        mode: "nvl"
        clearPage: true
        content:
          - text: "New page starts here"
out:
  dialogue:
    mode: "nvl"
    ui:
      resourceId: "nvl-layout"
    content:
      - text: "New page starts here"
    lines:
      - content:
          - text: "New page starts here"
        characterId: null
---
case: nvl-mode-lines-persist-character-override
in:
  - - dialogue:
        mode: "nvl"
        ui:
          resourceId: "nvl-layout"
        characterId: "alice"
        character:
          name: "Alias"
        persistCharacter: true
        content:
          - text: "First line"
    - dialogue:
        mode: "nvl"
        content:
          - text: "Second line"
out:
  dialogue:
    mode: "nvl"
    ui:
      resourceId: "nvl-layout"
    characterId: "alice"
    character:
      name: "Alias"
    persistCharacter: true
    content:
      - text: "Second line"
    lines:
      - content:
          - text: "First line"
        characterId: "alice"
        character:
          name: "Alias"
      - content:
          - text: "Second line"
        characterId: "alice"
        character:
          name: "Alias"
---
case: nvl-mode-switch-from-adv
in:
  - - dialogue:
        mode: "adv"
        ui:
          resourceId: "adv-layout"
        characterId: "alice"
        content:
          - text: "ADV mode line"
    - dialogue:
        mode: "nvl"
        ui:
          resourceId: "nvl-layout"
        characterId: "narrator"
        content:
          - text: "First NVL line"
out:
  dialogue:
    mode: "nvl"
    ui:
      resourceId: "nvl-layout"
    characterId: "narrator"
    content:
      - text: "First NVL line"
    lines:
      - content:
          - text: "First NVL line"
        characterId: "narrator"
---
case: nvl-mode-switch-to-adv
in:
  - - dialogue:
        mode: "nvl"
        ui:
          resourceId: "nvl-layout"
        characterId: "narrator"
        content:
          - text: "NVL line"
    - dialogue:
        mode: "adv"
        ui:
          resourceId: "adv-layout"
        characterId: "alice"
        content:
          - text: "ADV line"
out:
  dialogue:
    mode: "adv"
    ui:
      resourceId: "adv-layout"
    characterId: "alice"
    content:
      - text: "ADV line"
    lines:
      - content:
          - text: "NVL line"
        characterId: "narrator"
---
case: nvl-mode-clearPage-adv-ignored
in:
  - - dialogue:
        mode: "adv"
        ui:
          resourceId: "adv-layout"
        characterId: "alice"
        content:
          - text: "First ADV line"
    - dialogue:
        mode: "adv"
        clearPage: true
        characterId: "bob"
        content:
          - text: "Second ADV line"
out:
  dialogue:
    mode: "adv"
    ui:
      resourceId: "adv-layout"
    characterId: "bob"
    content:
      - text: "Second ADV line"
