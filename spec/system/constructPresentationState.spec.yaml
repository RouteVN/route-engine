          resourceId: "simple-dialogue"
        character:
          sprite:
            animations:
              resourceId: "portrait-out"
        persistCharacter: true
        content:
          - text: "Bye"
out:
  dialogue:
    mode: "adv"
    ui:
      resourceId: "simple-dialogue"
    characterId: "alice"
    character:
