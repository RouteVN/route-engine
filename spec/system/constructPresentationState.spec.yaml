file: "../../src/stores/constructPresentationState.js"
group: constructPresentationState
suites: [constructPresentationState]
---
suite: constructPresentationState
exportName: constructPresentationState
---
case: construct presentation state with single background action
in:
  - - background:
        resourceId: "mainBackground"
out:
  background:
    resourceId: "mainBackground"
---
case: screen opacity and blur persist across omitted screen actions
in:
  - - screen:
        opacity: 0.72
        blur:
          x: 6
          y: 9
          quality: 3
          kernelSize: 9
          repeatEdgePixels: true
    - dialogue:
        mode: "adv"
        content:
          - text: "Next line"
out:
  screen:
    opacity: 0.72
    blur:
      x: 6
      y: 9
      quality: 3
      kernelSize: 9
      repeatEdgePixels: true
  dialogue:
    mode: "adv"
    content:
      - text: "Next line"
---
case: screen animations only stay transient
in:
  - - screen:
        opacity: 0.72
        blur:
          x: 6
          y: 9
    - screen:
        animations:
          resourceId: "screenCrossFade"
out:
  screen:
    opacity: 0.72
    blur:
      x: 6
      y: 9
---
case: empty screen action clears static screen appearance
in:
  - - screen:
        opacity: 0.72
        blur:
          x: 6
          y: 9
    - screen: {}
out: {}
---
case: background colorId can stand alone
in:
  - - background:
        colorId: "backdrop"
out:
  background:
    colorId: "backdrop"
---
case: background colorId persists across omitted background actions
in:
  - - background:
        resourceId: "mainBackground"
        colorId: "backdrop"
    - dialogue:
        mode: "adv"
        content:
          - text: "Next line"
out:
  background:
    resourceId: "mainBackground"
    colorId: "backdrop"
  dialogue:
    mode: "adv"
    content:
      - text: "Next line"
---
case: background colorId persists across resource updates
in:
  - - background:
        resourceId: "mainBackground"
        colorId: "backdrop"
    - background:
        resourceId: "altBackground"
out:
  background:
    resourceId: "altBackground"
    colorId: "backdrop"
---
case: background colorId update keeps the current background resource
in:
  - - background:
        resourceId: "mainBackground"
        transformId: "centered"
    - background:
        colorId: "backdrop"
out:
  background:
    resourceId: "mainBackground"
    transformId: "centered"
    colorId: "backdrop"
---
case: background opacity and blur update keeps the current background resource
in:
  - - background:
        resourceId: "mainBackground"
    - background:
        opacity: 0.72
        blur:
          x: 6
          y: 9
          quality: 3
          kernelSize: 9
          repeatEdgePixels: true
out:
  background:
    resourceId: "mainBackground"
    opacity: 0.72
    blur:
      x: 6
      y: 9
      quality: 3
      kernelSize: 9
      repeatEdgePixels: true
---
case: background opacity and blur persist across omitted background actions
in:
  - - background:
        resourceId: "mainBackground"
        opacity: 0.72
        blur:
          x: 6
          y: 9
    - dialogue:
        mode: "adv"
        content:
          - text: "Next line"
out:
  background:
    resourceId: "mainBackground"
    opacity: 0.72
    blur:
      x: 6
      y: 9
  dialogue:
    mode: "adv"
    content:
      - text: "Next line"
---
case: background blur null clears persisted blur
in:
  - - background:
        resourceId: "mainBackground"
        blur:
          x: 6
          y: 9
    - background:
        blur: null
out:
  background:
    resourceId: "mainBackground"
    blur: null
---
case: persistent background animation survives later lines that omit background
in:
  - - background:
        resourceId: "mainBackground"
        animations:
          resourceId: "bgFade"
          playback:
            continuity: "persistent"
    - dialogue:
        mode: "adv"
        content:
          - text: "Next line"
out:
  background:
    resourceId: "mainBackground"
    animations:
      resourceId: "bgFade"
      playback:
        continuity: "persistent"
  dialogue:
    mode: "adv"
    content:
      - text: "Next line"
---
case: persistent background animation survives same-background reassertion without animations
in:
  - - background:
        resourceId: "mainBackground"
        animations:
          resourceId: "bgFade"
          playback:
            continuity: "persistent"
    - background:
        resourceId: "mainBackground"
out:
  background:
    resourceId: "mainBackground"
    animations:
      resourceId: "bgFade"
      playback:
        continuity: "persistent"
---
case: persistent background animation clears when background is modified
in:
  - - background:
        resourceId: "mainBackground"
        animations:
          resourceId: "bgFade"
          playback:
            continuity: "persistent"
    - background:
        resourceId: "altBackground"
out:
  background:
    resourceId: "altBackground"
---
case: construct presentation state with control action
in:
  - - control:
        resourceId: "gameplay"
out:
  control:
    resourceId: "gameplay"
---
case: control persists when next presentation omits control
in:
  - - control:
        resourceId: "gameplay"
    - dialogue:
        mode: "adv"
        content:
          - text: "Next line"
out:
  control:
    resourceId: "gameplay"
  dialogue:
    mode: "adv"
    content:
      - text: "Next line"
---
case: construct presentation state with multiple actions in one presentation
in:
  - - background:
        resourceId: "bgImage"
      bgm:
        resourceId: "backgroundMusic"
        loop: true
out:
  background:
    resourceId: "bgImage"
  bgm:
    resourceId: "backgroundMusic"
    loop: true
---
case: construct presentation state with clean all and multiple presentations
in:
  - - cleanAll: true
      background:
        resourceId: "oldBg"
    - background:
        resourceId: "newBg"
out:
  background:
    resourceId: "newBg"
---
case: dialogue characterId should be cleared when second presentation has undefined characterId
in:
  - - dialogue:
        mode: "adv"
        ui:
          resourceId: "simple-dialogue"
        characterId: "character-123"
        content:
          - text: "Hello"
    - dialogue:
        mode: "adv"
        ui:
          resourceId: "simple-dialogue"
out:
  dialogue:
    mode: "adv"
    ui:
      resourceId: "simple-dialogue"
    content:
      - text: "Hello"
---
case: dialogue character override should be cleared when next line omits it
in:
  - - dialogue:
        mode: "adv"
        ui:
          resourceId: "simple-dialogue"
        characterId: "alice"
        character:
          name: "Alias"
        content:
          - text: "Hello"
    - dialogue:
        mode: "adv"
        ui:
          resourceId: "simple-dialogue"
        characterId: "bob"
        content:
          - text: "Hi"
out:
  dialogue:
    mode: "adv"
    ui:
      resourceId: "simple-dialogue"
    characterId: "bob"
    content:
      - text: "Hi"
---
case: dialogue character override creates a character override
in:
  - - dialogue:
        mode: "adv"
        ui:
          resourceId: "simple-dialogue"
        characterId: "alice"
        character:
          name: "Alias"
        content:
          - text: "Hello"
out:
  dialogue:
    mode: "adv"
    ui:
      resourceId: "simple-dialogue"
    characterId: "alice"
    character:
      name: "Alias"
    content:
      - text: "Hello"
---
case: dialogue characterName alias still creates a character override
in:
  - - dialogue:
        mode: "adv"
        ui:
          resourceId: "simple-dialogue"
        characterId: "alice"
        characterName: "Alias"
        content:
          - text: "Hello"
out:
  dialogue:
    mode: "adv"
    ui:
      resourceId: "simple-dialogue"
    characterId: "alice"
    character:
      name: "Alias"
    content:
      - text: "Hello"
---
case: dialogue speaker persists when persistCharacter is true
in:
  - - dialogue:
        mode: "adv"
        ui:
          resourceId: "simple-dialogue"
        characterId: "alice"
        character:
          name: "Alias"
        persistCharacter: true
        content:
          - text: "Hello"
    - dialogue:
        mode: "adv"
        ui:
          resourceId: "simple-dialogue"
        content:
          - text: "Hi again"
out:
  dialogue:
    mode: "adv"
    ui:
      resourceId: "simple-dialogue"
    characterId: "alice"
    character:
      name: "Alias"
    persistCharacter: true
    content:
      - text: "Hi again"
---
case: dialogue character sprite persists with speaker and clears animation when later omitted
in:
  - - dialogue:
        mode: "adv"
        ui:
          resourceId: "simple-dialogue"
        characterId: "alice"
        character:
          name: "Alias"
          sprite:
            transformId: "dialogue-left"
            items:
              - id: "base"
                resourceId: "alice-base"
              - id: "face"
                resourceId: "alice-smile"
            animations:
              resourceId: "portrait-in"
        persistCharacter: true
        content:
          - text: "Hello"
    - dialogue:
        mode: "adv"
        ui:
          resourceId: "simple-dialogue"
        content:
          - text: "Hi again"
out:
  dialogue:
    mode: "adv"
    ui:
      resourceId: "simple-dialogue"
    characterId: "alice"
    character:
      name: "Alias"
      sprite:
        transformId: "dialogue-left"
        items:
          - id: "base"
            resourceId: "alice-base"
          - id: "face"
            resourceId: "alice-smile"
        animations: {}
    persistCharacter: true
    content:
      - text: "Hi again"
---
case: dialogue character sprite accepts animation-only removal payload
in:
  - - dialogue:
        mode: "adv"
        ui:
          resourceId: "simple-dialogue"
        characterId: "alice"
        character:
          name: "Alias"
          sprite:
            transformId: "dialogue-left"
