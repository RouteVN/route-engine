file: "../../src/stores/constructRenderState.js"
group: constructRenderState
suites: [constructRenderState]
---
suite: constructRenderState
exportName: constructRenderState
---
case: construct render state with single background layout action
in:
  - - presentationState:
        background:
          resourceId: "mainBackground"
      resources:
        layouts:
          mainBackground:
            elements:
              - type: "container"
                id: "background-container"
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "bg-cg-background-container"
          type: "container"
          children:
            - type: "container"
              id: "background-container"
  animations: []
  audio: []
  global: {}
---
case: construct render state keeps controls behind background and layout
in:
  - - presentationState:
        control:
          resourceId: "gameplay"
        background:
          resourceId: "bgImage"
        layout:
          resourceId: "foregroundLayout"
      resources:
        images:
          bgImage:
            fileId: "background.jpg"
            width: 1920
            height: 1080
        controls:
          gameplay:
            elements:
              - id: "control-hitbox"
                type: "rect"
                x: 0
                y: 0
                width: 100
                height: 100
        layouts:
          foregroundLayout:
            elements:
              - type: "container"
                id: "foreground-container"
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "control-gameplay"
          type: "container"
          x: 0
          y: 0
          children:
            - id: "control-hitbox"
              type: "rect"
              x: 0
              y: 0
              width: 100
              height: 100
        - id: "bg-cg-background-sprite"
          type: "sprite"
          alpha: 1
          anchorX: 0.5
          anchorY: 0.5
          rotation: 0
          scaleX: 1
          scaleY: 1
          x: 960
          y: 540
          src: "background.jpg"
          width: 1920
          height: 1080
        - id: "layout-foregroundLayout"
          type: "container"
          x: 0
          y: 0
          children:
            - type: "container"
              id: "foreground-container"
  animations: []
  audio: []
  global: {}
---
case: construct render state with clean all and multiple presentations
in:
  - - presentationState:
        cleanAll: true
        background:
          resourceId: "oldBg"
      resources:
        layouts:
          oldBg:
            elements:
              - type: "container"
                id: "old-container"
    - presentationState:
        background:
          resourceId: "newBg"
      resources:
        images:
          newBg:
            fileId: "new-background.jpg"
            width: 1920
            height: 1080
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "bg-cg-background-container"
          type: "container"
          children:
            - type: "container"
              id: "old-container"
        - id: "bg-cg-background-sprite"
          type: "sprite"
          alpha: 1
          anchorX: 0.5
          anchorY: 0.5
          rotation: 0
          scaleX: 1
          scaleY: 1
          x: 960
          y: 540
          src: "new-background.jpg"
          width: 1920
          height: 1080
  animations: []
  audio: []
  global: {}
