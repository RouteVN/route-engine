---
case: treats explicit true and missing eligibility as returnable
in:
  - state:
      global: {}
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "4"
          rollback:
            currentIndex: 3
            isRestoring: false
            replayStartIndex: 0
            timeline:
              - sectionId: "section1"
                lineId: "1"
                rollbackPolicy: "free"
              - sectionId: "section1"
                lineId: "2"
                rollbackPolicy: "free"
                returnable: false
              - sectionId: "section1"
                lineId: "3"
                rollbackPolicy: "free"
                returnable: true
              - sectionId: "section1"
                lineId: "4"
                rollbackPolicy: "free"
  - offset: -2
out:
  sectionId: "section1"
  lineId: "1"
---
case: positive offsets retain raw traversal through non-returnable checkpoints
in:
  - state:
      global: {}
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
