file: "../../../src/stores/system.store.js"
group: systemStore selectors
suites: [selectLineIdByOffset]
---
suite: selectLineIdByOffset
exportName: selectLineIdByOffset
---
case: returns previous line from rollback timeline
in:
  - state:
      global: {}
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "3"
          rollback:
            currentIndex: 2
            isRestoring: false
            replayStartIndex: 0
            timeline:
              - sectionId: "section1"
                lineId: "1"
                rollbackPolicy: "free"
              - sectionId: "section1"
                lineId: "2"
                rollbackPolicy: "free"
              - sectionId: "section1"
                lineId: "3"
                rollbackPolicy: "free"
  - offset: -1
out:
  sectionId: "section1"
  lineId: "2"
---
case: returns null when at first rollback checkpoint with offset -1
in:
  - state:
      global: {}
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "1"
          rollback:
            currentIndex: 0
            isRestoring: false
            replayStartIndex: 0
            timeline:
              - sectionId: "section1"
                lineId: "1"
                rollbackPolicy: "free"
  - offset: -1
out: null
---
case: handles duplicate checkpoints after backtracking using rollback cursor
in:
  - state:
      global: {}
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "2"
          rollback:
            currentIndex: 3
            isRestoring: false
            replayStartIndex: 0
            timeline:
              - sectionId: "section1"
                lineId: "1"
                rollbackPolicy: "free"
              - sectionId: "section1"
                lineId: "2"
                rollbackPolicy: "free"
              - sectionId: "section1"
                lineId: "3"
                rollbackPolicy: "free"
              - sectionId: "section1"
                lineId: "2"
                rollbackPolicy: "free"
  - offset: -1
out:
  sectionId: "section1"
  lineId: "3"
