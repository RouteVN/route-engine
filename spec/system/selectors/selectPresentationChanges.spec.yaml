---
case: "Detect added dialogue character sprite without dialogue ui"
in:
  - state:
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                      actions: {}
                    - id: "2"
                      actions:
                        dialogue:
                          character:
                            sprite:
                              transformId: "dialogue-left"
                              items:
                                - id: "base"
                                  resourceId: "alice-base"
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "2"
out:
  dialogue:
    changeType: "add"
    data:
      character:
        sprite:
          transformId: "dialogue-left"
          items:
            - id: "base"
              resourceId: "alice-base"
