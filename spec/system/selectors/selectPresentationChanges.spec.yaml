                              resourceId: "image-1"
                              transformId: "center"
                              animations:
                                resourceId: "fadeIn"
                    - id: "2"
                      actions: {}
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "2"
out: {}
