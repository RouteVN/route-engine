file: "../../../src/stores/system.store.js"
group: systemStore selectors
suites: [selectRenderState]
---
suite: selectRenderStateState
exportName: selectRenderState
---
case: basic case
in:
  - state:
      global:
        isLineCompleted: false
        autoMode: false
        skipMode: false
        isDialogueUIVisible: true
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                      actions:
                        background:
                          resourceId: "abcd"
                    - id: "2"
                      actions: {}
        resources:
          sounds:
            cde:
              id: "cde"
              type: "audio"
              fileId: "audio/cde.mp3"
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "1"
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children: []
  animations: []
  audio: []
  global: {}
---
case: multiple lines and actions not last line
in:
  - state:
      global:
        isLineCompleted: false
        autoMode: false
        skipMode: false
        isDialogueUIVisible: true
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                      actions:
                        background:
                          resourceId: "abcd"
                        bgm:
                          resourceId: "cde"
                    - id: "2"
                      actions:
                        background:
                          resourceId: "xyz"
        resources:
          sounds:
            cde:
              id: "cde"
              type: "audio"
              fileId: "audio/cde.mp3"
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "1"
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children: []
  animations: []
  audio:
    - id: "bgm"
      type: "sound"
      src: "audio/cde.mp3"
      loop: true
      volume: 50
      startDelayMs: null
  global: {}
---
case: current line screen animation targets the full story container
in:
  - state:
      global:
        isLineCompleted: false
        autoMode: false
        skipMode: false
        isDialogueUIVisible: true
      projectData:
        screen:
          width: 1920
          height: 1080
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                      actions:
                        background:
                          resourceId: "bg1"
                    - id: "2"
                      actions:
                        screen:
                          animations:
                            resourceId: "screenCrossFade"
                        background:
                          resourceId: "bg2"
        resources:
          images:
            bg1:
              fileId: "previous.jpg"
              width: 1920
              height: 1080
            bg2:
              fileId: "next.jpg"
              width: 1920
              height: 1080
          animations:
            screenCrossFade:
              type: transition
              prev:
                tween:
                  alpha:
                    initialValue: 1
                    keyframes:
                      - duration: 300
                        value: 0
              next:
                tween:
                  alpha:
                    initialValue: 0
                    keyframes:
                      - duration: 300
                        value: 1
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "2"
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "bg-cg-background-color"
          type: "rect"
          x: 0
          y: 0
          width: 1920
          height: 1080
          fill: "#000000"
        - id: "bg-cg-background-sprite"
          type: "sprite"
          alpha: 1
          anchorX: 0.5
          anchorY: 0.5
          rotation: 0
          scaleX: 1
          scaleY: 1
          x: 960
          y: 540
          src: "next.jpg"
          width: 1920
          height: 1080
  animations:
    - id: "screen-animation-transition"
      type: "transition"
      targetId: "story"
      prev:
        tween:
          alpha:
            initialValue: 1
            keyframes:
              - duration: 300
                value: 0
      next:
        tween:
          alpha:
            initialValue: 0
            keyframes:
              - duration: 300
                value: 1
  audio: []
  global: {}
---
case: pending section screen transition overrides destination line screen animation
in:
  - state:
      global:
        isLineCompleted: false
        autoMode: false
        skipMode: false
        isDialogueUIVisible: true
        pendingScreenTransition:
          animations:
            resourceId: "screenCrossFade"
      projectData:
        screen:
          width: 1920
          height: 1080
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                      actions:
                        background:
                          resourceId: "bg1"
                section2:
                  lines:
                    - id: "10"
                      actions:
                        screen:
                          animations:
                            resourceId: "lineScreenFade"
                        background:
                          resourceId: "bg2"
        resources:
          images:
            bg1:
              fileId: "previous.jpg"
              width: 1920
              height: 1080
            bg2:
              fileId: "next.jpg"
              width: 1920
              height: 1080
          animations:
            screenCrossFade:
              type: transition
              prev:
                tween:
                  alpha:
                    initialValue: 1
                    keyframes:
                      - duration: 300
                        value: 0
              next:
                tween:
                  alpha:
                    initialValue: 0
                    keyframes:
                      - duration: 300
                        value: 1
            lineScreenFade:
              type: transition
              prev:
                tween:
                  alpha:
                    initialValue: 1
                    keyframes:
                      - duration: 900
                        value: 0.25
              next:
                tween:
                  alpha:
                    initialValue: 0.25
                    keyframes:
                      - duration: 900
                        value: 1
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section2"
              lineId: "10"
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - id: "bg-cg-background-color"
          type: "rect"
          x: 0
          y: 0
          width: 1920
          height: 1080
          fill: "#000000"
        - id: "bg-cg-background-sprite"
          type: "sprite"
          alpha: 1
          anchorX: 0.5
          anchorY: 0.5
          rotation: 0
          scaleX: 1
          scaleY: 1
          x: 960
          y: 540
          src: "next.jpg"
          width: 1920
          height: 1080
  animations:
    - id: "screen-animation-transition"
      type: "transition"
      targetId: "story"
      prev:
        tween:
          alpha:
            initialValue: 1
            keyframes:
              - duration: 300
                value: 0
      next:
        tween:
          alpha:
            initialValue: 0
            keyframes:
              - duration: 300
                value: 1
  audio: []
  global: {}
---
case: nvl dialogue character sprite does not replay stale animation on later non-dialogue line
in:
  - state:
      global:
        isLineCompleted: false
        autoMode: false
        skipMode: false
        isDialogueUIVisible: true
      projectData:
        resources:
          transforms:
            dialogue-left:
              x: 240
              y: 900
              anchorX: 0.5
              anchorY: 1
              rotation: 0
              scaleX: 1
              scaleY: 1
          images:
            alice-base:
              fileId: "alice-base.png"
              width: 320
              height: 640
          animations:
            portrait-in:
              type: transition
              next:
                tween:
                  alpha:
                    initialValue: 0
                    keyframes:
                      - duration: 500
                        value: 1
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                      actions:
                        dialogue:
                          mode: "nvl"
                          characterId: "alice"
                          character:
                            sprite:
                              transformId: "dialogue-left"
                              items:
                                - id: "base"
                                  resourceId: "alice-base"
                              animations:
                                resourceId: "portrait-in"
                          content:
                            - text: "Hello"
                    - id: "2"
                      actions: {}
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "2"
out:
  elements:
    - id: "story"
      type: "container"
      x: 0
      y: 0
      children:
        - type: "container"
          id: "dialogue-character-sprite"
          x: 240
          y: 900
          anchorX: 0.5
          anchorY: 1
          rotation: 0
          scaleX: 1
          scaleY: 1
          children:
            - type: "sprite"
              id: "dialogue-character-sprite-base"
              src: "alice-base.png"
              width: 320
              height: 640
              x: 0
              y: 0
  animations: []
  audio: []
  global: {}
