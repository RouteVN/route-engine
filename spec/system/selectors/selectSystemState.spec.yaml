file: "../../../src/stores/system.store.js"
group: systemStore selectors
suites: [selectSystemState]
---
suite: selectSystemState
exportName: selectSystemState
---
case: returns a snapshot of the full system state
in:
  - state:
      global:
        nextLineConfig:
          manual:
            enabled: true
            requireLineCompleted: false
          auto:
            enabled: false
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "line1"
      projectData:
        story:
          initialSceneId: "scene1"
          scenes:
            scene1:
              initialSectionId: "section1"
              sections:
                section1:
                  lines:
                    - id: "line1"
                      actions: {}
out:
  global:
    nextLineConfig:
      manual:
        enabled: true
        requireLineCompleted: false
      auto:
        enabled: false
  contexts:
    - currentPointerMode: "read"
      pointers:
        read:
          sectionId: "section1"
          lineId: "line1"
  projectData:
    story:
      initialSceneId: "scene1"
      scenes:
        scene1:
          initialSectionId: "section1"
          sections:
            section1:
              lines:
                - id: "line1"
                  actions: {}
