file: "../../../src/stores/system.store.js"
group: systemStore selectors
suites:
  [
    selectCurrentPointer,
  ]
---
suite: selectCurrentPointer
exportName: selectCurrentPointer
---
case: no contexts available
in:
  - state:
      global: {}
      contexts: []
out: __undefined__
---
case: single context with read pointer
in:
  - state:
      global: {}
      contexts:
        - currentPointerMode: "read"
          pointers:
            read: { sectionId: "intro", lineId: "1" }
out:
  currentPointerMode: "read"
  pointer:
    sectionId: "intro"
    lineId: "1"
---
case: legacy history mode still resolves the read pointer
in:
  - state:
      global: {}
      contexts:
        - currentPointerMode: "history"
          pointers:
            read: { sectionId: "intro", lineId: "1" }
out:
  currentPointerMode: "read"
  pointer:
    sectionId: "intro"
    lineId: "1"
---
case: multiple contexts (should select last one)
in:
  - state:
      global: {}
      contexts:
        - currentPointerMode: "read"
          pointers:
            read: { sectionId: "intro", lineId: "1" }
        - currentPointerMode: "menu"
          pointers:
            read: { sectionId: undefined, lineId: undefined }
        - currentPointerMode: "history"
          pointers:
            read: { sectionId: "inventory", lineId: "items" }
out:
  currentPointerMode: "read"
  pointer:
    sectionId: "inventory"
    lineId: "items"
---
case: context with invalid pointer mode falls back to read
in:
  - state:
      global: {}
      contexts:
        - currentPointerMode: "nonexistent"
          pointers:
            read: { sectionId: "intro", lineId: "1" }
out:
  currentPointerMode: "read"
  pointer:
    sectionId: "intro"
    lineId: "1"
---
case: context with missing pointers object
in:
  - state:
      global: {}
      contexts:
        - currentPointerMode: "read"
out:
  currentPointerMode: "read"
---
case: context with complex pointer data
in:
  - state:
      global: {}
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: 42
              metadata: { scene: "dialogue", character: "hero" }
              flags: ["canSkip", "hasChoices"]
out:
  currentPointerMode: "read"
  pointer:
    sectionId: "section1"
    lineId: 42
    metadata: { scene: "dialogue", character: "hero" }
    flags: ["canSkip", "hasChoices"]
