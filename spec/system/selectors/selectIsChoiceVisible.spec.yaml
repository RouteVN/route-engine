file: "../../../src/stores/system.store.js"
group: systemStore selectors
suites: [selectIsChoiceVisible]
---
suite: selectIsChoiceVisible
exportName: selectIsChoiceVisible
---
case: false when no choice is active
in:
  - state:
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "line1"
                      actions: {}
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "line1"
out: false
---
case: true when current line shows a choice
in:
  - state:
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "line1"
                      actions:
                        choice:
                          resourceId: "choice-ui"
                          items: []
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "line1"
out: true
---
case: false when the choice is explicitly cleared on the current line
in:
  - state:
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "line1"
                      actions:
                        choice:
                          resourceId: "choice-ui"
                          items: []
                    - id: "line2"
                      actions:
                        choice: {}
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "line2"
out: false
---
case: false when a later line omits choice after an earlier choice line
in:
  - state:
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "line1"
                      actions:
                        choice:
                          resourceId: "choice-ui"
                          items: []
                    - id: "line2"
                      actions:
                        dialogue:
                          content:
                            - text: "after choice"
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "line2"
out: false
---
case: true when current line only updates choice animations
in:
  - state:
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "line1"
                      actions:
                        choice:
                          resourceId: "choice-ui"
                          items: []
                    - id: "line2"
                      actions:
                        choice:
                          animations:
                            resourceId: "fade"
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "line2"
out: true
