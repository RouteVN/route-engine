file: "../../../src/stores/system.store.js"
group: systemStore selectors
suites:
  - selectSectionLineChanges
---
suite: selectSectionLineChanges
exportName: selectSectionLineChanges
---
case: "Calculate changes for an entire section"
in:
  - state:
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "line1"
                      actions:
                        background:
                          resourceId: "bg-school"
                    - id: "line2"
                      actions:
                        bgm:
                          resourceId: "song-A"
                    - id: "line3"
                      actions:
                        background:
                          resourceId: "bg-home"
                        character:
                          items:
                            - id: "char-1"
                              transformId: "left"
  - sectionId: "section1"
out:
  lines:
    - id: "line1"
      changes:
        background:
          changeType: "add"
          data:
            resourceId: "bg-school"
    - id: "line2"
      changes:
        bgm:
          changeType: "add"
          data:
            resourceId: "song-A"
            loop: true
    - id: "line3"
      changes:
        background:
          changeType: "update"
          data:
            resourceId: "bg-home"
        character:
          changeType: "add"
          data:
            items:
              - id: "char-1"
                transformId: "left"
---
case: "Handle cleanAll and subsequent actions"
in:
  - state:
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                      actions:
                        background:
                          resourceId: "bg1"
                        bgm:
                          resourceId: "music1"
                    - id: "2"
                      actions:
                        cleanAll: true
                    - id: "3"
                      actions:
                        background:
                          resourceId: "bg2"
  - sectionId: "section1"
out:
  lines:
    - id: "1"
      changes:
        background:
          changeType: "add"
          data:
            resourceId: "bg1"
        bgm:
          changeType: "add"
          data:
            resourceId: "music1"
            loop: true
    - id: "2"
      changes:
        background:
          changeType: "delete"
          data:
            resourceId: "bg1"
        bgm:
          changeType: "delete"
          data:
            resourceId: "music1"
            loop: true
    - id: "3"
      changes:
        background:
          changeType: "add"
          data:
            resourceId: "bg2"
---
case: "Instantaneous actions (sfx) should not persist or show delete"
in:
  - state:
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                      actions:
                        sfx:
                          items:
                            - id: "sound1"
                              resourceId: "boom"
                    - id: "2"
                      actions:
                        dialogue:
                          content:
                            - text: "Next line"
                    - id: "3"
                      actions: {}
  - sectionId: "section1"
out:
  lines:
    - id: "1"
      changes:
        sfx:
          changeType: "add"
          data:
            items:
              - id: "sound1"
                resourceId: "boom"
    - id: "2"
      changes: {}
    - id: "3"
      changes: {}
---
case: "Detect dialogue ui addition"
in:
  - state:
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                      actions: {}
                    - id: "2"
                      actions:
                        dialogue:
                          ui:
                            resourceId: "dialogue-box"
  - sectionId: "section1"
out:
  lines:
    - id: "1"
      changes: {}
    - id: "2"
      changes:
        dialogue:
          changeType: "add"
          data:
            ui:
              resourceId: "dialogue-box"
---
case: "Detect dialogue ui removal"
in:
  - state:
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                      actions:
                        dialogue:
                          ui:
                            resourceId: "dialogue-box"
                    - id: "2"
                      actions:
                        dialogue:
                          content:
                            - text: "No more ui"
  - sectionId: "section1"
out:
  lines:
    - id: "1"
      changes:
        dialogue:
          changeType: "add"
          data:
            ui:
              resourceId: "dialogue-box"
    - id: "2"
      changes: {}
---
case: "Detect dialogue ui update"
in:
  - state:
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                      actions:
                        dialogue:
                          ui:
                            resourceId: "dialogue-box-1"
                    - id: "2"
                      actions:
                        dialogue:
                          ui:
                            resourceId: "dialogue-box-2"
  - sectionId: "section1"
out:
  lines:
    - id: "1"
      changes:
        dialogue:
          changeType: "add"
          data:
            ui:
              resourceId: "dialogue-box-1"
    - id: "2"
      changes:
        dialogue:
          changeType: "update"
          data:
            ui:
              resourceId: "dialogue-box-2"
---
case: "Ignore dialogue characterId change when ui is stable"
in:
  - state:
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                      actions:
                        dialogue:
                          ui:
                            resourceId: "dialogue-box"
                          characterId: "char1"
                    - id: "2"
                      actions:
                        dialogue:
                          characterId: "char2"
  - sectionId: "section1"
out:
  lines:
    - id: "1"
      changes:
        dialogue:
          changeType: "add"
          data:
            ui:
              resourceId: "dialogue-box"
            characterId: "char1"
    - id: "2"
      changes: {}
---
case: "Include per-line presentationState when requested"
in:
  - state:
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                      actions:
                        dialogue:
                          ui:
                            resourceId: "dialogue-box"
                          mode: "adv"
                          characterId: "char1"
                          persistCharacter: true
                          content:
                            - text: "Hello"
                    - id: "2"
                      actions:
                        dialogue:
                          content:
                            - text: "Still here"
                    - id: "3"
                      actions: {}
  - sectionId: "section1"
    includePresentationState: true
out:
  lines:
    - id: "1"
      changes:
        dialogue:
          changeType: "add"
          data:
            ui:
              resourceId: "dialogue-box"
            mode: "adv"
            characterId: "char1"
            persistCharacter: true
            content:
              - text: "Hello"
      presentationState:
        dialogue:
          ui:
            resourceId: "dialogue-box"
          mode: "adv"
          characterId: "char1"
          persistCharacter: true
          content:
            - text: "Hello"
    - id: "2"
      changes: {}
      presentationState:
        dialogue:
          ui:
            resourceId: "dialogue-box"
          mode: "adv"
          characterId: "char1"
          persistCharacter: true
          content:
            - text: "Still here"
    - id: "3"
      changes: {}
      presentationState:
        dialogue:
          ui:
            resourceId: "dialogue-box"
          mode: "adv"
          characterId: "char1"
          persistCharacter: true
---
case: "Include carried persistent background animations in per-line presentationState"
in:
  - state:
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                      actions:
                        background:
                          resourceId: "bg-school"
                          animations:
                            resourceId: "fadeIn"
                            playback:
                              continuity: "persistent"
                    - id: "2"
                      actions:
                        dialogue:
                          content:
                            - text: "Still fading"
  - sectionId: "section1"
    includePresentationState: true
out:
  lines:
    - id: "1"
      changes:
        background:
          changeType: "add"
          data:
            resourceId: "bg-school"
            animations:
              resourceId: "fadeIn"
              playback:
                continuity: "persistent"
      presentationState:
        background:
          resourceId: "bg-school"
          animations:
            resourceId: "fadeIn"
            playback:
              continuity: "persistent"
    - id: "2"
      changes: {}
      presentationState:
        background:
          resourceId: "bg-school"
          animations:
            resourceId: "fadeIn"
            playback:
              continuity: "persistent"
        dialogue:
          content:
            - text: "Still fading"
---
case: "Background animation metadata should not create duplicate next-line changes"
in:
  - state:
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                      actions:
                        background:
                          resourceId: "bg-school"
                          animations:
                            resourceId: "fadeIn"
                    - id: "2"
                      actions: {}
  - sectionId: "section1"
out:
  lines:
    - id: "1"
      changes:
        background:
          changeType: "add"
          data:
            resourceId: "bg-school"
            animations:
              resourceId: "fadeIn"
    - id: "2"
      changes: {}
---
case: "Visual animation metadata should not create duplicate next-line changes"
in:
  - state:
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                      actions:
                        visual:
                          items:
                            - id: "visual-1"
                              resourceId: "image-1"
                              transformId: "center"
                              animations:
                                resourceId: "fadeIn"
                    - id: "2"
                      actions: {}
  - sectionId: "section1"
out:
  lines:
    - id: "1"
      changes:
        visual:
          changeType: "add"
          data:
            items:
              - id: "visual-1"
                resourceId: "image-1"
                transformId: "center"
                animations:
                  resourceId: "fadeIn"
    - id: "2"
      changes: {}
---
case: "Character animation metadata should not create duplicate next-line changes"
in:
  - state:
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                      actions:
                        character:
                          items:
                            - id: "char-1"
                              transformId: "left"
                              sprites:
                                - id: "body"
                                  resourceId: "body-1"
                              animations:
                                resourceId: "fadeIn"
                    - id: "2"
                      actions: {}
  - sectionId: "section1"
out:
  lines:
    - id: "1"
      changes:
        character:
          changeType: "add"
          data:
            items:
              - id: "char-1"
                transformId: "left"
                sprites:
                  - id: "body"
                    resourceId: "body-1"
                animations:
                  resourceId: "fadeIn"
    - id: "2"
      changes: {}
