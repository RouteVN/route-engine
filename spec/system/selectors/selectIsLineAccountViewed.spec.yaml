---
case: section found in projectData but no lines array
in:
  - state:
      global:
        accountViewedRegistry:
          sections:
            - sectionId: "intro"
              lastLineId: "2"
      projectData:
        story:
          scenes:
            scene1:
              sections:
                intro: {}
                  # No lines array
  - sectionId: "intro"
    lineId: "1"
out: false
---
case: complex section structure with multiple line types
in:
  - state:
      global:
        accountViewedRegistry:
          sections:
            - sectionId: "section1"
              lastLineId: "line3"
      projectData:
        story:
          scenes:
            mainScene:
              sections:
                section1:
                  lines:
                    - id: "line1"
                      actions: {}
                    - id: "line2"
                      actions: {}
                    - id: "line3"
                      actions: {}
                    - id: "line4"
                      actions: {}
                    - id: "line5"
                      actions: {}
  - sectionId: "section1"
    lineId: "line2"
out: true
---
case: multiple sections, check viewed section
in:
  - state:
      global:
        accountViewedRegistry:
          sections:
            - sectionId: "abc"
              lastLineId: "10"
            - sectionId: "xyz"
            - sectionId: "def"
              lastLineId: "20"
  - sectionId: "xyz"
    lineId: "anyLineId"
out: true
---
case: multiple sections, check unviewed section
in:
  - state:
      global:
        accountViewedRegistry:
          sections:
            - sectionId: "abc"
              lastLineId: "10"
            - sectionId: "xyz"
              lastLineId: undefined
  - sectionId: "notfound"
    lineId: "5"
out: false
