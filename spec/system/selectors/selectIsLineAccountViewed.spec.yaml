file: "../../../src/stores/system.store.js"
group: systemStore selectors
suites: [selectIsLineAccountViewed]
---
suite: selectIsLineAccountViewed
exportName: selectIsLineAccountViewed
---
case: section not found
in:
  - state:
      global:
        accountViewedRegistry:
          sections:
            - sectionId: "abc"
              lastLineId: "10"
  - sectionId: "xyz"
    lineId: "5"
out: false
---
case: section fully viewed (lastLineId undefined) with lineId
in:
  - state:
      global:
        accountViewedRegistry:
          sections:
            - sectionId: "abc"
  - sectionId: "abc"
    lineId: "anyLineId"
out: true
---
case: section fully viewed (lastLineId undefined) without lineId
in:
  - state:
      global:
        accountViewedRegistry:
          sections:
            - sectionId: "abc"
  - sectionId: "abc"
out: true
---
case: section exists with lastLineId, no lineId provided
in:
  - state:
      global:
        accountViewedRegistry:
          sections:
            - sectionId: "abc"
              lastLineId: "10"
  - sectionId: "abc"
out: true
---
case: lineId equals lastLineId
in:
  - state:
      global:
        accountViewedRegistry:
          sections:
            - sectionId: "abc"
              lastLineId: "10"
  - sectionId: "abc"
    lineId: "10"
out: true
---
case: lineId before lastLineId (numeric comparison)
in:
  - state:
      global:
        accountViewedRegistry:
          sections:
            - sectionId: "abc"
              lastLineId: "10"
  - sectionId: "abc"
    lineId: "5"
out: false
---
case: lineId after lastLineId (numeric comparison)
in:
  - state:
      global:
        accountViewedRegistry:
          sections:
            - sectionId: "abc"
              lastLineId: "10"
  - sectionId: "abc"
    lineId: "15"
out: false
---
case: lineId before lastLineId with projectData (index comparison)
in:
  - state:
      global:
        accountViewedRegistry:
          sections:
            - sectionId: "intro"
              lastLineId: "3"
      projectData:
        story:
          scenes:
            scene1:
              sections:
                intro:
                  lines:
                    - id: "1"
                      actions: {}
                    - id: "2"
                      actions: {}
                    - id: "3"
                      actions: {}
                    - id: "4"
                      actions: {}
                    - id: "5"
                      actions: {}
  - sectionId: "intro"
    lineId: "2"
out: true
---
