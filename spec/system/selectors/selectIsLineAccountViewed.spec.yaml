                  lines:
                    - id: "1"
                      actions: {}
                    - id: "2"
                      actions: {}
                    - id: "3"
                      actions: {}
                    - id: "4"
                      actions: {}
  - sectionId: "intro"
    lineId: "3"
out: true
---
case: lineId after lastLineId with projectData
in:
  - state:
      global:
        accountViewedRegistry:
          sections:
            - sectionId: "intro"
              lastLineId: "2"
      projectData:
        story:
          scenes:
            scene1:
              sections:
                intro:
                  lines:
                    - id: "1"
                      actions: {}
                    - id: "2"
