file: "../../../src/stores/system.store.js"
group: systemStore selectors
suites: [selectDialogueHistory]
---
suite: selectDialogueHistory
exportName: selectDialogueHistory
---
case: no contexts available
in:
  - state:
      global:
        isLineCompleted: false
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                      actions:
                        dialogue:
                          content:
                            - text: "Hello"
      contexts: []
out: []
---
case: single line with dialogue at current position
in:
  - state:
      global:
        isLineCompleted: false
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                      actions:
                        dialogue:
                          characterId: "char1"
                          content:
                            - text: "Hello world"
                    - id: "2"
                      actions: {}
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "1"
out:
  - sectionId: "section1"
    lineId: "1"
    characterId: "char1"
    character:
      name: ""
    characterName: ""
    text: "Hello world"
    content:
      - text: "Hello world"
---
case: history uses character override when provided
in:
  - state:
      global:
        isLineCompleted: false
      projectData:
        resources:
          characters:
            char1:
              name: "Alice"
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                      actions:
                        dialogue:
                          characterId: "char1"
                          character:
                            name: "Alias"
                          content:
                            - text: "Hello world"
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "1"
out:
  - sectionId: "section1"
    lineId: "1"
    characterId: "char1"
    character:
      name: "Alias"
    characterName: "Alias"
    text: "Hello world"
    content:
      - text: "Hello world"
---
case: multiple lines with dialogue up to current position
in:
  - state:
      global:
        isLineCompleted: false
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                      actions:
                        dialogue:
                          characterId: "char1"
                          content:
                            - text: "First line"
                    - id: "2"
                      actions:
                        dialogue:
                          characterId: "char2"
                          content:
                            - text: "Second line"
                    - id: "3"
                      actions:
                        dialogue:
                          characterId: "char1"
                          content:
                            - text: "Third line"
                    - id: "4"
                      actions:
                        dialogue:
                          content:
                            - text: "Fourth line"
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "3"
out:
  - sectionId: "section1"
    lineId: "1"
    characterId: "char1"
    character:
      name: ""
    characterName: ""
    text: "First line"
    content:
      - text: "First line"
  - sectionId: "section1"
    lineId: "2"
    characterId: "char2"
    character:
      name: ""
    characterName: ""
    text: "Second line"
    content:
      - text: "Second line"
  - sectionId: "section1"
    lineId: "3"
    characterId: "char1"
    character:
      name: ""
    characterName: ""
    text: "Third line"
    content:
      - text: "Third line"
---
case: persistCharacter keeps the speaker across later dialogue lines
in:
  - state:
      global:
        isLineCompleted: false
      projectData:
        resources:
          characters:
            char1:
              name: "Alice"
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                      actions:
                        dialogue:
                          characterId: "char1"
                          character:
                            name: "Alias"
                          persistCharacter: true
                          content:
                            - text: "First line"
                    - id: "2"
                      actions:
                        background:
                          resourceId: "bg1"
                    - id: "3"
                      actions:
                        dialogue:
                          content:
                            - text: "Second line"
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "3"
out:
  - sectionId: "section1"
    lineId: "1"
    characterId: "char1"
    character:
      name: "Alias"
    characterName: "Alias"
    text: "First line"
    content:
      - text: "First line"
  - sectionId: "section1"
    lineId: "3"
    characterId: "char1"
    character:
      name: "Alias"
    characterName: "Alias"
    text: "Second line"
    content:
      - text: "Second line"
---
case: explicit repeated speaker id clears the alias back to the resource name
in:
  - state:
      global:
        isLineCompleted: false
      projectData:
        resources:
          characters:
            char1:
              name: "Alice"
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                      actions:
                        dialogue:
                          characterId: "char1"
                          character:
                            name: "Alias"
                          persistCharacter: true
                          content:
                            - text: "First line"
                    - id: "2"
                      actions:
                        dialogue:
                          characterId: "char1"
                          persistCharacter: true
                          content:
                            - text: "Second line"
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "2"
out:
  - sectionId: "section1"
    lineId: "1"
    characterId: "char1"
    character:
      name: "Alias"
    characterName: "Alias"
    text: "First line"
    content:
      - text: "First line"
  - sectionId: "section1"
    lineId: "2"
    characterId: "char1"
    character:
      name: "Alice"
    characterName: "Alice"
    text: "Second line"
    content:
      - text: "Second line"
---
case: lines without dialogue are filtered out
in:
  - state:
      global:
        isLineCompleted: false
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                      actions:
                        dialogue:
                          characterId: "char1"
                          content:
                            - text: "First dialogue"
                    - id: "2"
                      actions:
                        background:
                          resourceId: "bg1"
                    - id: "3"
                      actions:
                        dialogue:
                          characterId: "char2"
                          content:
                            - text: "Second dialogue"
                    - id: "4"
                      actions: {}
                    - id: "5"
                      actions:
                        dialogue:
                          content:
                            - text: "Third dialogue"
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "5"
out:
  - sectionId: "section1"
    lineId: "1"
    characterId: "char1"
    character:
      name: ""
    characterName: ""
    text: "First dialogue"
    content:
      - text: "First dialogue"
  - sectionId: "section1"
    lineId: "3"
    characterId: "char2"
    character:
      name: ""
    characterName: ""
    text: "Second dialogue"
    content:
      - text: "Second dialogue"
  - sectionId: "section1"
    lineId: "5"
    characterId: __undefined__
    character:
      name: ""
    characterName: ""
    text: "Third dialogue"
    content:
      - text: "Third dialogue"
---
case: no dialogue lines before current position
