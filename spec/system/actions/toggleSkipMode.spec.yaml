file: "../../../src/stores/system.store.js"
group: systemStore.toggleSkipMode
suites: [toggleSkipMode]
---
suite: toggleSkipMode
exportName: toggleSkipMode
---
case: toggle skip mode from false to true
in:
  - state:
      global:
        skipMode: false
        autoMode: false
        pendingEffects: []
out:
  global:
    skipMode: true
    autoMode: false
    pendingEffects:
      - name: clearSkipNextTimer
      - name: startSkipNextTimer
      - name: render
---
case: toggle skip mode from true to false
in:
  - state:
      global:
        skipMode: true
        autoMode: false
        pendingEffects: []
out:
  global:
    skipMode: false
    autoMode: false
    pendingEffects:
      - name: clearSkipNextTimer
      - name: render
---
case: toggle skip mode from false to true with auto mode enabled
in:
  - state:
      global:
        skipMode: false
        autoMode: true
        pendingEffects: []
out:
  global:
    skipMode: true
    autoMode: false
    pendingEffects:
      - name: clearAutoNextTimer
      - name: clearSkipNextTimer
      - name: startSkipNextTimer
      - name: render
---
case: toggle skip mode from true to false with auto mode enabled
in:
  - state:
      global:
        skipMode: true
        autoMode: true
        pendingEffects: []
out:
  global:
    skipMode: false
    autoMode: true
    pendingEffects:
      - name: clearSkipNextTimer
      - name: render
---
case: toggle skip mode with existing pending effects (disabled to enabled)
in:
  - state:
      global:
        skipMode: false
        autoMode: false
        pendingEffects:
          - name: existingEffect
            data: test
out:
  global:
    skipMode: true
    autoMode: false
    pendingEffects:
      - name: existingEffect
        data: test
      - name: clearSkipNextTimer
      - name: startSkipNextTimer
      - name: render
---
case: toggle skip mode with existing pending effects (enabled to disabled)
in:
  - state:
      global:
        skipMode: true
        autoMode: false
        pendingEffects:
          - name: existingEffect
            data: test
out:
  global:
    skipMode: false
    autoMode: false
    pendingEffects:
      - name: existingEffect
        data: test
      - name: clearSkipNextTimer
      - name: render
---
case: do not toggle skip mode on when a choice is visible
in:
  - state:
      global:
        skipMode: false
        autoMode: false
        pendingEffects: []
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                      actions:
                        choice:
                          resourceId: "choice-ui"
                          items: []
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "1"
out:
  projectData:
    story:
      scenes:
        scene1:
          sections:
            section1:
              lines:
                - id: "1"
                  actions:
                    choice:
                      resourceId: "choice-ui"
                      items: []
  contexts:
    - currentPointerMode: "read"
      pointers:
        read:
          sectionId: "section1"
          lineId: "1"
  global:
    skipMode: false
    autoMode: false
    pendingEffects: []
