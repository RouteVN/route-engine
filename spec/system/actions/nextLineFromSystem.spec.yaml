file: "../../../src/stores/system.store.js"
group: systemStore.nextLineFromSystem
suites: [nextLineFromSystem]
---
suite: nextLineFromSystem
exportName: nextLineFromSystem
---
case: show dialogue UI instead of advancing when hidden
in:
  - state:
      global:
        isLineCompleted: true
        dialogueUIHidden: true
        nextLineConfig:
          auto: { enabled: false }
        pendingEffects: []
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                    - id: "2"
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "1"
out:
  global:
    isLineCompleted: true
    dialogueUIHidden: false
    nextLineConfig:
      auto: { enabled: false }
    pendingEffects:
      - name: "render"
  projectData:
    story:
      scenes:
        scene1:
          sections:
            section1:
              lines:
                - id: "1"
                - id: "2"
  contexts:
    - currentPointerMode: "read"
      pointers:
        read:
          sectionId: "section1"
          lineId: "1"
---
case: advance to next line when auto is disabled
in:
  - state:
      global:
        isLineCompleted: true
        viewedRegistry:
          sections: []
        nextLineConfig:
          auto: { enabled: false }
        pendingEffects: []
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                    - id: "2"
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "1"
out:
  global:
    isLineCompleted: false
    viewedRegistry:
      sections:
        - sectionId: "section1"
          lastLineId: "1"
    nextLineConfig:
      auto: { enabled: false }
    pendingEffects:
      - name: "handleLineActions"
  projectData:
    story:
      scenes:
        scene1:
          sections:
            section1:
              lines:
                - id: "1"
                - id: "2"
  contexts:
    - currentPointerMode: "read"
      pointers:
        read:
          sectionId: "section1"
          lineId: "2"
      rollback:
        currentIndex: 1
        isRestoring: false
        replayStartIndex: 1
        timeline:
          - sectionId: "section1"
            lineId: "1"
            rollbackPolicy: "free"
          - sectionId: "section1"
            lineId: "2"
            rollbackPolicy: "free"
---
case: advance to next line when auto is enabled with fromStart trigger (re-queues timer)
in:
  - state:
      global:
        isLineCompleted: true
        viewedRegistry:
          sections: []
        nextLineConfig:
          auto:
            enabled: true
            trigger: "fromStart"
            delay: 1500
        pendingEffects: []
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                    - id: "2"
                    - id: "3"
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "1"
out:
  global:
    isLineCompleted: false
    viewedRegistry:
      sections:
        - sectionId: "section1"
          lastLineId: "1"
    nextLineConfig:
      auto:
        enabled: true
        trigger: "fromStart"
        delay: 1500
    pendingEffects:
      - name: "handleLineActions"
      - name: "nextLineConfigTimer"
        payload:
          delay: 1500
  projectData:
    story:
      scenes:
        scene1:
          sections:
            section1:
              lines:
                - id: "1"
                - id: "2"
                - id: "3"
  contexts:
    - currentPointerMode: "read"
      pointers:
        read:
          sectionId: "section1"
          lineId: "2"
      rollback:
        currentIndex: 1
        isRestoring: false
        replayStartIndex: 1
        timeline:
          - sectionId: "section1"
            lineId: "1"
            rollbackPolicy: "free"
          - sectionId: "section1"
            lineId: "2"
            rollbackPolicy: "free"
---
case: advance to a choice line stops active playback and clears timers
in:
  - state:
      global:
        isLineCompleted: true
        autoMode: true
        skipMode: true
        variables:
          _skipUnseenText: true
        viewedRegistry:
          sections: []
        nextLineConfig:
          auto:
            enabled: true
            trigger: "fromStart"
            delay: 1500
        pendingEffects: []
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                    - id: "2"
                      actions:
                        choice:
                          resourceId: "choice-ui"
                          items: []
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "1"
out:
  global:
    isLineCompleted: false
    autoMode: false
    skipMode: false
    variables:
      _skipUnseenText: true
    viewedRegistry:
      sections:
        - sectionId: "section1"
          lastLineId: "1"
    nextLineConfig:
      auto:
        enabled: true
        trigger: "fromStart"
        delay: 1500
    pendingEffects:
      - name: "clearAutoNextTimer"
      - name: "clearSkipNextTimer"
      - name: "clearNextLineConfigTimer"
      - name: "handleLineActions"
  projectData:
    story:
      scenes:
        scene1:
          sections:
            section1:
              lines:
                - id: "1"
                - id: "2"
                  actions:
                    choice:
                      resourceId: "choice-ui"
                      items: []
  contexts:
    - currentPointerMode: "read"
      pointers:
        read:
          sectionId: "section1"
          lineId: "2"
      rollback:
        currentIndex: 1
        isRestoring: false
        replayStartIndex: 1
        timeline:
          - sectionId: "section1"
            lineId: "1"
            rollbackPolicy: "free"
          - sectionId: "section1"
            lineId: "2"
            rollbackPolicy: "free"
---
case: advance resets singleLine applyMode config and does not re-queue timer
in:
  - state:
      global:
        isLineCompleted: true
        viewedRegistry:
          sections: []
        nextLineConfig:
          auto:
            enabled: true
            trigger: "fromStart"
            delay: 1500
          applyMode: "singleLine"
        pendingEffects: []
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                    - id: "2"
                    - id: "3"
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "1"
out:
  global:
    isLineCompleted: false
    viewedRegistry:
      sections:
        - sectionId: "section1"
          lastLineId: "1"
    nextLineConfig:
      manual:
        enabled: true
        requireLineCompleted: false
      auto:
        enabled: false
      applyMode: "persistent"
    pendingEffects:
      - name: "clearNextLineConfigTimer"
      - name: "handleLineActions"
  projectData:
    story:
      scenes:
        scene1:
          sections:
            section1:
              lines:
                - id: "1"
                - id: "2"
                - id: "3"
  contexts:
    - currentPointerMode: "read"
      pointers:
        read:
          sectionId: "section1"
          lineId: "2"
      rollback:
        currentIndex: 1
        isRestoring: false
        replayStartIndex: 1
        timeline:
          - sectionId: "section1"
            lineId: "1"
            rollbackPolicy: "free"
          - sectionId: "section1"
            lineId: "2"
            rollbackPolicy: "free"
---
