---
case: do not advance when a choice is on screen
in:
  - state:
      global:
        isLineCompleted: true
        nextLineConfig:
          auto:
            enabled: true
            trigger: "fromStart"
            delay: 1200
        pendingEffects: []
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                      actions:
                        choice:
                          resourceId: "choice-ui"
                          items:
                            - id: "option-1"
                              content: "Go"
                    - id: "2"
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "1"
out:
  global:
    isLineCompleted: true
    nextLineConfig:
      auto:
        enabled: true
        trigger: "fromStart"
        delay: 1200
    pendingEffects: []
  projectData:
    story:
      scenes:
        scene1:
          sections:
            section1:
              lines:
                - id: "1"
                  actions:
                    choice:
                      resourceId: "choice-ui"
                      items:
                        - id: "option-1"
                          content: "Go"
                - id: "2"
  contexts:
    - currentPointerMode: "read"
