                    - id: "2"
                    - id: "3"
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "1"
out:
  global:
    isLineCompleted: false
    nextLineConfig:
      auto:
        enabled: true
        trigger: "fromComplete"
        delay: 2000
    pendingEffects:
      - name: "handleLineActions"
    viewedRegistry:
      sections:
        - sectionId: "section1"
          lastLineId: "1"
  projectData:
    story:
      scenes:
        scene1:
          sections:
            section1:
              lines:
                - id: "1"
                - id: "2"
                - id: "3"
  contexts:
    - currentPointerMode: "read"
      pointers:
        read:
          sectionId: "section1"
          lineId: "2"
      rollback:
        currentIndex: 1
        isRestoring: false
        replayStartIndex: 1
        timeline:
          - sectionId: "section1"
            lineId: "1"
            rollbackPolicy: "free"
          - sectionId: "section1"
            lineId: "2"
            rollbackPolicy: "free"
