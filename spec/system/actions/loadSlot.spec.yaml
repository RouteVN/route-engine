throws: "Malformed save slot viewedRegistry.resources."
---
case: load normalizes older viewed registry entries and context variables
in:
  - state:
      projectData:
        resources:
          variables:
            playerName:
              type: string
              scope: context
              default: Guest
            score:
              type: number
              scope: context
              default: 0
            soundEnabled:
              type: boolean
              scope: context
              default: false
        story:
          scenes:
            scene1:
              sections:
                sec1:
                  lines:
                    - id: line1
                      actions: {}
                sec2:
                  lines:
                    - id: line2
                      actions: {}
      global:
        saveSlots:
          "1":
            formatVersion: 1
            slotId: 1
            savedAt: 1704110400
            image: save.png
            state:
              viewedRegistry:
                sections: [sec2]
                resources: [bg-1]
              contexts:
                - pointers:
                    read:
                      sectionId: sec2
                      lineId: line2
                  variables:
                    playerName: Alice
                    score: 150
                    soundEnabled: true
        viewedRegistry:
          sections: []
          resources: []
        pendingEffects: []
      contexts:
        - pointers:
            read:
              sectionId: sec1
              lineId: line1
          variables:
            playerName: Guest
            score: 0
            soundEnabled: false
  - slotId: 1
out:
  projectData:
    resources:
      variables:
        playerName:
          type: string
          scope: context
          default: Guest
        score:
          type: number
          scope: context
          default: 0
        soundEnabled:
          type: boolean
          scope: context
          default: false
    story:
      scenes:
        scene1:
          sections:
            sec1:
              lines:
                - id: line1
                  actions: {}
            sec2:
              lines:
                - id: line2
                  actions: {}
  global:
    autoMode: false
    skipMode: false
    dialogueUIHidden: false
    overlayStack: []
    isLineCompleted: true
    nextLineConfig:
      manual:
        enabled: true
        requireLineCompleted: false
      auto:
        enabled: false
      applyMode: persistent
    saveSlots:
      "1":
        formatVersion: 1
        slotId: 1
        savedAt: 1704110400
        image: save.png
        state:
          viewedRegistry:
            sections: [sec2]
            resources: [bg-1]
          contexts:
            - pointers:
                read:
                  sectionId: sec2
                  lineId: line2
              variables:
                playerName: Alice
                score: 150
                soundEnabled: true
    viewedRegistry:
      sections:
        - sectionId: sec2
      resources:
        - resourceId: bg-1
    pendingEffects:
      - name: clearAutoNextTimer
      - name: clearSkipNextTimer
      - name: clearNextLineConfigTimer
      - name: render
        payload:
          allowRestoredInheritedPersistentBackgroundAnimations: true
  contexts:
    - currentPointerMode: read
      pointers:
        read:
          sceneId: scene1
          sectionId: sec2
          lineId: line2
        history:
          sectionId: __undefined__
          lineId: __undefined__
      configuration: {}
      views: []
      bgm:
        resourceId: __undefined__
      variables:
        playerName: Alice
        score: 150
        soundEnabled: true
      rollback:
        currentIndex: 0
        isRestoring: false
        replayStartIndex: 1
        timeline:
          - sectionId: sec2
            lineId: line2
            rollbackPolicy: free
---
case: load preserves rollback timeline from save data
in:
