            state:
              viewedRegistry:
                sections: {}
              contexts:
                - pointers:
                    read:
                      sectionId: sec1
                      lineId: line1
        pendingEffects: []
  - slotId: 2
throws: "Malformed save slot viewedRegistry.sections."
