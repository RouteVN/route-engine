file: "../../../src/stores/system.store.js"
group: systemStore.loadSlot
suites: [loadSlot]
---
suite: loadSlot
exportName: loadSlot
---
case: throw when slotId is missing
in:
  - state:
      global:
        saveSlots: {}
        pendingEffects: []
  - {}
throws: "loadSlot requires slotId"
---
case: load throws when save slot formatVersion is missing
in:
  - state:
      projectData:
        story:
          scenes:
            scene1:
              sections:
                sec1:
                  lines:
                    - id: line1
                      actions: {}
      global:
        saveSlots:
          "2":
            slotId: 2
            savedAt: 1704110500
            image: save2.png
            state:
              contexts:
                - pointers:
                    read:
                      sectionId: sec1
                      lineId: line1
        pendingEffects: []
  - slotId: 2
throws: "Malformed save slot formatVersion."
---
case: load from existing slot resets transient runtime state
in:
  - state:
      projectData:
        story:
          scenes:
            scene1:
              sections:
                sec2:
                  lines:
                    - id: line2
                      actions: {}
      global:
        autoMode: true
        skipMode: true
        dialogueUIHidden: true
        overlayStack:
          - resourceId: overlay
        nextLineConfig:
          manual:
            enabled: false
            requireLineCompleted: true
          auto:
            enabled: true
            trigger: fromStart
            delay: 250
          applyMode: singleLine
        confirmDialog:
          resourceId: saveOverwriteConfirmLayout
          confirmActions:
            saveSlot:
              slotId: 1
            hideConfirmDialog: {}
          cancelActions:
            hideConfirmDialog: {}
        saveSlots:
          "1":
            formatVersion: 1
            slotId: 1
            savedAt: 1704110400
            image: save.png
            state:
              contexts:
                - pointers:
                    read:
                      sectionId: sec2
                      lineId: line2
        pendingEffects:
          - name: existingEffect
  - slotId: 1
out:
  projectData:
    story:
      scenes:
        scene1:
          sections:
            sec2:
              lines:
                - id: line2
                  actions: {}
  global:
    autoMode: false
    skipMode: false
    dialogueUIHidden: false
    overlayStack: []
    isLineCompleted: true
    confirmDialog: null
    viewedRegistry:
      sections: []
      resources: []
    nextLineConfig:
      manual:
        enabled: true
        requireLineCompleted: false
      auto:
        enabled: false
      applyMode: persistent
    saveSlots:
      "1":
        formatVersion: 1
        slotId: 1
        savedAt: 1704110400
        image: save.png
        state:
          contexts:
            - pointers:
                read:
                  sectionId: sec2
                  lineId: line2
    pendingEffects:
      - name: existingEffect
      - name: clearAutoNextTimer
      - name: clearSkipNextTimer
      - name: clearNextLineConfigTimer
      - name: render
        payload:
          allowRestoredInheritedPersistentBackgroundAnimations: true
  contexts:
    - currentPointerMode: read
      pointers:
        read:
          sceneId: scene1
          sectionId: sec2
          lineId: line2
        history:
          sectionId: __undefined__
          lineId: __undefined__
      configuration: {}
      views: []
      bgm:
        resourceId: __undefined__
      variables: {}
      rollback:
        currentIndex: 0
        isRestoring: false
        replayStartIndex: 1
        timeline:
          - sectionId: sec2
            lineId: line2
            rollbackPolicy: free
---
case: load from non-existent slot
in:
  - state:
      global:
        saveSlots: {}
        pendingEffects: []
  - slotId: 99
out:
  global:
    saveSlots: {}
    pendingEffects: []
---
case: load throws when slot state has no contexts
in:
  - state:
      projectData:
        story:
          scenes:
            scene1:
              sections:
                sec1:
                  lines:
                    - id: line1
                      actions: {}
      global:
        saveSlots:
          "2":
            formatVersion: 1
            slotId: 2
            savedAt: 1704110500
            image: save2.png
            state:
              level: 10
        pendingEffects: []
  - slotId: 2
throws: "Malformed save slot state: contexts must be a non-empty array."
---
case: load throws when save slot formatVersion is unsupported
in:
  - state:
      projectData:
        story:
          scenes:
            scene1:
              sections:
                sec1:
                  lines:
                    - id: line1
                      actions: {}
      global:
        saveSlots:
          "2":
            formatVersion: 2
            slotId: 2
            savedAt: 1704110500
            image: save2.png
            state:
              contexts:
                - pointers:
                    read:
                      sectionId: sec1
                      lineId: line1
        pendingEffects: []
  - slotId: 2
throws: 'Unsupported save slot formatVersion "2".'
