      projectData:
        resources:
          variables:
            score:
              type: number
              scope: context
              default: 0
        story:
          scenes:
            scene1:
              sections:
                sec1:
                  lines:
                    - id: line1
                      actions: {}
                    - id: line2
                      actions: {}
                sec2:
                  lines:
                    - id: line3
                      actions: {}
      global:
        saveSlots:
          "4":
            formatVersion: 1
            slotId: 4
            savedAt: 1704110600
            image: save4.png
            state:
              viewedRegistry:
                sections:
                  - sectionId: sec2
                    lastLineId: line3
                resources: []
              contexts:
                - pointers:
                    read:
                      sectionId: sec2
                      lineId: line3
                  variables:
                    score: 15
                  rollback:
                    currentIndex: 2
                    isRestoring: false
                    replayStartIndex: 0
