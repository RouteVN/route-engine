file: "../../../src/stores/system.store.js"
group: systemStore.startAutoMode
suites: [startAutoMode]
---
suite: startAutoMode
exportName: startAutoMode
---
case: start auto mode
in:
  - state:
      global:
        autoMode: false
        isLineCompleted: false
        pendingEffects: []
        variables:
          _autoForwardTime: 1000
out:
  global:
    autoMode: true
    isLineCompleted: false
    variables:
      _autoForwardTime: 1000
    pendingEffects:
      - name: clearAutoNextTimer
      - name: render
---
case: start auto mode when already enabled
in:
  - state:
      global:
        autoMode: true
        isLineCompleted: false
        pendingEffects: []
        variables:
          _autoForwardTime: 1000
out:
  global:
    autoMode: true
    isLineCompleted: false
    variables:
      _autoForwardTime: 1000
    pendingEffects:
      - name: clearAutoNextTimer
      - name: render
---
case: start auto mode when line already completed (starts timer immediately)
in:
  - state:
      global:
        autoMode: false
        isLineCompleted: true
        pendingEffects: []
        variables:
          _autoForwardTime: 1000
out:
  global:
    autoMode: true
    isLineCompleted: true
    variables:
      _autoForwardTime: 1000
    pendingEffects:
      - name: clearAutoNextTimer
      - name: startAutoNextTimer
        payload:
          delay: 1000
      - name: render
---
case: start auto mode with custom _autoForwardTime
in:
  - state:
      global:
        autoMode: false
        isLineCompleted: true
        pendingEffects: []
        variables:
          _autoForwardTime: 2500
out:
  global:
    autoMode: true
    isLineCompleted: true
    variables:
      _autoForwardTime: 2500
    pendingEffects:
      - name: clearAutoNextTimer
      - name: startAutoNextTimer
        payload:
          delay: 2500
      - name: render
---
case: start auto mode with default _autoForwardTime (not set)
in:
  - state:
      global:
        autoMode: false
        isLineCompleted: true
        pendingEffects: []
        variables: {}
out:
  global:
    autoMode: true
    isLineCompleted: true
    variables: {}
    pendingEffects:
      - name: clearAutoNextTimer
      - name: startAutoNextTimer
        payload:
          delay: 1000
      - name: render
---
case: do not start auto mode when a choice is visible
in:
  - state:
      global:
        autoMode: false
        isLineCompleted: true
        pendingEffects: []
        variables:
          _autoForwardTime: 1000
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                      actions:
                        choice:
                          resourceId: "choice-ui"
                          items: []
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "1"
out:
  projectData:
    story:
      scenes:
        scene1:
          sections:
            section1:
              lines:
                - id: "1"
                  actions:
                    choice:
                      resourceId: "choice-ui"
                      items: []
  contexts:
    - currentPointerMode: "read"
      pointers:
        read:
          sectionId: "section1"
          lineId: "1"
  global:
    autoMode: false
    isLineCompleted: true
    variables:
      _autoForwardTime: 1000
    pendingEffects: []
