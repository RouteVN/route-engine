file: "../../../src/stores/system.store.js"
group: systemStore.loadSlot
suites: [loadSlot]
---
suite: loadSlot
exportName: loadSlot
---
case: load from existing slot
in:
  - state:
      global:
        confirmDialog:
          resourceId: saveOverwriteConfirmLayout
          confirmActions:
            saveSlot:
              slotId: 1
            hideConfirmDialog: {}
          cancelActions:
            hideConfirmDialog: {}
        saveSlots:
          "1":
            slotId: 1
            savedAt: 1704110400
            image: "save.png"
            state:
              projectData: { story: { initialSceneId: "loaded" } }
              global:
              contexts:
                - pointers:
                    read: { sectionId: "sec2", lineId: "line2" }
        pendingEffects: []
  - slotId: 1
out:
  global:
    confirmDialog: null
    saveSlots:
      "1":
        slotId: 1
        savedAt: 1704110400
        image: "save.png"
        state:
          projectData: { story: { initialSceneId: "loaded" } }
          global:
          contexts:
            - pointers:
                read: { sectionId: "sec2", lineId: "line2" }
    viewedRegistry: __undefined__
    pendingEffects:
      - name: "render"
  contexts:
    - pointers:
        read: { sectionId: "sec2", lineId: "line2" }
      rollback:
        currentIndex: 0
        isRestoring: false
        replayStartIndex: 1
        timeline:
          - sectionId: "sec2"
            lineId: "line2"
            rollbackPolicy: "free"
---
case: load from non-existent slot
in:
  - state:
      global:
        saveSlots: {}
        pendingEffects: []
  - slotId: 99
out:
  global:
    saveSlots: {}
    pendingEffects: []
---
case: load from slot 2
in:
  - state:
      global:
        saveSlots:
          "2":
            slotId: 2
            savedAt: 1704110500
            image: "save2.png"
            state:
              level: 10
        pendingEffects: []
  - slotId: 2
out:
  global:
    saveSlots:
      "2":
        slotId: 2
        savedAt: 1704110500
        image: "save2.png"
        state:
          level: 10
    viewedRegistry: __undefined__
    pendingEffects:
      - name: "render"
  contexts: __undefined__
---
case: load with existing pending effects
in:
  - state:
      global:
        saveSlots:
          "1":
            slotId: 1
            savedAt: 1704110400
            image: "save.png"
            state:
              level: 5
        pendingEffects:
          - name: "existingEffect"
  - slotId: 1
out:
  global:
    saveSlots:
      "1":
        slotId: 1
        savedAt: 1704110400
        image: "save.png"
        state:
          level: 5
    viewedRegistry: __undefined__
    pendingEffects:
      - name: "existingEffect"
      - name: "render"
  contexts: __undefined__
---
case: load with context variables
in:
  - state:
      global:
        saveSlots:
          "1":
            slotId: 1
            savedAt: 1704110400
            image: "save.png"
            state:
              viewedRegistry:
                sections: ["sec2"]
                resources: []
              contexts:
                - pointers:
                    read: { sectionId: "sec2", lineId: "line2" }
                  variables:
                    playerName: "Alice"
                    score: 150
                    soundEnabled: true
        viewedRegistry:
          sections: []
          resources: []
        pendingEffects: []
      contexts:
        - pointers:
            read: { sectionId: "sec1", lineId: "line1" }
          variables:
            playerName: "Guest"
            score: 0
            soundEnabled: false
  - slotId: 1
out:
  global:
    saveSlots:
      "1":
        slotId: 1
        savedAt: 1704110400
        image: "save.png"
        state:
          viewedRegistry:
            sections: ["sec2"]
            resources: []
          contexts:
            - pointers:
                read: { sectionId: "sec2", lineId: "line2" }
              variables:
                playerName: "Alice"
                score: 150
                soundEnabled: true
    viewedRegistry:
      sections: ["sec2"]
      resources: []
    pendingEffects:
      - name: "render"
  contexts:
    - pointers:
        read: { sectionId: "sec2", lineId: "line2" }
      variables:
        playerName: "Alice"
        score: 150
        soundEnabled: true
      rollback:
        currentIndex: 0
        isRestoring: false
        replayStartIndex: 1
        timeline:
          - sectionId: "sec2"
            lineId: "line2"
            rollbackPolicy: "free"
---
case: load preserves rollback timeline from save data
in:
  - state:
      global:
        saveSlots:
          "4":
            slotId: 4
            savedAt: 1704110600
            image: "save4.png"
            state:
              viewedRegistry:
                sections:
                  - sectionId: "sec2"
                    lastLineId: "line3"
                resources: []
              contexts:
                - pointers:
                    read: { sectionId: "sec2", lineId: "line3" }
                  variables:
                    score: 15
                  rollback:
                    currentIndex: 2
                    isRestoring: false
                    replayStartIndex: 0
                    timeline:
                      - sectionId: "sec1"
                        lineId: "line1"
                        rollbackPolicy: "free"
                      - sectionId: "sec1"
                        lineId: "line2"
                        rollbackPolicy: "free"
                      - sectionId: "sec2"
                        lineId: "line3"
                        rollbackPolicy: "free"
        pendingEffects: []
  - slotId: 4
out:
  global:
    saveSlots:
      "4":
        slotId: 4
        savedAt: 1704110600
        image: "save4.png"
        state:
          viewedRegistry:
            sections:
              - sectionId: "sec2"
                lastLineId: "line3"
            resources: []
          contexts:
            - pointers:
                read: { sectionId: "sec2", lineId: "line3" }
              variables:
                score: 15
              rollback:
                currentIndex: 2
                isRestoring: false
                replayStartIndex: 0
                timeline:
                  - sectionId: "sec1"
                    lineId: "line1"
                    rollbackPolicy: "free"
                  - sectionId: "sec1"
                    lineId: "line2"
                    rollbackPolicy: "free"
                  - sectionId: "sec2"
                    lineId: "line3"
                    rollbackPolicy: "free"
    viewedRegistry:
      sections:
        - sectionId: "sec2"
          lastLineId: "line3"
      resources: []
    pendingEffects:
      - name: "render"
  contexts:
    - pointers:
        read: { sectionId: "sec2", lineId: "line3" }
      variables:
        score: 15
      rollback:
        currentIndex: 2
        isRestoring: false
        replayStartIndex: 0
        timeline:
          - sectionId: "sec1"
            lineId: "line1"
            rollbackPolicy: "free"
          - sectionId: "sec1"
            lineId: "line2"
            rollbackPolicy: "free"
          - sectionId: "sec2"
            lineId: "line3"
            rollbackPolicy: "free"
