---
case: transition to a choice line stops playback and clears the scene timer
in:
  - state:
      global:
        isLineCompleted: true
        autoMode: true
        skipMode: true
        nextLineConfig:
          manual:
            enabled: true
          auto:
            enabled: true
            trigger: "fromStart"
            delay: 1500
        isDialogueUIVisible: true
        pendingEffects: []
      projectData:
        story:
          initialSceneId: "scene1"
          scenes:
            scene1:
              initialSectionId: "section1"
              sections:
                section1:
                  lines:
                    - id: "1"
                      actions: {}
                section2:
                  lines:
                    - id: "10"
                      actions:
                        choice:
                          resourceId: "choice-ui"
                          items: []
      contexts:
        - currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "1"
  - sectionId: "section2"
out:
  global:
    isLineCompleted: false
    autoMode: false
    skipMode: false
    nextLineConfig:
      manual:
        enabled: true
      auto:
        enabled: true
        trigger: "fromStart"
        delay: 1500
    isDialogueUIVisible: true
    pendingEffects:
      - name: "clearAutoNextTimer"
      - name: "render"
      - name: "clearSkipNextTimer"
      - name: "clearNextLineConfigTimer"
      - name: "handleLineActions"
  projectData:
    story:
      initialSceneId: "scene1"
      scenes:
        scene1:
          initialSectionId: "section1"
          sections:
            section1:
              lines:
                - id: "1"
                  actions: {}
            section2:
              lines:
                - id: "10"
                  actions:
                    choice:
                      resourceId: "choice-ui"
                      items: []
  contexts:
    - currentPointerMode: "read"
      pointers:
        read:
          sectionId: "section2"
          lineId: "10"
      rollback:
        currentIndex: 1
        isRestoring: false
        replayStartIndex: 1
        timeline:
          - sectionId: "section1"
            lineId: "1"
            rollbackPolicy: "free"
          - sectionId: "section2"
            lineId: "10"
            rollbackPolicy: "free"
