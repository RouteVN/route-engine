file: "../../../src/stores/system.store.js"
group: systemStore.rollbackByOffset
suites: [rollbackByOffset]
---
suite: rollbackByOffset
exportName: rollbackByOffset
---
case: throws error for positive offset
in:
  - state:
      projectData:
        story:
          scenes: {}
        resources:
          variables: {}
      global:
        pendingEffects: []
      contexts:
        - variables: {}
          pointers:
            read:
              sectionId: "section1"
              lineId: "1"
  - offset: 1
throws: "rollbackByOffset requires a negative offset"
---
case: throws error for zero offset
in:
  - state:
      projectData:
        story:
          scenes: {}
        resources:
          variables: {}
      global:
        pendingEffects: []
      contexts:
        - variables: {}
          pointers:
            read:
              sectionId: "section1"
              lineId: "1"
  - offset: 0
throws: "rollbackByOffset requires a negative offset"
---
case: defaults to offset -1 when not specified
in:
  - state:
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                    - id: "2"
        resources:
          variables: {}
      global:
        isLineCompleted: true
        pendingEffects: []
      contexts:
        - variables: {}
          currentPointerMode: "read"
          pointers:
            read:
              sectionId: "section1"
              lineId: "2"
            history: {}
          rollback:
            currentIndex: 1
            isRestoring: false
            replayStartIndex: 0
            timeline:
              - sectionId: "section1"
                lineId: "1"
                rollbackPolicy: "free"
              - sectionId: "section1"
                lineId: "2"
                rollbackPolicy: "free"
  - {}
out:
  projectData:
    story:
      scenes:
        scene1:
          sections:
            section1:
              lines:
                - id: "1"
                - id: "2"
    resources:
      variables: {}
  global:
    isLineCompleted: true
    dialogueUIHidden: false
    overlayStack: []
    nextLineConfig:
      manual:
        enabled: true
        requireLineCompleted: false
      auto:
        enabled: false
      applyMode: "persistent"
    pendingEffects:
      - name: "clearNextLineConfigTimer"
      - name: "render"
  contexts:
    - variables: {}
      currentPointerMode: "read"
      pointers:
        read:
          sectionId: "section1"
          lineId: "1"
        history:
          sectionId: null
          lineId: null
      rollback:
        currentIndex: 0
        isRestoring: false
        replayStartIndex: 0
        timeline:
          - sectionId: "section1"
            lineId: "1"
            rollbackPolicy: "free"
          - sectionId: "section1"
            lineId: "2"
            rollbackPolicy: "free"
