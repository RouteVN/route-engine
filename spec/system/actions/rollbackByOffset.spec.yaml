          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                    - id: "2"
                      actions:
                        setNextLineConfig:
                          auto:
                            enabled: true
                            trigger: "fromComplete"
                            delay: 750
                    - id: "3"
        resources:
          variables: {}
      global:
        isLineCompleted: false
        nextLineConfig:
          manual:
            enabled: true
            requireLineCompleted: false
