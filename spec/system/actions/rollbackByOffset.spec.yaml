---
case: rolls back across sections using rollback timeline replay
in:
  - state:
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                    - id: "2"
                      actions:
                        setNextLineConfig:
                          manual:
                            enabled: false
                            requireLineCompleted: true
                        updateVariable:
                          id: "set-score-10"
                          operations:
                            - variableId: score
                              op: set
                              value: 10
                section2:
                  lines:
                    - id: "10"
                      actions:
                        updateVariable:
                          id: "add-score-5"
                          operations:
                            - variableId: score
                              op: add
                              value: 5
                    - id: "11"
        resources:
          variables:
            score:
              type: number
              scope: context
              default: 0
      global:
        isLineCompleted: false
        nextLineConfig:
          manual:
            enabled: true
            requireLineCompleted: false
          auto:
            enabled: false
          applyMode: "persistent"
        pendingEffects: []
      contexts:
        - variables:
            score: 15
          currentPointerMode: "history"
          pointers:
            read:
              sectionId: "section2"
              lineId: "10"
            history:
              sectionId: "section2"
              lineId: "11"
          rollback:
            currentIndex: 2
            isRestoring: false
            replayStartIndex: 0
            timeline:
              - sectionId: "section1"
                lineId: "1"
                rollbackPolicy: "free"
              - sectionId: "section1"
                lineId: "2"
                rollbackPolicy: "free"
              - sectionId: "section2"
                lineId: "10"
                rollbackPolicy: "free"
  - offset: -1
out:
  projectData:
    story:
      scenes:
        scene1:
          sections:
            section1:
              lines:
                - id: "1"
                - id: "2"
                  actions:
                    setNextLineConfig:
                      manual:
                        enabled: false
                        requireLineCompleted: true
                    updateVariable:
                      id: "set-score-10"
                      operations:
                        - variableId: score
                          op: set
                          value: 10
            section2:
              lines:
                - id: "10"
                  actions:
                    updateVariable:
                      id: "add-score-5"
                      operations:
                        - variableId: score
                          op: add
                          value: 5
                - id: "11"
    resources:
      variables:
        score:
          type: number
          scope: context
          default: 0
  global:
    isLineCompleted: true
    dialogueUIHidden: false
    overlayStack: []
    nextLineConfig:
      manual:
        enabled: false
        requireLineCompleted: true
      auto:
        enabled: false
      applyMode: "persistent"
    pendingEffects:
      - name: "clearNextLineConfigTimer"
      - name: "render"
  contexts:
    - variables:
        score: 10
      currentPointerMode: "read"
      pointers:
        read:
          sectionId: "section1"
          lineId: "2"
        history:
          sectionId: null
          lineId: null
      rollback:
        currentIndex: 1
        isRestoring: false
        replayStartIndex: 0
        timeline:
          - sectionId: "section1"
            lineId: "1"
            rollbackPolicy: "free"
          - sectionId: "section1"
            lineId: "2"
            rollbackPolicy: "free"
          - sectionId: "section2"
            lineId: "10"
            rollbackPolicy: "free"
---
case: restores nextLineConfig auto without restarting scene timer
