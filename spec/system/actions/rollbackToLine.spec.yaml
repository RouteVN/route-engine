file: "../../../src/stores/system.store.js"
group: systemStore.rollbackToLine
suites: [rollbackToLine]
---
suite: rollbackToLine
exportName: rollbackToLine
---
case: restores target checkpoint state inclusively
in:
  - state:
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                    - id: "2"
                      actions:
                        updateVariable:
                          id: "act1"
                          operations:
                            - variableId: score
                              op: set
                              value: 15
                    - id: "3"
                      actions:
                        updateVariable:
                          id: "act2"
                          operations:
                            - variableId: score
                              op: increment
                              value: 10
                    - id: "4"
        resources:
          variables:
            score:
              type: number
              scope: context
              default: 0
      global:
        isLineCompleted: false
        pendingEffects: []
      contexts:
        - variables:
            score: 25
          currentPointerMode: "history"
          pointers:
            read:
              sectionId: "section1"
              lineId: "4"
            history:
              sectionId: "section1"
              lineId: "2"
          rollback:
            currentIndex: 3
            isRestoring: false
            replayStartIndex: 0
            baselineVariables:
              score: 0
            timeline:
              - sectionId: "section1"
                lineId: "1"
                rollbackPolicy: "free"
              - sectionId: "section1"
                lineId: "2"
                rollbackPolicy: "free"
              - sectionId: "section1"
                lineId: "3"
                rollbackPolicy: "free"
              - sectionId: "section1"
                lineId: "4"
                rollbackPolicy: "free"
  - sectionId: "section1"
    lineId: "3"
out:
  projectData:
    story:
      scenes:
        scene1:
          sections:
            section1:
              lines:
                - id: "1"
                - id: "2"
                  actions:
                    updateVariable:
                      id: "act1"
                      operations:
                        - variableId: score
                          op: set
                          value: 15
                - id: "3"
                  actions:
                    updateVariable:
                      id: "act2"
                      operations:
                        - variableId: score
                          op: increment
                          value: 10
                - id: "4"
    resources:
      variables:
        score:
          type: number
          scope: context
          default: 0
  global:
    isLineCompleted: true
    dialogueUIHidden: false
    isDialogueHistoryShowing: false
    layeredViews: []
    nextLineConfig:
      manual:
        enabled: true
        requireLineCompleted: false
      auto:
        enabled: false
      applyMode: "persistent"
    pendingEffects:
      - name: "clearNextLineConfigTimer"
      - name: "render"
  contexts:
    - variables:
        score: 25
      currentPointerMode: "read"
      pointers:
        read:
          sectionId: "section1"
          lineId: "3"
        history:
          sectionId: null
          lineId: null
          historySequenceIndex: null
      rollback:
        currentIndex: 2
        isRestoring: false
        replayStartIndex: 0
        baselineVariables:
          score: 0
        timeline:
          - sectionId: "section1"
            lineId: "1"
            rollbackPolicy: "free"
          - sectionId: "section1"
            lineId: "2"
            rollbackPolicy: "free"
          - sectionId: "section1"
            lineId: "3"
            rollbackPolicy: "free"
          - sectionId: "section1"
            lineId: "4"
            rollbackPolicy: "free"
---
case: rolls back directly across sections using rollback timeline
in:
  - state:
      projectData:
        story:
          scenes:
            scene1:
              sections:
                section1:
                  lines:
                    - id: "1"
                    - id: "2"
                      actions:
                        updateVariable:
                          id: "set-score-10"
                          operations:
                            - variableId: score
                              op: set
                              value: 10
                section2:
                  lines:
                    - id: "10"
                      actions:
                        updateVariable:
                          id: "add-score-5"
                          operations:
                            - variableId: score
                              op: add
                              value: 5
        resources:
          variables:
            score:
              type: number
              scope: context
              default: 0
      global:
        isLineCompleted: false
        pendingEffects: []
      contexts:
        - variables:
            score: 15
          currentPointerMode: "history"
          pointers:
            read:
              sectionId: "section2"
              lineId: "10"
            history:
              sectionId: "section2"
              lineId: "10"
          rollback:
            currentIndex: 2
            isRestoring: false
            replayStartIndex: 0
            baselineVariables:
              score: 0
            timeline:
              - sectionId: "section1"
                lineId: "1"
                rollbackPolicy: "free"
              - sectionId: "section1"
                lineId: "2"
                rollbackPolicy: "free"
              - sectionId: "section2"
                lineId: "10"
                rollbackPolicy: "free"
  - sectionId: "section1"
    lineId: "2"
out:
  projectData:
    story:
      scenes:
        scene1:
          sections:
