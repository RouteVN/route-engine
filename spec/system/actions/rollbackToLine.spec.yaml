      - name: "render"
  contexts:
    - variables:
        score: 10
      currentPointerMode: "read"
      pointers:
        read:
          sectionId: "section1"
          lineId: "2"
        history:
          sectionId: null
          lineId: null
          historySequenceIndex: null
      rollback:
        currentIndex: 1
        isRestoring: false
        replayStartIndex: 0
        baselineVariables:
          score: 0
        timeline:
          - sectionId: "section1"
            lineId: "1"
            rollbackPolicy: "free"
          - sectionId: "section1"
            lineId: "2"
            rollbackPolicy: "free"
          - sectionId: "section2"
            lineId: "10"
            rollbackPolicy: "free"
---
case: throws error for invalid lineId in rollback timeline
in:
  - state:
      projectData:
        story:
          scenes: {}
        resources:
          variables: {}
      global:
        isLineCompleted: true
        pendingEffects: []
      contexts:
        - variables: {}
          currentPointerMode: "history"
          pointers:
            read:
              sectionId: "section1"
              lineId: "2"
            history: {}
          rollback:
            currentIndex: 1
            isRestoring: false
            replayStartIndex: 0
            baselineVariables: {}
            timeline:
              - sectionId: "section1"
                lineId: "1"
                rollbackPolicy: "free"
              - sectionId: "section1"
                lineId: "2"
                rollbackPolicy: "free"
  - sectionId: "section1"
    lineId: "nonExistentLine"
throws: "Line nonExistentLine not found in section section1 rollback timeline"
