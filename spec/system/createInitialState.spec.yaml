---
case: throws when section ids are duplicated across scenes
in:
  - global:
    projectData:
      story:
        initialSceneId: "scene1"
        scenes:
          scene1:
            initialSectionId: "shared"
            sections:
              shared:
                lines:
                  - id: "line1"
                    actions: {}
          scene2:
            initialSectionId: "shared"
            sections:
              shared:
                lines:
                  - id: "line2"
                    actions: {}
throws: 'Duplicate sectionId "shared" found in scenes "scene1" and "scene2". Section IDs must be globally unique.'
---
case: throws when hydrated save slot formatVersion is missing
in:
  - global:
      saveSlots:
        "1":
          slotId: 1
          savedAt: 1700000000000
          image: null
          state:
            contexts:
              - pointers:
                  read:
                    sectionId: "section1"
                    lineId: "line1"
    projectData:
      story:
        initialSceneId: "scene1"
        scenes:
          scene1:
            initialSectionId: "section1"
            sections:
              section1:
                lines:
                  - id: "line1"
                    actions: {}
throws: 'Hydrated save slot "1" failed validation: Malformed save slot formatVersion.'
