---
suite: createInitialState
exportName: createInitialState
---
case: create initial state with basic structure
in:
  - global:
    projectData:
      story:
        initialSceneId: "scene1"
        scenes:
          scene1:
            initialSectionId: "section1"
            sections:
              section1:
                lines:
                  - id: "line1"
                    actions: {}
out:
  global:
    isLineCompleted: false
    pendingEffects: []
    autoMode: false
    skipMode: false
    dialogueUIHidden: false
    dialogueTextSpeed: 50
    autoForwardDelay: 1000
    skipUnseenText: false
    skipTransitionsAndAnimations: false
    soundVolume: 50
    musicVolume: 50
    muteAll: false
    confirmDialog: null
    viewedRegistry:
      sections: []
      resources: []
    nextLineConfig:
      manual:
        enabled: true
        requireLineCompleted: false
      auto:
        enabled: false
      applyMode: "persistent"
    saveSlots: {}
    overlayStack: []
    variables: {}
  projectData:
    story:
      initialSceneId: "scene1"
      scenes:
        scene1:
          initialSectionId: "section1"
          sections:
            section1:
              lines:
                - id: "line1"
                  actions: {}
  contexts:
    - currentPointerMode: "read"
      pointers:
        read:
          sceneId: "scene1"
          sectionId: "section1"
          lineId: "line1"
        history:
          sectionId: __undefined__
          lineId: __undefined__
      configuration: {}
      views: []
      bgm:
        resourceId: __undefined__
      rollback:
        currentIndex: 0
        isRestoring: false
        replayStartIndex: 0
        timeline:
          - sectionId: "section1"
            lineId: "line1"
            rollbackPolicy: "free"
      variables: {}
