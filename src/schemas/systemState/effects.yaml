$schema: http://json-schema.org/draft-07/schema#
title: Pending Effects Schema
description: Schema for pending effects queued by the Route Engine runtime
anyOf:
  - title: Render effect
    type: object
    properties:
      name:
        const: render
      payload:
        type: object
        properties:
          allowRestoredInheritedPersistentBackgroundAnimations:
            type: boolean
        additionalProperties: false
    required: [name]
    additionalProperties: false

  - title: Handle line actions effect
    type: object
    properties:
      name:
        const: handleLineActions
    required: [name]
    additionalProperties: false

  - title: Save slots effect
    type: object
    properties:
      name:
        const: saveSlots
      payload:
        type: object
        properties:
          saveSlots:
            type: object
            description: Save slots keyed by stringified slot ID
            additionalProperties: true
        required: [saveSlots]
        additionalProperties: false
    required: [name, payload]
    additionalProperties: false

  - title: Save device variables effect
    type: object
    properties:
      name:
        const: saveGlobalDeviceVariables
      payload:
        type: object
        properties:
          globalDeviceVariables:
            type: object
            additionalProperties: true
        required: [globalDeviceVariables]
        additionalProperties: false
    required: [name, payload]
    additionalProperties: false

  - title: Save account variables effect
    type: object
    properties:
      name:
        const: saveGlobalAccountVariables
      payload:
        type: object
        properties:
          globalAccountVariables:
            type: object
            additionalProperties: true
        required: [globalAccountVariables]
        additionalProperties: false
    required: [name, payload]
    additionalProperties: false

  - title: Save runtime effect
    type: object
    properties:
      name:
        const: saveGlobalRuntime
      payload:
        type: object
        properties:
          globalRuntime:
            type: object
            additionalProperties: true
        required: [globalRuntime]
        additionalProperties: false
    required: [name, payload]
    additionalProperties: false

  - title: Start auto next timer effect
    type: object
    properties:
      name:
        const: startAutoNextTimer
      payload:
        type: object
        properties:
          delay:
            type: number
            minimum: 0
        additionalProperties: false
    required: [name, payload]
    additionalProperties: false

  - title: Clear auto next timer effect
    type: object
    properties:
      name:
        const: clearAutoNextTimer
    required: [name]
    additionalProperties: false

  - title: Start skip next timer effect
    type: object
    properties:
      name:
        const: startSkipNextTimer
    required: [name]
    additionalProperties: false

  - title: Clear skip next timer effect
    type: object
    properties:
      name:
        const: clearSkipNextTimer
    required: [name]
    additionalProperties: false

  - title: Next line config timer effect
    type: object
    properties:
      name:
        const: nextLineConfigTimer
      payload:
        type: object
        properties:
          delay:
            type: number
            minimum: 0
        required: [delay]
        additionalProperties: false
    required: [name, payload]
    additionalProperties: false

  - title: Clear next line config timer effect
    type: object
    properties:
      name:
        const: clearNextLineConfigTimer
    required: [name]
    additionalProperties: false

  - title: Custom effect
    type: object
    properties:
      name:
        type: string
      payload:
        description: Optional custom payload for integration-specific effects
    required: [name]
    additionalProperties: true
    not:
      type: object
      properties:
        name:
          enum:
            - render
            - handleLineActions
            - saveSlots
            - saveGlobalDeviceVariables
            - saveGlobalAccountVariables
            - startAutoNextTimer
            - clearAutoNextTimer
            - startSkipNextTimer
            - clearSkipNextTimer
            - nextLineConfigTimer
            - clearNextLineConfigTimer
      required: [name]
