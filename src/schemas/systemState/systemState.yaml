$schema: http://json-schema.org/draft-07/schema#
title: System State Schema
description: Schema for the Route Engine runtime system state
type: object

defs:
  readPointer:
    type: object
    description: Pointer to a specific authored line
    properties:
      sceneId:
        type: string
        description: Optional authored scene ID for the target section
      sectionId:
        type: string
        description: Section ID
      lineId:
        type: string
        description: Line ID
    required: [sectionId, lineId]
    additionalProperties: false

  accountViewedRegistry:
    type: object
    description: Registry of viewed content
    properties:
      sections:
        type: array
        items:
          type: object
          properties:
            sectionId:
              type: string
            lastLineId:
              type: [string, "null"]
          required: [sectionId]
          additionalProperties: false
      resources:
        type: array
        items:
          type: object
          properties:
            resourceId:
              type: [string, number]
          required: [resourceId]
          additionalProperties: false
    required: [sections, resources]
    additionalProperties: false

  rollbackCheckpoint:
    type: object
    properties:
      sectionId:
        type: string
      lineId:
        type: string
      rollbackPolicy:
        type: string
      executedActions:
        type: array
        items:
          type: object
          properties:
            type:
              type: string
            payload:
              description: Action payload captured for rollback replay
          required: [type]
          additionalProperties: false
    required: [sectionId, lineId]
    additionalProperties: false

  rollbackState:
    type: object
    properties:
      timeline:
        type: array
        items:
          $ref: "#/defs/rollbackCheckpoint"
      currentIndex:
        type: integer
      isRestoring:
        type: boolean
      replayStartIndex:
        type: integer
    required: [timeline, currentIndex, isRestoring, replayStartIndex]
    additionalProperties: false

  nextLineConfig:
    type: object
    properties:
      manual:
        type: object
        properties:
          enabled:
            type: boolean
          requireLineCompleted:
            type: boolean
        additionalProperties: false
      auto:
        type: object
        properties:
          enabled:
            type: boolean
          trigger:
            type: string
            enum: [fromStart, fromComplete]
          delay:
            type: number
            minimum: 0
        additionalProperties: false
      applyMode:
        type: string
        enum: [singleLine, persistent]
    additionalProperties: false

  saveSlotState:
    type: object
    properties:
      contexts:
        type: array
        minItems: 1
    required: [contexts]
    additionalProperties: false

  saveSlotEntry:
    type: object
    properties:
      formatVersion:
        type: integer
        minimum: 1
      slotId:
        type: [number, string]
      savedAt:
        type: integer
      image:
        type: [string, "null"]
      state:
        $ref: "#/defs/saveSlotState"
    required: [formatVersion, slotId, savedAt, state]
    additionalProperties: true

  contextState:
    type: object
    properties:
      currentPointerMode:
        type: string
        enum: [read]
      pointers:
        type: object
        properties:
          read:
            $ref: "#/defs/readPointer"
        required: [read]
        additionalProperties: false
      configuration:
        $ref: "./configuration.yaml"
      views:
        type: array
        items:
          type: object
          additionalProperties: true
      bgm:
        type: object
        properties:
          resourceId:
            type: string
        additionalProperties: true
      variables:
        type: object
        additionalProperties: true
      runtime:
        type: object
        properties:
          saveLoadPagination:
            type: integer
            minimum: 1
          menuPage:
            type: string
          menuEntryPoint:
            type: string
        required: [saveLoadPagination, menuPage, menuEntryPoint]
        additionalProperties: false
      rollback:
        $ref: "#/defs/rollbackState"
    required:
      [
        currentPointerMode,
        pointers,
        configuration,
        views,
        bgm,
        variables,
        rollback,
      ]
    additionalProperties: false

properties:
  projectData:
    $ref: "../projectData/projectData.yaml"

  global:
    type: object
    properties:
      pendingEffects:
        type: array
        items:
          $ref: "./effects.yaml"
      variables:
        type: object
        description: Device- and account-scoped variables
        additionalProperties: true
      saveSlots:
        type: object
        description: Save slots indexed by stringified slot ID
        additionalProperties:
          $ref: "#/defs/saveSlotEntry"
      dialogueUIHidden:
        type: boolean
      dialogueTextSpeed:
        type: number
      autoForwardDelay:
        type: number
      skipUnseenText:
        type: boolean
      skipTransitionsAndAnimations:
        type: boolean
      soundVolume:
        type: number
        minimum: 0
        maximum: 100
      musicVolume:
        type: number
        minimum: 0
        maximum: 100
      muteAll:
        type: boolean
      confirmDialog:
        type: [object, "null"]
        properties:
          resourceId:
            type: string
          confirmActions:
            type: object
          cancelActions:
            type: object
        required: [resourceId, confirmActions, cancelActions]
        additionalProperties: false
      formDrafts:
        type: object
        description: Transient active-form draft values keyed by form key
        additionalProperties:
          type: object
          properties:
            values:
              type: object
              additionalProperties: true
            touched:
              type: object
              additionalProperties:
                type: boolean
            errors:
              type: object
              additionalProperties:
                type: string
            submitted:
              type: boolean
          required: [values, touched, errors, submitted]
          additionalProperties: false
      autoMode:
        type: boolean
      skipMode:
        type: boolean
      nextLineConfig:
        $ref: "#/defs/nextLineConfig"
      accountViewedRegistry:
        $ref: "#/defs/accountViewedRegistry"
      overlayStack:
        type: array
        items:
          type: object
          properties:
            resourceId:
              type: string
          required: [resourceId]
          additionalProperties: false
      isLineCompleted:
        type: boolean
    required:
      [
        pendingEffects,
        variables,
        saveSlots,
        dialogueUIHidden,
        dialogueTextSpeed,
        autoForwardDelay,
        skipUnseenText,
        skipTransitionsAndAnimations,
        soundVolume,
        musicVolume,
        muteAll,
        confirmDialog,
        formDrafts,
        autoMode,
        skipMode,
        nextLineConfig,
        accountViewedRegistry,
        overlayStack,
        isLineCompleted,
      ]
    additionalProperties: false

  contexts:
    type: array
    minItems: 1
    items:
      $ref: "#/defs/contextState"

required: [projectData, global, contexts]
additionalProperties: false
