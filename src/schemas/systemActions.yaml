$schema: http://json-schema.org/draft-07/schema#
title: System Actions Schema
description: Schema for authored/public system actions in the Route Engine runtime
type: object
properties:
  nextLine:
    type: object
    description: Advance to the next line or complete the current line if it is still revealing
    properties: {}
    additionalProperties: false

  prevLine:
    type: object
    description: Navigate backward within the current section using the history pointer
    properties:
      sectionId:
        type: string
        description: Optional section ID. Defaults to the current read section when omitted.
    additionalProperties: false

  setNextLineConfig:
    type: object
    description: Control how the line can be advanced
    properties:
      manual:
        type: object
        properties:
          enabled:
            type: boolean
            default: true
            description: Allow manual advance via user input
          requireLineCompleted:
            type: boolean
            default: false
            description: Only allow manual advance after line completion
        additionalProperties: false
      auto:
        type: object
        properties:
          enabled:
            type: boolean
            default: false
            description: Enable auto-advance
          trigger:
            type: string
            enum: [fromStart, fromComplete]
            default: fromComplete
            description: When to start timing for auto advance
          delay:
            type: number
            minimum: 0
            default: 1000
            description: Delay in milliseconds before advancing
        additionalProperties: false
      applyMode:
        type: string
        enum: [singleLine, persistent]
        default: persistent
        description: Whether this config is consumed after one line or kept until changed
    additionalProperties: false

  startAutoMode:
    type: object
    description: Start auto-advance mode
    properties: {}
    additionalProperties: false

  stopAutoMode:
    type: object
    description: Stop auto-advance mode
    properties: {}
    additionalProperties: false

  toggleAutoMode:
    type: object
    description: Toggle auto-advance mode
    properties: {}
    additionalProperties: false

  startSkipMode:
    type: object
    description: Start skip mode
    properties: {}
    additionalProperties: false

  stopSkipMode:
    type: object
    description: Stop skip mode
    properties: {}
    additionalProperties: false

  toggleSkipMode:
    type: object
    description: Toggle skip mode
    properties: {}
    additionalProperties: false

  showDialogueUI:
    type: object
    description: Show the dialogue UI
    properties: {}
    additionalProperties: false

  hideDialogueUI:
    type: object
    description: Hide the dialogue UI
    properties: {}
    additionalProperties: false

  toggleDialogueUI:
    type: object
    description: Toggle dialogue UI visibility
    properties: {}
    additionalProperties: false

  setDialogueTextSpeed:
    type: object
    description: Set dialogue reveal speed
    properties:
      value:
        type: number
    required: [value]
    additionalProperties: false

  setAutoForwardDelay:
    type: object
    description: Set auto mode delay in milliseconds
    properties:
      value:
        type: number
        minimum: 0
    required: [value]
    additionalProperties: false

  setSkipUnseenText:
    type: object
    description: Set whether skip mode should include unseen text
    properties:
      value:
        type: boolean
    required: [value]
    additionalProperties: false

  setSkipTransitionsAndAnimations:
    type: object
    description: Set whether transitions and animations should be skipped
    properties:
      value:
        type: boolean
    required: [value]
    additionalProperties: false

  setSoundVolume:
    type: object
    description: Set effective SFX volume
    properties:
      value:
        type: number
        minimum: 0
        maximum: 100
    required: [value]
    additionalProperties: false

  setMusicVolume:
    type: object
    description: Set effective music volume
    properties:
      value:
        type: number
        minimum: 0
        maximum: 100
    required: [value]
    additionalProperties: false

  setMuteAll:
    type: object
    description: Set whether all sound output is muted
    properties:
      value:
        type: boolean
    required: [value]
    additionalProperties: false

  setSaveLoadPagination:
    type: object
    description: Set the current save/load pagination page
    properties:
      value:
        type: integer
        minimum: 1
    required: [value]
    additionalProperties: false

  incrementSaveLoadPagination:
    type: object
    description: Increment the current save/load pagination page
    properties: {}
    additionalProperties: false

  decrementSaveLoadPagination:
    type: object
    description: Decrement the current save/load pagination page
    properties: {}
    additionalProperties: false

  setMenuPage:
    type: object
    description: Set the current menu page
    properties:
      value:
        type: string
    required: [value]
    additionalProperties: false

  setMenuEntryPoint:
    type: object
    description: Set the current menu entry point
    properties:
      value:
        type: string
    required: [value]
    additionalProperties: false

  showConfirmDialog:
    type: object
    description: Show a transient confirm dialog rendered from a layout resource
    properties:
      resourceId:
        type: string
        description: Layout resource used to render the confirm dialog
      confirmActions:
        type: object
        description: Action batch dispatched when the confirm button is clicked
        minProperties: 1
      cancelActions:
        type: object
        description: Optional action batch dispatched when the cancel button is clicked
    required: [resourceId, confirmActions]
    additionalProperties: false

  hideConfirmDialog:
    type: object
    description: Hide the transient confirm dialog
    properties: {}
    additionalProperties: false

  saveSlot:
    type: object
    description: Save current story state to a slot
    properties:
      slotId:
        type: [number, string]
        description: Save slot index to save to, or a template/event binding that resolves to one
        minimum: 0
      thumbnailImage:
        type: [string, "null"]
        description: Optional thumbnail image as a data URL or external image source
      savedAt:
        type: number
        description: Optional save timestamp override
    required: [slotId]
    additionalProperties: false

  loadSlot:
    type: object
    description: Load game state from a save slot
    properties:
      slotId:
        type: [number, string]
        description: Save slot index to load from, or a template/event binding that resolves to one
        minimum: 0
    required: [slotId]
    additionalProperties: false

  resetStoryAtSection:
    type: object
    description: Reset story-local state and enter the first line of a section
    properties:
      sectionId:
        type: string
        description: Target section ID
    required: [sectionId]
    additionalProperties: false

  sectionTransition:
    type: object
    description: Navigate to the first line of a section
    properties:
      sectionId:
        type: string
        description: Target section ID
    required: [sectionId]
    additionalProperties: false

  jumpToLine:
    type: object
    description: Jump to a specific line, optionally in a different section
    properties:
      sectionId:
        type: string
        description: Target section ID. Defaults to the current section when omitted.
      lineId:
        type: string
        description: Target line ID
    required: [lineId]
    additionalProperties: false

  pushOverlay:
    type: object
    description: Push an overlay onto the UI stack
    properties:
      resourceId:
        type: string
        description: Overlay layout resource to display
    required: [resourceId]
    additionalProperties: false

  popOverlay:
    type: object
    description: Pop the current overlay
    properties: {}
    additionalProperties: false

  replaceLastOverlay:
    type: object
    description: Replace the current overlay without clearing the rest of the stack
    properties:
      resourceId:
        type: string
        description: Overlay layout resource to display
    required: [resourceId]
    additionalProperties: false

  clearOverlays:
    type: object
    description: Clear all overlays
    properties: {}
    additionalProperties: false

  rollbackByOffset:
    type: object
    description: Roll back relative to the active rollback checkpoint
    properties:
      offset:
        type: integer
        maximum: -1
        default: -1
        description: Negative rollback offset
    additionalProperties: false

  rollbackToLine:
    type: object
    description: Roll back to a specific line in the visible rollback timeline
    properties:
      sectionId:
        type: string
        description: Target section ID
      lineId:
        type: string
        description: Target line ID
    required: [sectionId, lineId]
    additionalProperties: false

  updateVariable:
    type: object
    description: Update game variables
    properties:
      id:
        type: string
        description: Unique identifier for this updateVariable action
        pattern: "^[a-zA-Z0-9]+$"
      operations:
        type: array
        description: Variable operations to perform
        items:
          type: object
          properties:
            variableId:
              type: string
              description: ID of the variable to update
            op:
              type: string
              description: Operation to perform on the variable
              enum: [set, increment, decrement, multiply, divide, toggle]
            value:
              description: Value to use in the operation
              oneOf:
                - type: string
                - type: number
                - type: boolean
                - type: object
          required: [variableId, op]
          additionalProperties: false
        minItems: 1
    required: [id, operations]
    additionalProperties: false

additionalProperties: false
