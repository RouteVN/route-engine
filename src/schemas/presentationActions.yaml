$schema: http://json-schema.org/draft-07/schema#
title: Presentation Actions Schema
description: Schema for all presentation actions that handle visual and audio display in visual novel engine
type: object
definitions:
  animationPlayback:
    type: object
    description: Playback contract applied at the action payload layer
    properties:
      continuity:
        type: string
        enum: [render, persistent]
        default: render
        description: Whether animation continuity is render-scoped or persists across later renders while the action remains active
      speed:
        type: number
        exclusiveMinimum: 0
        description: Playback speed multiplier. 1 is authored speed, 2 is twice as fast, 0.5 is half speed.
    additionalProperties: false

  animationRef:
    type: object
    description: Reference to an animation resource
    properties:
      resourceId:
        type: string
        description: ID of the animation resource to use
      playback:
        $ref: "#/definitions/animationPlayback"
    required: [resourceId]
    additionalProperties: false

  animationSelection:
    description: Animation selection. Provide a single resourceId whose animation type decides update vs transition.
    $ref: "#/definitions/animationRef"

  audioSound:
    type: object
    description: Sound owned by an audio channel
    properties:
      id:
        type: string
        minLength: 1
        description: Stable identifier for the sound within its authored channel
      resourceId:
        type: string
        minLength: 1
        description: ID of the sound resource
      loop:
        type: boolean
        description: Whether the sound loops
      volume:
        type: number
        minimum: 0
        maximum: 100
        description: Local sound volume from 0 to 100
      muted:
        type: boolean
        description: Whether this sound is muted
      pan:
        type: number
        minimum: -1
        maximum: 1
        description: Stereo pan from -1 (left) to 1 (right)
      startDelayMs:
        type: number
        minimum: 0
        description: Delay before the sound begins, in milliseconds
      playbackRate:
        type: number
        minimum: 0
        description: Playback speed multiplier
      startAt:
        type: number
        minimum: 0
        description: Start offset within the source, in seconds
      endAt:
        type: [number, "null"]
        minimum: 0
        description: Optional end offset within the source, in seconds
    required: [id, resourceId]
    additionalProperties: false

  backgroundBlur:
    anyOf:
      - type: "null"
        description: Clear the current blur
      - type: object
        description: Static blur applied to the current render target
        properties:
          x:
            type: number
            minimum: 0
            description: Horizontal blur strength
          y:
            type: number
            minimum: 0
            description: Vertical blur strength
          quality:
            type: number
            minimum: 1
            description: Blur quality pass count
          kernelSize:
            type: integer
            enum: [5, 7, 9, 11, 13, 15]
            description: Blur kernel size
          repeatEdgePixels:
            type: boolean
            description: Clamp edge pixels while blurring
        required: [x, y]
        additionalProperties: false

  visualTextContent:
    description: RouteGraphics text content. A string renders plain text; an array can contain rich text runs such as per-run styles and furigana.
    anyOf:
      - type: string
      - type: array
        items:
          type: object
          properties:
            text:
              type: string
            textStyleId:
              type: string
            furigana:
              type: object
              properties:
                text:
                  type: string
                textStyleId:
                  type: string
              additionalProperties: true
          additionalProperties: true

  visualText:
    type: object
    description: Text-backed visual configuration. Placement, layer, opacity, blur, and animations stay on the visual item.
    properties:
      content:
        $ref: "#/definitions/visualTextContent"
      textStyleId:
        type: string
        description: Shared text style resource for the visual text
      width:
        type: number
        description: Optional text layout width passed to the renderer
      height:
        type: number
        description: Optional text layout height passed to the renderer
    anyOf:
      - required: [content]
      - required: [textStyleId]
    not:
      anyOf:
        - required: [id]
        - required: [type]
        - required: [resourceId]
        - required: [transformId]
        - required: [x]
        - required: [y]
        - required: [anchorX]
        - required: [anchorY]
        - required: [scaleX]
        - required: [scaleY]
        - required: [rotation]
        - required: [originX]
        - required: [originY]
        - required: [layer]
        - required: [opacity]
        - required: [blur]
        - required: [animations]
    additionalProperties: true

properties:
  cleanAll:
    type: object
    description: Whether to clean/clear all existing state
    properties:
      mode:
        type: string
        description: Mode of cleaning/clearing all existing state
    additionalProperties: false

  screen:
    type: object
    description: Whole-screen appearance and transient transition for the current rendered story frame
    properties:
      opacity:
        type: number
        minimum: 0
        maximum: 1
        description: Static whole-screen opacity, mapped to renderer alpha
      blur:
        $ref: "#/definitions/backgroundBlur"
      animations:
        $ref: "#/definitions/animationSelection"
    additionalProperties: false

  background:
    type: object
    description: Background management and display
    properties:
      resourceId:
        type: string
        description: ID of the background resource to display
      animationName:
        type: string
        description: Optional spritesheet animation name. If omitted for a spritesheet resource, the first defined animation is used.
      animationSpeed:
        type: number
        description: Optional spritesheet animation speed override
      loop:
        type: boolean
        description: Optional video or spritesheet playback loop override
      colorId:
        type: string
        description: Optional resources.colors ID for the solid color rendered behind the background resource. Persists until changed or cleared with cleanAll
      transformId:
        type: string
        description: Optional transform resource to position the background
      x:
        type: number
        description: Custom x position in renderer pixels to override the background transform x
      y:
        type: number
        description: Custom y position in renderer pixels to override the background transform y
      anchorX:
        type: number
        description: Custom normalized x anchor point to override the background transform anchorX
      anchorY:
        type: number
        description: Custom normalized y anchor point to override the background transform anchorY
      scaleX:
        type: number
        description: Custom unitless x scale multiplier to override the background transform scaleX
      scaleY:
        type: number
        description: Custom unitless y scale multiplier to override the background transform scaleY
      rotation:
        type: number
        description: Custom rotation in degrees to override the background transform rotation
      originX:
        type: number
        description: Custom x transform origin in renderer pixels to override the background transform originX
      originY:
        type: number
        description: Custom y transform origin in renderer pixels to override the background transform originY
      opacity:
        type: number
        minimum: 0
        maximum: 1
        description: Static background opacity, mapped to renderer alpha
      blur:
        $ref: "#/definitions/backgroundBlur"
      animations:
        $ref: "#/definitions/animationSelection"
    additionalProperties: false

  dialogue:
    type: object
    description: Dialogue display configuration
    properties:
      ui:
        type: object
        description: UI configuration for dialogue box
        properties:
          resourceId:
            type: string
            description: ID of the dialogue box layout resource
          animations:
            $ref: "#/definitions/animationSelection"
        additionalProperties: false
      mode:
        type: string
        enum: [adv, nvl]
        description: Dialogue mode (adv for adventure, nvl for novel)
      content:
        type: array
        items:
          type: object
          properties:
            text:
              type: string
        description: The dialogue text content
      textSpeed:
        type: number
        description: One-line dialogue text reveal speed override. When omitted, dialogue templates should use the runtime dialogueTextSpeed preference.
      append:
        type: boolean
        description: In ADV mode, append content to the current dialogue content and reveal only the appended suffix when the dialogue layout binds dialogue.initialRevealedCharacters to text-revealing.initialRevealedCharacters.
      characterId:
        type: string
        description: Speaker identity. If provided without character.name, the displayed name falls back to the character resource name.
      characterName:
        type: string
        description: Compatibility alias for character.name. Do not use in new content.
      persistCharacter:
        type: boolean
        description: Keep the current characterId and character override for following dialogue lines when later dialogue actions omit speaker fields. An explicit characterId still resets the speaker and clears any prior override unless character.name or character.sprite is also provided.
      character:
        type: object
        description: Canonical character override properties for authored dialogue actions
        properties:
          name:
            type: string
            description: Override the displayed character name for this dialogue line
          sprite:
            type: object
            description: Layered dialogue speaker sprite group. All items share the same transform and animation selection.
            properties:
              transformId:
                type: string
                description: ID of the transform where the dialogue speaker sprite group appears
              items:
                type: array
                description: Sprite layers that make up the dialogue speaker sprite group
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      description: Stable identifier for the sprite layer
                    resourceId:
                      type: string
                      description: ID of the image or spritesheet resource for this sprite layer
                    animationName:
                      type: string
                      description: Optional spritesheet animation name. If omitted for a spritesheet resource, the first defined animation is used.
                    animationSpeed:
                      type: number
                      description: Optional spritesheet animation speed override
                    loop:
                      type: boolean
                      description: Optional spritesheet animation loop override
                  required: [id, resourceId]
                  additionalProperties: false
              animations:
                $ref: "#/definitions/animationSelection"
            additionalProperties: false
        additionalProperties: false
      clear:
        type: boolean
        description: Clear the dialogue state
      clearPage:
        type: boolean
        description: Clear the NVL page before adding new content
    additionalProperties: false

  character:
    type: object
    description: Character display and management
    properties:
      items:
        type: array
        description: Array of character items to display
        items:
          type: object
          properties:
            id:
              type: string
              description: Unique identifier for the character item
            transformId:
              type: string
              description: ID of the transform where character appears
            x:
              type: number
              description: Custom x position to override transform x
            y:
              type: number
              description: Custom y position to override transform y
            anchorX:
              type: number
              description: Custom x anchor point to override transform anchorX
            anchorY:
              type: number
              description: Custom y anchor point to override transform anchorY
            scaleX:
              type: number
              description: Custom x scale factor to override transform scaleX
            scaleY:
              type: number
              description: Custom y scale factor to override transform scaleY
            rotation:
              type: number
              description: Custom rotation to override transform rotation
            originX:
              type: number
              description: Custom x transform origin to override transform originX
            originY:
              type: number
              description: Custom y transform origin to override transform originY
            opacity:
              type: number
              minimum: 0
              maximum: 1
              description: Static character item opacity, mapped to renderer alpha
            blur:
              $ref: "#/definitions/backgroundBlur"
            sprites:
              type: array
              description: Array of sprite parts that make up the character
              items:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier for the sprite part
                  resourceId:
                    type: string
                    description: ID of the image or spritesheet sprite part resource
                  animationName:
                    type: string
                    description: Optional spritesheet animation name. If omitted for a spritesheet resource, the first defined animation is used.
                  animationSpeed:
                    type: number
                    description: Optional spritesheet animation speed override
                  loop:
                    type: boolean
                    description: Optional spritesheet animation loop override
                additionalProperties: false
            animations:
              $ref: "#/definitions/animationSelection"
          required: [id]
          allOf:
            - if:
                required: [sprites]
              then:
                required: [transformId]
          additionalProperties: false
    additionalProperties: false

  visual:
    type: object
    description: Visual elements and effects technically same as background but different z index
    properties:
      items:
        type: array
        description: Array of visual items to display
        items:
          type: object
          properties:
            id:
              type: string
              description: Unique identifier for the visual item
            animationName:
              type: string
              description: Name of the animation to play (defined in the spritesheet resource)
            animationSpeed:
              type: number
              description: Override the animation speed
            resourceId:
              type: string
              description: ID of the resource
            text:
              $ref: "#/definitions/visualText"
            transformId:
              type: string
              description: ID of the transform where visual appears
            x:
              type: number
              description: Custom x position to override transform x
            y:
              type: number
              description: Custom y position to override transform y
            anchorX:
              type: number
              description: Custom x anchor point to override transform anchorX
            anchorY:
              type: number
              description: Custom y anchor point to override transform anchorY
            scaleX:
              type: number
              description: Custom x scale factor to override transform scaleX
            scaleY:
              type: number
              description: Custom y scale factor to override transform scaleY
            rotation:
              type: number
              description: Custom rotation to override transform rotation
            originX:
              type: number
              description: Custom x transform origin to override transform originX
            originY:
              type: number
              description: Custom y transform origin to override transform originY
            layer:
              type: number
              enum:
                - 10
                - 30
                - 50
                - 70
                - 90
              description: Numeric render layer for the visual item. Defaults to 50. Same-layer items preserve array order.
            opacity:
              type: number
              minimum: 0
              maximum: 1
              description: Static visual item opacity, mapped to renderer alpha
            blur:
              $ref: "#/definitions/backgroundBlur"
            animations:
              $ref: "#/definitions/animationSelection"
          required: [id]
          allOf:
            - not:
                required: [resourceId, text]
          additionalProperties: false
    additionalProperties: false

  choice:
    type: object
    description: Choice system configuration
    properties:
      resourceId:
        type: string
        description: ID of the choice layout UI element
      items:
        type: array
        description: Array of choice options
        items:
          type: object
          properties:
            id:
              type: string
              description: Unique identifier for the choice option
            content:
              type: string
              description: Text content of the choice option
            events:
              type: object
              description: Event handlers for the choice
              properties:
                click:
                  type: object
                  description: Click event handler
              additionalProperties: true
          additionalProperties: false
      animations:
        $ref: "#/definitions/animationSelection"
    additionalProperties: false

  form:
    type: object
    description: Blocking input form configuration
    properties:
      id:
        type: string
        description: Stable generated form ID. Defaults to resourceId for compatibility.
      resourceId:
        type: string
        description: ID of the form layout resource to render
      fields:
        type: object
        description: Form fields keyed by layout field ID
        additionalProperties:
          type: object
          properties:
            variableId:
              type: string
              description: Variable to receive the submitted value
            required:
              type: boolean
              default: false
            trim:
              type: boolean
              default: false
            placeholder:
              type: string
            multiline:
              type: boolean
              default: false
            maxLength:
              type: integer
              minimum: 0
          required: [variableId]
          additionalProperties: false
      submitActions:
        type: object
        description: Actions to execute after a valid submit
      cancelActions:
        type: object
        description: Actions to execute after cancelling the form
      animations:
        $ref: "#/definitions/animationSelection"
    additionalProperties: false

  sfx:
    type: object
    description: Sound effects configuration
    properties:
      items:
        type: array
        description: Legacy shorthand for sounds in the default SFX channel
        items:
          $ref: "#/definitions/audioSound"
      channels:
        type: array
        description: Independently controlled SFX channels
        items:
          type: object
          properties:
            id:
              type: string
              minLength: 1
              description: Stable SFX channel identifier
            volume:
              type: number
              minimum: 0
              maximum: 100
              description: Local channel volume from 0 to 100
            muted:
              type: boolean
              description: Whether the channel is muted
            pan:
              type: number
              minimum: -1
              maximum: 1
              description: Stereo pan from -1 (left) to 1 (right)
            sounds:
              type: array
              items:
                $ref: "#/definitions/audioSound"
          required: [id, sounds]
          additionalProperties: false
    allOf:
      - not:
          required: [items, channels]
    additionalProperties: false

  bgm:
    type: object
    description: Persistent BGM channel configuration
    properties:
      sounds:
        type: array
        description: Desired sounds owned by the BGM channel
        items:
          $ref: "#/definitions/audioSound"
      resourceId:
        type: string
        description: Legacy shorthand for a single BGM sound resource
      loop:
        type: boolean
        description: Legacy single-sound loop setting
      volume:
        type: number
        minimum: 0
        maximum: 100
        description: BGM channel volume from 0 to 100; on legacy single-sound actions this remains the sound volume
      muted:
        type: boolean
        description: Whether the BGM channel is muted
      pan:
        type: number
        minimum: -1
        maximum: 1
        description: BGM channel stereo pan from -1 (left) to 1 (right)
      startDelayMs:
        type: number
        minimum: 0
        description: Legacy delay before the single BGM sound begins, in milliseconds
    allOf:
      - not:
          required: [resourceId, sounds]
    additionalProperties: false

  voice:
    type: object
    description: Line-scoped Voice channel. Resource IDs are resolved from resources.voices[currentSceneId]
    properties:
      sounds:
        type: array
        description: Sounds owned by the Voice channel
        items:
          $ref: "#/definitions/audioSound"
      resourceId:
        type: string
        description: Legacy shorthand for one voice resource in the current scene
      volume:
        type: number
        minimum: 0
        maximum: 100
        description: Voice channel volume from 0 to 100; on legacy single-sound actions this preserves the previous effective-volume behavior
      muted:
        type: boolean
        description: Whether the Voice channel is muted
      pan:
        type: number
        minimum: -1
        maximum: 1
        description: Voice channel stereo pan from -1 (left) to 1 (right)
      loop:
        type: boolean
        description: Legacy single-sound loop setting
      startDelayMs:
        type: number
        minimum: 0
        description: Legacy delay before the single voice sound begins, in milliseconds
    anyOf:
      - required: [resourceId]
      - required: [sounds]
    allOf:
      - not:
          required: [resourceId, sounds]
    additionalProperties: false

  control:
    type: object
    description: Sets the active control resource
    properties:
      resourceId:
        type: string
        description: ID of the control resource to activate
    required: [resourceId]
    additionalProperties: false

  layout:
    type: object
    description: Layout configuration for UI layouts
    properties:
      resourceId:
        type: string
        description: ID of the layout to display
      animations:
        $ref: "#/definitions/animationSelection"
    additionalProperties: false

additionalProperties: false
