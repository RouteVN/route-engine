$schema: http://json-schema.org/draft-07/schema#
title: Presentation Actions Schema
description: Schema for all presentation actions that handle visual and audio display in visual novel engine
type: object
definitions:
  animationRef:
    type: object
    description: Reference to an animation resource
    properties:
      resourceId:
        type: string
        description: ID of the animation resource to use
    required: [resourceId]
    additionalProperties: false

  animationSelection:
    description: Animation selection. Provide a single resourceId whose animation type decides update vs transition.
    $ref: "#/definitions/animationRef"

properties:
  cleanAll:
    type: object
    description: Whether to clean/clear all existing state
    properties:
      mode:
        type: string
        description: Mode of cleaning/clearing all existing state
    additionalProperties: false

  background:
    type: object
    description: Background management and display
    properties:
      resourceId:
        type: string
        description: ID of the background resource to display
      transformId:
        type: string
        description: Optional transform resource to position the background
      animations:
        $ref: "#/definitions/animationSelection"
    additionalProperties: false

  dialogue:
    type: object
    description: Dialogue display configuration
    properties:
      ui:
        type: object
        description: UI configuration for dialogue box
        properties:
          resourceId:
            type: string
            description: ID of the dialogue box layout resource
          animations:
            $ref: "#/definitions/animationSelection"
        additionalProperties: false
      mode:
        type: string
        enum: [adv, nvl]
        description: Dialogue mode (adv for adventure, nvl for novel)
      content:
        type: array
        items:
          type: object
          properties:
            text:
              type: string
        description: The dialogue text content
      characterId:
        type: string
        description: ID of the character speaking
      characterName:
        type: string
        description: Override character display name for this dialogue line
      persistCharacter:
        type: boolean
        description: Keep the current characterId and characterName for following dialogue lines until changed or cleared
      character:
        type: object
        description: Legacy character override properties
        properties:
          name:
            type: string
            description: Override character name
        additionalProperties: false
      clear:
        type: boolean
        description: Clear the dialogue state
      clearPage:
        type: boolean
        description: Clear the NVL page before adding new content
    additionalProperties: false

  character:
    type: object
    description: Character display and management
    properties:
      items:
        type: array
        description: Array of character items to display
        items:
          type: object
          properties:
            id:
              type: string
              description: Unique identifier for the character item
            transformId:
              type: string
              description: ID of the transform where character appears
            x:
              type: number
              description: Custom x position to override transform x
            y:
              type: number
              description: Custom y position to override transform y
            sprites:
              type: array
              description: Array of sprite parts that make up the character
              items:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier for the sprite part
                  resourceId:
                    type: string
                    description: ID of the sprite part resource
                additionalProperties: false
            animations:
              $ref: "#/definitions/animationSelection"
          required: [id, transformId]
          additionalProperties: false
    additionalProperties: false

  visual:
    type: object
    description: Visual elements and effects technically same as background but different z index
    properties:
      items:
        type: array
        description: Array of visual items to display
        items:
          type: object
          properties:
            id:
              type: string
              description: Unique identifier for the visual item
            animationName:
              type: string
              description: Name of the animation to play (defined in the spritesheet resource)
            animationSpeed:
              type: number
              description: Override the animation speed
            resourceId:
              type: string
              description: ID of the resource
            transformId:
              type: string
              description: ID of the transform where visual appears
            animations:
              $ref: "#/definitions/animationSelection"
          required: [id]
          additionalProperties: false
    additionalProperties: false

  choice:
    type: object
    description: Choice system configuration
    properties:
      resourceId:
        type: string
        description: ID of the choice layout UI element
      items:
        type: array
        description: Array of choice options
        items:
          type: object
          properties:
            id:
              type: string
              description: Unique identifier for the choice option
            content:
              type: string
              description: Text content of the choice option
            events:
              type: object
              description: Event handlers for the choice
              properties:
                click:
                  type: object
                  description: Click event handler
              additionalProperties: true
          additionalProperties: false
      animations:
        $ref: "#/definitions/animationSelection"
    additionalProperties: false

  sfx:
    type: object
    description: Sound effects configuration
    properties:
      items:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
              description: Unique identifier for the sound effect
            resourceId:
              type: string
              description: ID of the sound effect resource
            loop:
              type: boolean
              description: Whether the sound effect loops
            volume:
              type: number
              description: Sound effect volume from 0 to 100
            delay:
              type: number
              description: Delay before the sound effect starts in milliseconds
        required: [id, resourceId]
        additionalProperties: false
    additionalProperties: false

  bgm:
    type: object
    description: Background music configuration
    properties:
      resourceId:
        type: string
        description: ID of the background music resource
    additionalProperties: false

  control:
    type: object
    description: Sets the active control resource
    properties:
      resourceId:
        type: string
        description: ID of the control resource to activate
    required: [resourceId]
    additionalProperties: false

  layout:
    type: object
    description: Layout configuration for UI layouts
    properties:
      resourceId:
        type: string
        description: ID of the layout to display
      animations:
        $ref: "#/definitions/animationSelection"
    additionalProperties: false

additionalProperties: false
