$schema: http://json-schema.org/draft-07/schema#
title: Story Schema
description: Schema for the complete story structure in visual novel engine
type: object
properties:
  initialSceneId:
    type: string
    description: ID of the scene to start with

  scenes:
    type: object
    description: Collection of scenes in the story
    patternProperties:
      "^.+$":
        type: object
        description: Scene definition
        properties:
          name:
            type: string
            description: Display name for the scene

          initialSectionId:
            type: string
            description: ID of the section to start with when entering this scene

          sections:
            type: object
            description: Collection of sections within this scene
            patternProperties:
              "^.+$":
                type: object
                description: Section definition
                properties:
                  name:
                    type: string
                    description: Display name for the section

                  initialLineId:
                    type: string
                    description: Optional ID of the line to start with when entering this section. If omitted, the first line is used

                  lines:
                    type: array
                    description: Array of story lines/steps within this section
                    minItems: 1
                    items:
                      type: object
                      description: Individual story line/step
                      properties:
                        id:
                          type: string
                          description: Unique identifier for the line
                        actions:
                          type: object
                          description: Actions
                          properties:
                            cleanAll:
                              $ref: "../presentationActions.yaml#/properties/cleanAll"
                            background:
                              $ref: "../presentationActions.yaml#/properties/background"
                            dialogue:
                              $ref: "../presentationActions.yaml#/properties/dialogue"
                            character:
                              $ref: "../presentationActions.yaml#/properties/character"
                            visual:
                              $ref: "../presentationActions.yaml#/properties/visual"
                            choice:
                              $ref: "../presentationActions.yaml#/properties/choice"
                            sfx:
                              $ref: "../presentationActions.yaml#/properties/sfx"
                            bgm:
                              $ref: "../presentationActions.yaml#/properties/bgm"
                            voice:
                              $ref: "../presentationActions.yaml#/properties/voice"
                            control:
                              $ref: "../presentationActions.yaml#/properties/control"
                            layout:
                              $ref: "../presentationActions.yaml#/properties/layout"
                            nextLine:
                              $ref: "../systemActions.yaml#/properties/nextLine"
                            conditional:
                              $ref: "../systemActions.yaml#/properties/conditional"
                            setNextLineConfig:
                              $ref: "../systemActions.yaml#/properties/setNextLineConfig"
                            startAutoMode:
                              $ref: "../systemActions.yaml#/properties/startAutoMode"
                            stopAutoMode:
                              $ref: "../systemActions.yaml#/properties/stopAutoMode"
                            toggleAutoMode:
                              $ref: "../systemActions.yaml#/properties/toggleAutoMode"
                            startSkipMode:
                              $ref: "../systemActions.yaml#/properties/startSkipMode"
                            stopSkipMode:
                              $ref: "../systemActions.yaml#/properties/stopSkipMode"
                            toggleSkipMode:
                              $ref: "../systemActions.yaml#/properties/toggleSkipMode"
                            showDialogueUI:
                              $ref: "../systemActions.yaml#/properties/showDialogueUI"
                            hideDialogueUI:
                              $ref: "../systemActions.yaml#/properties/hideDialogueUI"
                            toggleDialogueUI:
                              $ref: "../systemActions.yaml#/properties/toggleDialogueUI"
                            setDialogueTextSpeed:
                              $ref: "../systemActions.yaml#/properties/setDialogueTextSpeed"
                            setAutoForwardDelay:
                              $ref: "../systemActions.yaml#/properties/setAutoForwardDelay"
                            setSkipUnseenText:
                              $ref: "../systemActions.yaml#/properties/setSkipUnseenText"
                            setSkipTransitionsAndAnimations:
                              $ref: "../systemActions.yaml#/properties/setSkipTransitionsAndAnimations"
                            setSoundVolume:
                              $ref: "../systemActions.yaml#/properties/setSoundVolume"
                            setMusicVolume:
                              $ref: "../systemActions.yaml#/properties/setMusicVolume"
                            setMuteAll:
                              $ref: "../systemActions.yaml#/properties/setMuteAll"
                            setSaveLoadPagination:
                              $ref: "../systemActions.yaml#/properties/setSaveLoadPagination"
                            incrementSaveLoadPagination:
                              $ref: "../systemActions.yaml#/properties/incrementSaveLoadPagination"
                            decrementSaveLoadPagination:
                              $ref: "../systemActions.yaml#/properties/decrementSaveLoadPagination"
                            setMenuPage:
                              $ref: "../systemActions.yaml#/properties/setMenuPage"
                            setMenuEntryPoint:
                              $ref: "../systemActions.yaml#/properties/setMenuEntryPoint"
                            showConfirmDialog:
                              $ref: "../systemActions.yaml#/properties/showConfirmDialog"
                            hideConfirmDialog:
                              $ref: "../systemActions.yaml#/properties/hideConfirmDialog"
                            saveSlot:
                              $ref: "../systemActions.yaml#/properties/saveSlot"
                            loadSlot:
                              $ref: "../systemActions.yaml#/properties/loadSlot"
                            resetStoryAtSection:
                              $ref: "../systemActions.yaml#/properties/resetStoryAtSection"
                            sectionTransition:
                              $ref: "../systemActions.yaml#/properties/sectionTransition"
                            jumpToLine:
                              $ref: "../systemActions.yaml#/properties/jumpToLine"
                            pushOverlay:
                              $ref: "../systemActions.yaml#/properties/pushOverlay"
                            popOverlay:
                              $ref: "../systemActions.yaml#/properties/popOverlay"
                            replaceLastOverlay:
                              $ref: "../systemActions.yaml#/properties/replaceLastOverlay"
                            clearOverlays:
                              $ref: "../systemActions.yaml#/properties/clearOverlays"
                            rollbackByOffset:
                              $ref: "../systemActions.yaml#/properties/rollbackByOffset"
                            rollbackToLine:
                              $ref: "../systemActions.yaml#/properties/rollbackToLine"
                            updateVariable:
                              $ref: "../systemActions.yaml#/properties/updateVariable"
                          additionalProperties: false

                      required: [id, actions]
                      additionalProperties: false

                required: [name, lines]
                additionalProperties: false
            additionalProperties: false

        required: [name, initialSectionId, sections]
        additionalProperties: false
    additionalProperties: false

required: [initialSceneId, scenes]
additionalProperties: false
