$schema: http://json-schema.org/draft-07/schema#
title: Resources Schema
description: Schema for all project resources including images, sounds, characters, etc.
type: object
properties:
  images:
    type: object
    description: Image resources referenced by story actions and layout sprite imageId fields
    patternProperties:
      "^.+$":
        type: object
        description: Image resource
        properties:
          fileId:
            type: string
            description: Reference to the background file resource
          fileType:
            type: string
            description: File type
          width:
            type: integer
            description: Width of the background image
          height:
            type: integer
            description: Height of the background image
        required: [fileId, width, height]
        additionalProperties: false
    additionalProperties: false

  characters:
    type: object
    description: Character sprite assets
    patternProperties:
      "^.+$":
        type: object
        description: Character resource
        properties:
          name:
            type: string
            description: Display name for the character
        additionalProperties: false
    additionalProperties: false

  videos:
    type: object
    description: Video assets
    patternProperties:
      "^.+$":
        type: object
        description: Video resource
        properties:
          fileId:
            type: string
            description: Reference to the video file resource
          fileType:
            type: string
            description: File type
          width:
            type: integer
            description: Width of the video
          height:
            type: integer
            description: Height of the video
        required: [fileId, width, height]
        additionalProperties: false
    additionalProperties: false

  spritesheets:
    type: object
    description: Spritesheet definitions containing image source and frame metadata
    patternProperties:
      "^.+$":
        type: object
        properties:
          fileId:
            type: string
            description: Reference to the spritesheet image file
          jsonData:
            type: object
            description: The JSON metadata (frames, meta)
          width:
            type: integer
            description: Default width for the animated sprite
          height:
            type: integer
            description: Default height for the animated sprite
          animations:
            type: object
            description: Map of named animations
            patternProperties:
              "^.+$":
                type: object
                properties:
                  frames:
                    type: array
                    items:
                      type: number
                    description: Array of frame indices
                  animationSpeed:
                    type: number
                    description: Default playback speed (0.5 is standard)
                  loop:
                    type: boolean
                    description: Whether the animation loops
                required: [frames]
                additionalProperties: false
        required: [fileId, jsonData]
        additionalProperties: false

  transforms:
    type: object
    description: Transform configurations for positioning elements
    patternProperties:
      "^.+$":
        type: object
        description: Transform configuration
        properties:
          x:
            description: X coordinate position
            type: integer
          y:
            description: Y coordinate position
            type: integer
          anchorX:
            description: X anchor point
            type: number
          anchorY:
            description: Y anchor point
            type: number
          scaleX:
            description: X scale factor
            type: number
          scaleY:
            description: Y scale factor
            type: number
          rotation:
            description: Rotation angle in degrees
            type: number
        additionalProperties: false
    additionalProperties: false

  animations:
    type: object
    description: Animation resources for various effects
    patternProperties:
      "^.+$":
        $ref: "animationResource.yaml"
    additionalProperties: false

  sounds:
    type: object
    description: Sounds, including bgm and sound effects
    patternProperties:
      "^.+$":
        type: object
        description: Sound resource
        properties:
          fileId:
            type: string
            description: Reference to the sound file resource
          fileType:
            type: string
            description: File type
        required: [fileId]
        additionalProperties: false
    additionalProperties: false

  colors:
    type: object
    description: Color resources referenced by textStyles and layout rect colorId fields
    patternProperties:
      "^.+$":
        type: object
        description: Color resource
        properties:
          hex:
            type: string
            description: Opaque hex color code. Use #RGB or #RRGGBB only; author transparency separately with element opacity or textStyle colorAlpha / strokeAlpha
            pattern: "^#(?:[0-9a-fA-F]{3}|[0-9a-fA-F]{6})$"
        required: [hex]
        additionalProperties: false
    additionalProperties: false

  fonts:
    type: object
    description: Font resources referenced by resources.textStyles
    patternProperties:
      "^.+$":
        type: object
        description: Font resource
        properties:
          fileId:
            type: string
            description: Reference to the font file resource
          fileType:
            type: string
            description: File type
        required: [fileId]
        additionalProperties: false
    additionalProperties: false

  textStyles:
    type: object
    description: Shared text style resources referenced by layout text textStyleId fields
    patternProperties:
      "^.+$":
        type: object
        description: Text style resource resolved into a renderer-facing textStyle object
        properties:
          fontId:
            type: string
            description: Font file
          colorId:
            type: string
            description: Reference to color resource for font color
          colorAlpha:
            type: number
            description: Alpha applied to the resolved fill color. 0 = transparent, 1 = opaque
          fontSize:
            type: number
            description: Font size in pixels
          fontWeight:
            type: string
            description: CSS font weight
          fontStyle:
            type: string
            description: Font style
            enum: [normal, italic, oblique]
          lineHeight:
            type: number
            description: Line height. 1 = font size pixels
          align:
            type: string
            description: Text alignment
          wordWrap:
            type: boolean
            description: Enable word wrapping
          breakWords:
            type: boolean
            description: Break words when wrapping text
          wordWrapWidth:
            type: number
            description: Wrap width in pixels
          strokeColorId:
            type: string
            description: Stroke reference to color resource for font color
          strokeAlpha:
            type: number
            description: Alpha applied to the resolved stroke color. 0 = transparent, 1 = opaque
          strokeWidth:
            type: number
            description: Stroke width
        required: [fontId, fontSize, fontWeight, fontStyle, lineHeight, colorId]
        additionalProperties: false
    additionalProperties: false

  controls:
    type: object
    description: Control resources containing keyboard bindings and optional UI elements
    patternProperties:
      "^.+$":
        type: object
        description: Control configuration. This schema is intentionally permissive because runtime-supported control fields may grow beyond the documented subset.
        properties:
          keyboard:
            type: object
            description: Key-to-action mappings owned by the control resource
            additionalProperties:
              type: object
              properties:
                actions:
                  type: object
              required: [actions]
          elements:
            type: array
            description: Array of UI elements authored with textStyleId, imageId, and colorId references
            items:
              type: object
              additionalProperties: true
        additionalProperties: true

  layouts:
    type: object
    description: Layout configurations authored with resource references that are resolved before rendering
    patternProperties:
      "^.+$":
        type: object
        description: Layout configuration. This schema is intentionally permissive because runtime-supported layout fields extend beyond the documented subset.
        properties:
          elements:
            type: array
            description: Array of UI elements authored with textStyleId, imageId, and colorId references
            items:
              type: object
              additionalProperties: true
        additionalProperties: true
    additionalProperties: false

  variables:
    type: object
    description: Variables and their initial values
    patternProperties:
      "^.+$":
        type: object
        description: Variable value
        required: [type, scope]
        properties:
          type:
            type: string
            enum: [string, boolean, number, object]
          scope:
            type: string
            enum: [context, global-device, global-account]
          default:
            description: Default initial value for the variable. Runtime accepts any YAML value and uses it as-is
        additionalProperties: true
    additionalProperties: false

additionalProperties: false
