<html>
  <head>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-wrap: unset;
        overflow: hidden;
        background: #000;
      }

      #canvas {
        width: 100vw;
        height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      #canvas canvas {
        display: block;
        max-width: 100vw;
        max-height: 100vh;
        width: auto;
        height: auto;
      }
    </style>
  </head>
  <body>
    <div id="canvas"></div>
  </body>
  <script>
    window.yamlContent = {{ content | json }}
  </script>
  <script src="/main.js" type="module">
  </script>
</html>
