---
title: Visual Playback Speed
skipInitialScreenshot: true
description: |
  Visual update animation playback speed should scale elapsed time without
  duplicating the reusable animation resource.

  - the top visual uses speed 2 and should reach the end after 500ms
  - the bottom visual uses speed 0.5 and should only be a quarter through after 500ms
steps:
  - action: wait
    ms: 80
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 500
  - action: screenshot
---
screen:
  width: 1920
  height: 1080
resources:
  images:
    marker:
      fileId: a32kf3
      width: 100
      height: 100
  transforms:
    topStart:
      x: 300
      y: 360
      anchorX: 0.5
      anchorY: 0.5
      rotation: 0
      scaleX: 1
      scaleY: 1
    bottomStart:
      x: 300
      y: 720
      anchorX: 0.5
      anchorY: 0.5
      rotation: 0
      scaleX: 1
      scaleY: 1
  animations:
    slideRight:
      type: update
      tween:
        x:
          initialValue: 300
          keyframes:
            - duration: 1000
              value: 1300
              easing: linear
story:
  initialSceneId: speedScene
  scenes:
    speedScene:
      name: Speed Scene
      initialSectionId: main
      sections:
        main:
          lines:
            - id: line1
              actions:
                visual:
                  items:
                    - id: fast-marker
                      resourceId: marker
                      transformId: topStart
                      animations:
                        resourceId: slideRight
                        playback:
                          speed: 2
                    - id: slow-marker
                      resourceId: marker
                      transformId: bottomStart
                      animations:
                        resourceId: slideRight
                        playback:
                          speed: 0.5
