---
title: Initial Line ID
description: Test starting at a specific line via initialLineId
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  layouts:
    base1:
      elements:
        - id: bg
          type: rect
          width: 1920
          height: 1080
          colorId: layoutColor1
    dialogueGui:
      name: Dialogue Screen
      mode: adv
      elements:
        - id: dialogue-container
          type: container
          x: 100
          y: 800
          children:
            - id: dialogue-text
              type: text
              x: 50
              y: 50
              content: ${dialogue.content[0].text}
              textStyleId: textStyle1
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: "#FFFFFF"
    layoutColor1:
      hex: "#000000"
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 48
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: main
  scenes:
    main:
      initialSectionId: section1
      sections:
        section1:
          initialLineId: line2
          lines:
            - id: line1
              actions:
                base:
                  resourceId: base1
                dialogue:
                  ui:
                    resourceId: dialogueGui
                  content:
                    - text: Line 1 (Should not start here)
            - id: line2
              actions:
                dialogue:
                  content:
                    - text: Line 2 (Should start here)
            - id: line3
              actions:
                dialogue:
                  content:
                    - text: Line 3
