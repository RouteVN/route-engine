---
title: Sample
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  variables:
    savePages:
      type: object
      readonly: true
      default:
        items:
          - label: 1
          - label: 2
          - label: 3
          - label: 4
          - label: 5
          - label: 6
          - label: 7
          - label: 8
          - label: 9
    gallery:
      type: object
      default:
        items:
          - label: CG1
            resourceId: alkejf3l
            fileIds:
              - 94lkj289
              - 23jkfa893
              - dmni32
          - label: CG2
            resourceId: f3wklajf32
            fileIds:
              - 23jkfa893
          - label: CG3
            resourceId: 32rka331
            fileIds:
              - dmni32
    activeGalleryIndex:
      type: number
    activeGalleryFileIndex:
      type: number
      default: 0
    exploredResourceIds:
      default:
        items: []
    currentSavePageIndex:
      type: number
      default: 0
    currentMenuTabId:
      type: string
      default: options
      persistence: context
    textSpeed:
      type: number
      default: 50
      persistence: global-device
  layouts:
    base1:
      elements:
        - id: af32
          type: rect
          width: 1920
          height: 1080
          click:
            actionPayload:
              actions:
                nextLine: {}
          colorId: layoutColor1
    historyDialogueLayout:
      elements:
        - id: k3jfald
          type: rect
          x: 100
          y: 100
          width: 800
          height: 800
          colorId: color2
        - id: afk2lkas
          type: container
          x: 120
          y: 120
          children:
            - id: fkjl233
              type: text
              content: Dialogue History
              textStyleId: textStyle1
            - id: fkjaefewfl233
              type: text
              content: Close
              y: 700
              eventName: system
              eventPayload:
                actions:
                  clearLastLayeredView: {}
              textStyleId: textStyle1
            - id: 32kljfsf3
              type: container
              direction: vertical
              height: 500
              width: 500
              scroll: true
              gap: 10
              y: 120
              children:
                - $for item, i in historyDialogue:
                    id: kl2j3flk23-${i}
                    type: text
                    content: ${item.content}
                    height: 80
                    width: 500
                    textStyleId: textStyle2
    layeredViewGalleryItemLayout:
      elements:
        - id: afk2lkas
          type: container
          children:
            - id: k9ka3lk-${isLastFileIdIndex}
              type: sprite
              imageId: file:${currentActiveGalleryFileId}
              x: 0
              y: 0
              width: 1920
              height: 1080
              eventName: system
              eventPayload:
                $if !isLastFileIdIndex:
                  actions:
                    updateVariable:
                      id: uv1
                      operations:
                        - variableId: activeGalleryFileIndex
                          op: increment
                $else:
                  actions:
                    updateVariable:
                      id: uv2
                      operations:
                        - variableId: activeGalleryFileIndex
                          op: set
                          value: 0
                    clearLastLayeredView: {}
    creditsLayout:
      transitions:
        - id: 932fsdf
          type: live
          targetId: kjf32alk32
          tween:
            y:
              keyframes:
                - duration: 20000
                  value: -1600
                  easing: linear
                  relative: true
      elements:
        - id: kjf32alk32
          type: container
          direction: vertical
          x: 300
          y: 800
          children:
            - id: x23f329fa
              type: text
              content: Director
              height: 100
              textStyleId: textStyle1
            - id: f33h429fa
              type: text
              content: Lead Developer
              height: 100
              textStyleId: textStyle1
            - id: iasdkj32
              type: text
              content: Art Director
              height: 100
              textStyleId: textStyle1
            - id: credit4
              type: text
              content: Music Composer
              height: 100
              textStyleId: textStyle1
            - id: credit5
              type: text
              content: Sound Designer
              height: 100
              textStyleId: textStyle1
            - id: credit6
              type: text
              content: Lead Writer
              height: 100
              textStyleId: textStyle1
            - id: credit7
              type: text
              content: Story Editor
              height: 100
              textStyleId: textStyle1
            - id: credit8
              type: text
              content: Character Designer
              height: 100
              textStyleId: textStyle1
            - id: credit9
              type: text
              content: Background Artist
              height: 100
              textStyleId: textStyle1
            - id: credit10
              type: text
              content: UI Designer
              height: 100
              textStyleId: textStyle1
            - id: credit11
              type: text
              content: Quality Assurance
              height: 100
              textStyleId: textStyle1
            - id: credit12
              type: text
              content: Beta Testers
              height: 100
              textStyleId: textStyle1
            - id: credit13
              type: text
              content: Special Thanks
              height: 100
              textStyleId: textStyle1
            - id: credit14
              type: text
              content: Community Manager
              height: 100
              textStyleId: textStyle1
            - id: credit15
              type: text
              content: Technical Advisor
              height: 100
              textStyleId: textStyle1
            - id: credit16
              type: text
              content: Marketing Lead
              height: 100
              textStyleId: textStyle1
            - id: credit17
              type: text
              content: Localization Manager
              height: 100
              textStyleId: textStyle1
            - id: credit18
              type: text
              content: Voice Director
              height: 100
              textStyleId: textStyle1
            - id: credit19
              type: text
              content: Sound Engineer
              height: 100
              textStyleId: textStyle1
            - id: credit20
              type: text
              content: Thank you for playing!
              height: 100
              textStyleId: textStyle1
    titleScreenLayout:
      name: Title Screen Background
      elements:
        - id: title-screen-bg
          type: rect
          x: 0
          y: 0
          width: 1920
          height: 1080
          clickEventName: system
          clickEventPayload:
            actions:
              nextLine: {}
          rightClickEventName: system
          rightClickEventPayload:
            actions:
              addLayeredView:
                resourceId: dafkjkl3
                resourceType: layout
              updateVariable:
                id: uv3
                operations:
                  - variableId: isMainMenu
                    op: set
                    value: true
          colorId: layoutColor1
    storyScreenLayout:
      name: Story Screen Background
      elements:
        - id: story-screen-bg
          type: rect
          x: 0
          y: 0
          width: 1920
          height: 1080
          click:
            actionPayload:
              actions:
                nextLine: {}
          colorId: layoutColor1
    extraScreenLayout:
      name: ExtraScreen Background
      elements:
        - id: extra-screen-bg
          type: rect
          x: 0
          y: 0
          width: 1920
          height: 1080
          clickEventName: system
          clickEventPayload:
            actions:
              nextLine: {}
          colorId: layoutColor1
    dafkjkl3:
      name: Menu Screen
      elements:
        - type: container
          children:
            - id: k3jl2rj
              type: rect
              width: 1920
              height: 1080
              rightClickEventName: system
              rightClickEventPayload:
                actions:
                  clearLastLayeredView: {}
              colorId: layoutColor2
            - id: 9fdadf
              $when: variables.currentMenuTabId == "options"
              type: container
              children:
                - type: text
                  content: Options
                  x: 100
                  y: 100
                  textStyleId: textStyle3
                - id: 39jfkal21
                  type: container
                  x: 300
                  y: 200
                  width: 1400
                  height: 300
                  children:
                    - id: textspeed-id
                      type: text
                      x: 20
                      y: 0
                      content: Text Speed
                      textStyleId: textStyle2
                    - id: a
                      type: slider
                      x: 20
                      y: 50
                      direction: horizontal
                      idleThumb: file:horizontal_idle_thumb
                      hoverThumb: file:horizontal_hover_thumb
                      idleBar: file:horizontal_idle_bar
                      hoverBar: file:horizontal_hover_bar
                      dragEventName: system
                      dragEndEventName: system
                      dragEventPayload:
                        actions:
                          updateVariable:
                            id: uv4
                            operations:
                              - variableId: textSpeed
                                op: set
                                value: "{{ value }}"
            - id: 9fdadf
              $when: variables.currentMenuTabId == "load"
              type: container
              children:
                - id: load-title
                  type: text
                  content: Load Game
                  x: 100
                  y: 100
                  textStyleId: textStyle3
                - id: load-container
                  type: container
                  x: 300
                  y: 100
                  width: 1400
                  direction: horizontal
                  gap: 20
                  children:
                    - $for item in saveDataArray:
                        - id: feakjl-${item.id}
                          type: container
                          x: 0
                          y: 0
                          width: 400
                          height: 300
                          children:
                            - id: 1-${item.id}
                              $when: item.hasData
                              type: sprite
                              imageId: saveImage:${item.id}
                              x: 0
                              y: 0
                              width: 400
                              height: 300
                              eventName: system
                              eventPayload:
                                actions:
                                  loadVnData:
                                    slotIndex: ${item.id}
                            - id: 2-${item.id}
                              $when: "!item.hasData"
                              type: sprite
                              imageId: file:lakjf3lka
                              hoverImageId: file:dmni32
                              x: 0
                              y: 0
                              width: 400
                              height: 300
                            - id: 3-${item.id}
                              type: text
                              x: 20
                              y: 20
                              content: ${item.id} - ${item.label}
                              textStyleId: textStyle1
                - id: save-container-page-nums
                  type: container
                  x: 300
                  y: 800
                  direction: horizontal
                  gap: 20
                  children:
                    - id: page-prev
                      type: text
                      content: Previous
                      width: 80
                      $if variables.currentSavePageIndex > 0:
                        hover:
                          textStyleId: textStyle5
                        eventName: system
                        eventPayload:
                          actions:
                            updateVariable:
                              id: uv5
                              operations:
                                - variableId: currentSavePageIndex
                                  op: decrement
                                  min: 0
                        textStyleId: textStyle1
                      $else:
                        textStyleId: textStyle4
                    - id: save-container-page-nums-container
                      type: container
                      direction: horizontal
                      gap: 20
                      width: 900
                      children:
                        - $for item, i in variables.savePages.items:
                            - id: id-${item.label}
                              type: text
                              content: ${item.label}
                              width: 80
                              $if i == variables.currentSavePageIndex:
                                textStyleId: textStyle5
                              $else:
                                eventName: system
                                eventPayload:
                                  actions:
                                    updateVariable:
                                      id: uv6
                                      operations:
                                        - variableId: currentSavePageIndex
                                          op: set
                                          value: ${i}
                                textStyleId: textStyle1
                    - id: page-next
                      type: text
                      content: Next
                      width: 80
                      $if variables.currentSavePageIndex < 8:
                        hover:
                          textStyleId: textStyle5
                        eventName: system
                        eventPayload:
                          actions:
                            updateVariable:
                              id: uv7
                              operations:
                                - variableId: currentSavePageIndex
                                  op: increment
                                  max: 8
                        textStyleId: textStyle1
                      $else:
                        textStyleId: textStyle4
            - id: 9fdadf
              $when: variables.currentMenuTabId == "save"
              type: container
              children:
                - id: save-title
                  type: text
                  content: Save Game
                  x: 100
                  y: 100
                  textStyleId: textStyle3
                - id: save-container
                  type: container
                  x: 300
                  y: 100
                  width: 1400
                  direction: horizontal
                  gap: 20
                  children:
                    - $for item in saveDataArray:
                        - id: ${item.id}
                          type: container
                          x: 0
                          y: 0
                          width: 400
                          height: 300
                          children:
                            - id: ef31-${item.id}-${item.hasData}
                              $when: item.hasData
                              type: sprite
                              imageId: saveImage:${item.id}
                              hoverImageId: file:dmni32
                              x: 0
                              y: 0
                              width: 400
                              height: 300
                              eventName: system
                              eventPayload:
                                actions:
                                  saveVnData:
                                    slotIndex: ${item.id}
                            - id: afe1jjef31-${item.id}-${item.hasData}
                              $when: "!item.hasData"
                              type: sprite
                              imageId: file:lakjf3lka
                              x: 0
                              y: 0
                              width: 400
                              height: 300
                              eventName: system
                              eventPayload:
                                actions:
                                  saveVnData:
                                    slotIndex: ${item.id}
                            - id: 3fadj-${item.id}
                              type: text
                              x: 20
                              y: 20
                              content: ${item.id} - ${item.label}
                              textStyleId: textStyle1
                - id: save-container-page-nums
                  type: container
                  x: 300
                  y: 800
                  direction: horizontal
                  gap: 20
                  children:
                    - id: page-prev
                      type: text
                      content: Previous
                      width: 80
                      $if variables.currentSavePageIndex > 0:
                        hover:
                          textStyleId: textStyle5
                        eventName: system
                        eventPayload:
                          actions:
                            updateVariable:
                              id: uv8
                              operations:
                                - variableId: currentSavePageIndex
                                  op: decrement
                                  min: 0
                        textStyleId: textStyle1
                      $else:
                        textStyleId: textStyle4
                    - id: save-container-page-nums-container
                      type: container
                      direction: horizontal
                      gap: 20
                      width: 900
                      children:
                        - $for item, i in variables.savePages.items:
                            - id: id-${item.label}
                              type: text
                              content: ${item.label}
                              width: 80
                              $if i == variables.currentSavePageIndex:
                                textStyleId: textStyle5
                              $else:
                                eventName: system
                                eventPayload:
                                  actions:
                                    updateVariable:
                                      id: uv9
                                      operations:
                                        - variableId: currentSavePageIndex
                                          op: set
                                          value: ${i}
                                textStyleId: textStyle1
                    - id: page-next
                      type: text
                      content: Next
                      width: 80
                      $if variables.currentSavePageIndex < 8:
                        hover:
                          textStyleId: textStyle5
                        eventName: system
                        eventPayload:
                          actions:
                            updateVariable:
                              id: uv10
                              operations:
                                - variableId: currentSavePageIndex
                                  op: increment
                                  max: 8
                        textStyleId: textStyle1
                      $else:
                        textStyleId: textStyle4
            - id: kfewaf3k29fdsk
              $when: variables.currentMenuTabId == "languages"
              type: container
              children:
                - id: languages-title
                  type: text
                  content: Localization
                  x: 100
                  y: 100
                  textStyleId: textStyle3
                - id: languages-container
                  type: container
                  x: 400
                  y: 300
                  width: 1400
                  direction: vertical
                  gap: 30
                  children:
                    - id: languages-item-source
                      type: text
                      content: Source language content is shown in this build.
                      height: 40
                      textStyleId: textStyle6
                    - id: languages-item-note
                      type: text
                      content: Future localization will use sparse patches over authored content.
                      height: 40
                      textStyleId: textStyle8
            - id: 9fe23fdadf
              $when: variables.currentMenuTabId == "gallery"
              type: container
              children:
                - id: gallery-title
                  type: text
                  content: Gallery
                  x: 100
                  y: 100
                  textStyleId: textStyle3
                - id: gallery-container
                  type: container
                  x: 300
                  y: 100
                  width: 1400
                  direction: horizontal
                  gap: 20
                  children:
                    - $for item, i in variables.gallery.items:
                        - id: 32fe-${item.label}
                          type: container
                          x: 0
                          y: 0
                          width: 400
                          height: 300
                          children:
                            - id: ef3ef1-${item.label}
                              type: sprite
                              imageId: file:dmni32
                              x: 0
                              y: 0
                              width: 400
                              height: 300
                              eventName: system
                              eventPayload:
                                actions:
                                  updateVariable:
                                    id: uv11
                                    operations:
                                      - variableId: activeGalleryIndex
                                        op: set
                                        value: ${i}
                                      - variableId: activeGalleryFileIndex
                                        op: set
                                        value: 0
                                addLayeredView:
                                  resourceId: layeredViewGalleryItemLayout
                            - id: 3fadje2-${item.label}
                              type: text
                              x: 20
                              y: 20
                              content: ${item.label}
                              textStyleId: textStyle1
                            - id: 3fa93224dje2-${item.label}
                              type: text
                              x: 20
                              y: 80
                              content: ${item.fileIds.length}
                              textStyleId: textStyle1
            - id: 9fedf2323fdadf
              $when: variables.currentMenuTabId == "replay"
              type: container
              children:
                - id: replay-title
                  type: text
                  content: Scene Replay
                  x: 100
                  y: 100
                  textStyleId: textStyle3
                - id: replay-container
                  type: container
                  x: 300
                  y: 100
                  width: 1400
                  direction: horizontal
                  gap: 20
                  children:
                    - id: ef3ef13k1
                      type: sprite
                      imageId: file:dmni32
                      x: 0
                      y: 0
                      width: 400
                      height: 300
                      eventName: system
                      eventPayload:
                        actions:
                          sectionTransition:
                            mode: replay
                            sceneId: ajfl3a
                            sectionId: k3nfgdsai34
            - id: 399324jd
              $when: variables.currentMenuTabId == "music-room"
              type: container
              children:
                - id: music-room-title
                  type: text
                  content: Music Room
                  x: 100
                  y: 100
                  textStyleId: textStyle3
                - id: music-room-container
                  type: container
                  x: 600
                  y: 100
                  width: 1400
                  direction: vertical
                  gap: 20
                  children:
                    - id: fjkl2jk
                      type: text
                      content: Track 1
                      height: 100
                      eventName: system
                      eventPayload:
                        actions:
                          addGlobalAudio:
                            fileId: 3ka3s
                      textStyleId: textStyle8
                    - id: fjkl2fe23jk
                      type: text
                      content: Track 2
                      height: 100
                      textStyleId: textStyle8
                - id: music-room-stop
                  $when: globalAudios.length > 0
                  type: text
                  content: Stop Music
                  x: 500
                  y: 500
                  height: 100
                  eventName: system
                  eventPayload:
                    actions:
                      clearAllGlobalAudio: {}
                  textStyleId: textStyle8
        - id: menu-container
          direction: vertical
          gap: 20
          type: container
          x: 100
          y: 540
          children:
            - id: Start
              $when: variables.isMainMenu == true
              type: text
              content: Start
              height: 40
              width: 200
              eventName: system
              eventPayload:
                actions:
                  clearLastLayeredView: {}
                  sectionTransition:
                    sectionId: 3k3s9sd
              x: 0
              y: 0
              hover:
                textStyleId: textStyle5
              textStyleId: textStyle1
            - id: Save
              $when: variables.isMainMenu == false
              type: text
              content: Save
              height: 40
              width: 200
              eventName: system
              eventPayload:
                actions:
                  updateVariable:
                    id: uv12
                    operations:
                      - variableId: currentMenuTabId
                        op: set
                        value: save
              x: 0
              y: 0
              hover:
                textStyleId: textStyle5
              textStyleId:
                $if variables.currentMenuTabId == "save": textStyle5
                $else: textStyle1
            - id: Load
              type: text
              content: Load
              height: 40
              width: 200
              eventName: system
              eventPayload:
                actions:
                  updateVariable:
                    id: uv13
                    operations:
                      - variableId: currentMenuTabId
                        op: set
                        value: load
              x: 0
              y: 0
              hover:
                textStyleId: textStyle5
              textStyleId:
                $if variables.currentMenuTabId == "load": textStyle5
                $else: textStyle1
            - id: Options
              type: text
              content: Options
              height: 40
              width: 200
              eventName: system
              eventPayload:
                actions:
                  updateVariable:
                    id: uv14
                    operations:
                      - variableId: currentMenuTabId
                        op: set
                        value: options
              x: 0
              y: 0
              hover:
                textStyleId: textStyle5
              textStyleId:
                $if variables.currentMenuTabId == "options": textStyle5
                $else: textStyle1
            - id: Languages
              type: text
              content: Languages
              height: 40
              width: 200
              eventName: system
              eventPayload:
                actions:
                  updateVariable:
                    id: uv15
                    operations:
                      - variableId: currentMenuTabId
                        op: set
                        value: languages
              x: 0
              y: 0
              hover:
                textStyleId: textStyle5
              textStyleId:
                $if variables.currentMenuTabId == "languages": textStyle5
                $else: textStyle1
            - id: Gallery
              type: text
              content: Gallery
              height: 40
              width: 200
              eventName: system
              eventPayload:
                actions:
                  updateVariable:
                    id: uv16
                    operations:
                      - variableId: currentMenuTabId
                        op: set
                        value: gallery
              x: 0
              y: 0
              hover:
                textStyleId: textStyle5
              textStyleId:
                $if variables.currentMenuTabId == "gallery": textStyle5
                $else: textStyle1
            - id: Replay
              type: text
              content: Replay
              height: 40
              width: 200
              eventName: system
              eventPayload:
                actions:
                  updateVariable:
                    id: uv17
                    operations:
                      - variableId: currentMenuTabId
                        op: set
                        value: replay
              x: 0
              y: 0
              hover:
                textStyleId: textStyle5
              textStyleId:
                $if variables.currentMenuTabId == "replay": textStyle5
                $else: textStyle1
            - id: Music Room
              type: text
              content: Music Room
              height: 40
              width: 200
              eventName: system
              eventPayload:
                actions:
                  updateVariable:
                    id: uv18
                    operations:
                      - variableId: currentMenuTabId
                        op: set
                        value: music-room
              x: 0
              y: 0
              hover:
                textStyleId: textStyle5
              textStyleId:
                $if variables.currentMenuTabId == "music-room": textStyle5
                $else: textStyle1
            - id: Main
              $when: variables.isMainMenu == false
              type: text
              content: Main
              height: 40
              width: 200
              eventName: system
              eventPayload:
                actions:
                  clearLastLayeredView: {}
                  sectionTransition:
                    mode: read
                    sectionId: l3kjfawelf
              x: 0
              y: 0
              hover:
                textStyleId: textStyle5
              textStyleId: textStyle1
            - id: back
              type: text
              content: Back
              height: 40
              width: 200
              eventName: system
              eventPayload:
                actions:
                  clearLastLayeredView: {}
              x: 0
              y: 0
              hover:
                textStyleId: textStyle5
              textStyleId: textStyle1
    3jfksdjkadf:
      name: Dialogue NVL
      mode: nvl
      elements:
        - id: 3kjfafj32
          type: rect
          x: 40
          y: 40
          width: 1720
          height: 880
          opacity: 0.5
          colorId: color2
        - id: dialogue-contaef32iner
          type: container
          x: 100
          y: 100
          children:
            - id: dialogue-character-name
              type: text
              content: ${dialogue.character.name}
              x: 0
              y: 0
              textStyleId: textStyle2
            - id: 3kjfasdkfj
              type: container
              direction: vertical
              gap: 20
              children:
                - $for line, i in dialogue.lines:
                    - id: dialogue-text-${i}
                      type: text-revealing
                      y: 100
                      $if i == dialogue.lines.length - 1:
                        displaySpeed: 50
                      $else:
                        displaySpeed: 100
                      height: 100
                      content: ${line.content}
                      textStyleId: textStyle2
    fi3l:
      name: Dialogue Screen
      mode: adv
      elements:
        - id: dialogue-container
          type: container
          x: 100
          y: 100
          children:
            - id: dialogue-character-name
              type: text
              content: ${dialogue.character.name}
              x: 0
              y: 0
              textStyleId: textStyle2
            - id: dialogue-text
              type: text
              y: 100
              content: ${dialogue.content[0].text}
              textStyleId: textStyle2
        - id: dialogue-actions
