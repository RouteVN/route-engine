---
title: Slider Variable Binding Test
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#222222"
resources:
  variables:
    sliderValue:
      type: number
      scope: device
      default: 50
  images:
    horizontal_idle_thumb:
      fileId: horizontal_idle_thumb.png
      width: 20
      height: 20
    horizontal_idle_bar:
      fileId: horizontal_idle_bar.png
      width: 200
      height: 10
    horizontal_hover_thumb:
      fileId: horizontal_hover_thumb.png
      width: 20
      height: 20
    horizontal_hover_bar:
      fileId: horizontal_hover_bar.png
      width: 200
      height: 10
  layouts:
    baseLayout:
      elements:
        - id: background
          type: rect
          width: 1920
          height: 1080
          click:
            payload:
              actions:
                nextLine: {}
          colorId: layoutColor1
    sliderTestLayout:
      name: Slider Variable Binding Test
      elements:
        - id: mainContainer
          type: container
          x: 960
          y: 400
          children:
            - id: title
              type: text
              content: Slider Variable Binding Test
              x: 0
              y: -200
              anchorX: 0.5
              textStyleId: textStyle1
            - id: instructions
              type: text
              content: Drag the slider - the value below should update in real-time
              x: 0
              y: -120
              anchorX: 0.5
              textStyleId: textStyle2
            - id: valueLabel
              type: text
              content: "Current Value:"
              x: -100
              y: 0
              anchorX: 0.5
              textStyleId: textStyle3
            - id: valueDisplay
              type: text
              content: ${variables.sliderValue}
              x: 80
              y: 0
              anchorX: 0.5
              textStyleId: textStyle4
            - id: testSlider
              type: slider
              direction: horizontal
              thumbSrc: horizontal_idle_thumb
              barSrc: horizontal_idle_bar
              width: 300
              height: 20
              x: -150
              y: 100
              min: 0
              max: 100
              step: 1
              initialValue: ${variables.sliderValue}
              hover:
                thumbSrc: horizontal_hover_thumb
                barSrc: horizontal_hover_bar
              change:
                payload:
                  actions:
                    updateVariable:
                      id: setSliderValue
                      operations:
                        - variableId: sliderValue
                          op: set
                          value: _event.value
            - id: minLabel
              type: text
              content: "0"
              x: -170
              y: 100
              anchorX: 0.5
              textStyleId: textStyle5
            - id: maxLabel
              type: text
              content: "100"
              x: 170
              y: 100
              anchorX: 0.5
              textStyleId: textStyle5
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: "#ffffff"
    color2:
      hex: "#aaaaaa"
    color3:
      hex: "#00ff00"
    color4:
      hex: "#888888"
    layoutColor1:
      hex: "#333333"
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 48
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle2:
      fontId: fontDefault
      colorId: color2
      fontSize: 24
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle3:
      fontId: fontDefault
      colorId: color1
      fontSize: 32
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle4:
      fontId: fontDefault
      colorId: color3
      fontSize: 48
      fontWeight: bold
      fontStyle: normal
      lineHeight: 1.2
    textStyle5:
      fontId: fontDefault
      colorId: color4
      fontSize: 20
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: testScene
  scenes:
    testScene:
      name: Slider Test Scene
      initialSectionId: mainSection
      sections:
        mainSection:
          name: Main Section
          lines:
            - id: line1
              actions:
                background:
                  resourceId: baseLayout
                layout:
                  resourceId: sliderTestLayout
