  layouts:
    persistentDialogue:
      mode: adv
      elements:
        - id: dialogue-box
          type: rect
          x: 100
          y: 780
          width: 1720
          height: 220
          alpha: 0.92
          colorId: panelColor
        - id: dialogue-text
          type: text
          x: 150
          y: 845
          width: 1620
          content: ${dialogue.content[0].text}
          textStyleId: dialogueText
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    overlayColor:
      hex: "#000000"
    panelColor:
      hex: "#4D4D4D"
    textColor:
      hex: "#FFFFFF"
  textStyles:
    dialogueText:
      fontId: fontDefault
      colorId: textColor
      fontSize: 30
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.25
story:
  initialSceneId: backgroundScene
  scenes:
    backgroundScene:
      name: Background Scene
      initialSectionId: main
      sections:
        main:
          lines:
            - id: line1
              actions:
                control:
                  resourceId: advanceToLine2
                background:
                  resourceId: bg-door
                  animations:
                    resourceId: bg-fade-in
                    playback:
                      continuity: persistent
                dialogue:
                  mode: adv
                  ui:
                    resourceId: persistentDialogue
                  content:
                    - text: "Line 1: the door fades in slowly while the dialogue sequence starts."
            - id: line2
              actions:
                control:
                  resourceId: advanceToLine3
                dialogue:
                  mode: adv
                  ui:
                    resourceId: persistentDialogue
                  content:
                    - text: "Line 2: the scene re-renders, but the same transition should keep its current progress."
            - id: line3
              actions:
                control:
                  resourceId: advanceToLine4
                dialogue:
                  mode: adv
                  ui:
                    resourceId: persistentDialogue
                  content:
                    - text: "Line 3: this is another ordinary dialogue advance, not a fresh transition start."
            - id: line4
              actions:
                control:
                  resourceId: advanceToLine5
                dialogue:
                  mode: adv
                  ui:
                    resourceId: persistentDialogue
                  content:
                    - text: "Line 4: the fade should be brighter now, with no jump back toward black."
            - id: line5
              actions:
                control:
                  resourceId: advanceToLine6
                dialogue:
                  mode: adv
                  ui:
                    resourceId: persistentDialogue
                  content:
                    - text: "Line 5: this line exists only to keep proving continuity across repeated dialogue renders."
            - id: line6
              actions:
                control:
                  resourceId: advanceToLine7
                dialogue:
                  mode: adv
                  ui:
                    resourceId: persistentDialogue
                  content:
                    - text: "Line 6: if persistence were broken, the door would restart its fade on every line."
            - id: line7
              actions:
                control:
                  resourceId: advanceToLine8
                dialogue:
                  mode: adv
                  ui:
                    resourceId: persistentDialogue
                  content:
                    - text: "Line 7: instead, the background should keep climbing from the exact prior alpha."
            - id: line8
              actions:
                control:
                  resourceId: advanceToLine9
                dialogue:
                  mode: adv
                  ui:
                    resourceId: persistentDialogue
                  content:
                    - text: "Line 8: later dialogue lines matter because they force more full scene renders."
            - id: line9
              actions:
                control:
                  resourceId: advanceToLine10
                dialogue:
                  mode: adv
                  ui:
                    resourceId: persistentDialogue
                  content:
                    - text: "Line 9: the fade should now be well underway, not back near its original alpha."
            - id: line10
              actions:
                dialogue:
                  mode: adv
                  ui:
                    resourceId: persistentDialogue
                  content:
                    - text: "Line 10: the final dialogue line should still inherit the same long-running transition."
