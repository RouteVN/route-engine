---
title: Background Playback Persistent Transition Dialogue Continuity
skipInitialScreenshot: true
description: |
  A persistent background transition should stay in flight while dialogue
  advances across many lines instead of restarting on each line render.

  - line 1 starts a long-running persistent background transition
  - manual dialogue advances move through at least 10 lines
  - later lines do not restate the background animation
  - the background fade should keep progressing instead of jumping back
steps:
  - action: wait
    ms: 400
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 400
  - action: screenshot
  - action: click
    x: 960
    y: 540
  - action: wait
    ms: 800
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 800
  - action: screenshot
  - action: click
    x: 960
    y: 540
  - action: wait
    ms: 800
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 800
  - action: screenshot
  - action: click
    x: 960
    y: 540
  - action: wait
    ms: 800
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 800
  - action: screenshot
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  images:
    bg-door:
      fileId: lakjf3lka
      width: 1920
      height: 1080
  animations:
    bg-fade-in:
      type: transition
      next:
        tween:
          alpha:
            initialValue: 0
            keyframes:
              - duration: 10000
                value: 1
                easing: linear
  controls:
    advanceToLine2:
      elements:
        - id: click-area
          type: rect
          width: 1920
          height: 1080
          alpha: 0.001
          click:
            payload:
              actions:
                jumpToLine:
                  lineId: line2
          colorId: overlayColor
    advanceToLine3:
      elements:
        - id: click-area
          type: rect
          width: 1920
          height: 1080
          alpha: 0.001
          click:
            payload:
              actions:
                jumpToLine:
                  lineId: line3
          colorId: overlayColor
    advanceToLine4:
      elements:
        - id: click-area
          type: rect
          width: 1920
          height: 1080
          alpha: 0.001
          click:
            payload:
              actions:
                jumpToLine:
                  lineId: line4
          colorId: overlayColor
    advanceToLine5:
      elements:
        - id: click-area
          type: rect
          width: 1920
          height: 1080
          alpha: 0.001
          click:
            payload:
              actions:
                jumpToLine:
                  lineId: line5
          colorId: overlayColor
    advanceToLine6:
      elements:
        - id: click-area
          type: rect
          width: 1920
          height: 1080
          alpha: 0.001
          click:
            payload:
              actions:
                jumpToLine:
                  lineId: line6
          colorId: overlayColor
    advanceToLine7:
      elements:
        - id: click-area
          type: rect
          width: 1920
          height: 1080
          alpha: 0.001
          click:
            payload:
              actions:
                jumpToLine:
                  lineId: line7
          colorId: overlayColor
    advanceToLine8:
      elements:
        - id: click-area
          type: rect
          width: 1920
          height: 1080
          alpha: 0.001
          click:
            payload:
              actions:
                jumpToLine:
                  lineId: line8
          colorId: overlayColor
    advanceToLine9:
      elements:
        - id: click-area
          type: rect
          width: 1920
          height: 1080
          alpha: 0.001
          click:
            payload:
              actions:
                jumpToLine:
                  lineId: line9
          colorId: overlayColor
    advanceToLine10:
