---
title: Background Transition Enter With Both Sides
description: |
  Background image entering after an auto line advance with a transition resource
  that defines both prev and next alpha tweens.

  Only the next side should matter for this enter lifecycle.
specs:
  - background enter should tolerate transition resources that also define prev
  - the background should be partially visible halfway through the transition
  - the background should be fully visible after the transition completes
steps:
  - action: wait
    ms: 600
  - action: screenshot
  - action: wait
    ms: 600
  - action: screenshot
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  images:
    bg-door:
      fileId: lakjf3lka
      width: 1920
      height: 1080
  animations:
    bg-fade-enter-both:
      name: Background Fade Enter With Both Sides
      type: transition
      prev:
        tween:
          alpha:
            initialValue: 1
            keyframes:
              - duration: 1000
                value: 0
                easing: linear
      next:
        tween:
          alpha:
            initialValue: 0
            keyframes:
              - duration: 1000
                value: 1
                easing: linear
story:
  initialSceneId: backgroundScene
  scenes:
    backgroundScene:
      name: Background Scene
      initialSectionId: main
      sections:
        main:
          lines:
            - id: line1
              actions:
                setNextLineConfig:
                  manual:
                    enabled: true
                  auto:
                    enabled: true
                    trigger: fromStart
                    delay: 100
                  applyMode: singleLine
            - id: line2
              actions:
                background:
                  resourceId: bg-door
                  animations:
                    resourceId: bg-fade-enter-both
