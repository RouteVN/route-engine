---
title: Background Transition Tween In
description: Background image entering after manual line advance with a transition tween.
specs:
  - background in should accept transition-type animation resources
  - the background should be partially onscreen halfway through the transition
  - the background should settle into its final position after the transition completes
steps:
  - action: customEvent
    name: vt:nextLine
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 500
  - action: screenshot
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 500
  - action: screenshot
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  controls:
    base1:
      elements:
        - id: click-area
          type: rect
          width: 1920
          height: 1080
          alpha: 0.001
          click:
            payload:
              actions:
                nextLine: {}
          colorId: overlayColor
  images:
    bg-door:
      fileId: lakjf3lka
      width: 1920
      height: 1080
  animations:
    bg-slide-in:
      name: Background Slide In
      type: transition
      next:
        tween:
          translateX:
            initialValue: 1
            keyframes:
              - duration: 1000
                value: 0
                easing: linear
  colors:
    overlayColor:
      hex: "#000000"
story:
  initialSceneId: backgroundScene
  scenes:
    backgroundScene:
      name: Background Scene
      initialSectionId: main
      sections:
        main:
          lines:
            - id: line1
              actions:
                control:
                  resourceId: base1
            - id: line2
              actions:
                background:
                  resourceId: bg-door
                  animations:
                    resourceId: bg-slide-in
