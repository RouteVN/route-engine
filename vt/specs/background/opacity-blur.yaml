---
title: Background Opacity Blur
description: |
  Background opacity and blur should affect the actual rendered background,
  persist through style-only updates, and clear when blur is authored as null.

  - the first screenshot should show the image background faded over white and blurred
  - the second screenshot should keep the same image resource while clearing blur and resetting opacity
  - the third screenshot should show the same opacity and blur behavior on a layout background
skipInitialScreenshot: true
steps:
  - action: screenshot
  - action: customEvent
    name: vt:nextLine
  - action: screenshot
  - action: customEvent
    name: vt:nextLine
  - action: screenshot
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#FFFFFF"
resources:
  images:
    bg-forest:
      fileId: dmni32
      width: 1920
      height: 1080
  layouts:
    bg-layout:
      name: Background Opacity Blur Layout
      elements:
        - id: panel
          type: rect
          x: 280
          y: 180
          width: 1360
          height: 720
          colorId: bgPanel
        - id: stripe
          type: rect
          x: 280
          y: 180
          width: 1360
          height: 120
          colorId: bgStripe
        - id: label
          type: text
          x: 420
          y: 430
          content: Background Layout
          textStyleId: bgLabel
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    bgPanel:
      hex: "#111111"
    bgStripe:
      hex: "#D9D9D9"
    bgLabel:
      hex: "#FFFFFF"
  textStyles:
    bgLabel:
      fontId: fontDefault
      colorId: bgLabel
      fontSize: 96
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: backgroundScene
  scenes:
    backgroundScene:
      name: Background Scene
      initialSectionId: main
      sections:
        main:
          lines:
            - id: imageOpacityBlur
              actions:
                background:
                  resourceId: bg-forest
                  opacity: 0.55
                  blur:
                    x: 6
                    y: 9
                    quality: 3
                    kernelSize: 9
                    repeatEdgePixels: true
            - id: imageOpacityBlurCleared
              actions:
                background:
                  opacity: 1
                  blur: null
            - id: layoutOpacityBlur
              actions:
                background:
                  resourceId: bg-layout
                  opacity: 0.55
                  blur:
                    x: 6
                    y: 9
                    quality: 3
                    kernelSize: 9
                    repeatEdgePixels: true
