---
title: Animation Once Per Line
description: |
  Verifies that background animations only play when the background action
  is defined on the current line, not on subsequent lines.

  - Line 1: Background with fade-in animation (plays)
  - Lines 2-4: Dialogue only (animation does NOT replay)
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  layouts:
    base1:
      elements:
        - id: click-area
          type: rect
          width: 1920
          height: 1080
          click:
            payload:
              actions:
                nextLine: {}
          colorId: layoutColor1
    dialogueGui:
      name: Dialogue Screen
      elements:
        - id: dialogue-container
          type: container
          x: 50
          y: 800
          children:
            - id: dialogue-bg
              type: rect
              width: 1820
              height: 200
              alpha: 0.8
              colorId: layoutColor2
            - id: dialogue-text
              type: text
              x: 30
              y: 30
              content: ${dialogue.content[0].text}
              textStyleId: textStyle1
  images:
    bg-school:
      fileId: dmni32
      width: 1920
      height: 1080
  animations:
    fade-in:
      name: Fade In (1 second)
      type: live
      tween:
        alpha:
          initialValue: 0
          keyframes:
            - duration: 1000
              value: 1
              easing: linear
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: "#FFFFFF"
    layoutColor1:
      hex: "#000000"
    layoutColor2:
      hex: "#4D4D4D"
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 32
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: scene1
  scenes:
    scene1:
      name: Scene 1
      initialSectionId: section1
      sections:
        section1:
          name: Section 1
          lines:
            - id: line1
              actions:
                base:
                  resourceId: base1
                dialogue:
                  ui:
                    resourceId: dialogueGui
                  mode: adv
                  content:
                    - text: "Line 1: Background appears with fade-in animation."
                background:
                  resourceId: bg-school
                  animations:
                    in:
                      resourceId: fade-in
            - id: line2
              actions:
                dialogue:
                  content:
                    - text: "Line 2: Background stays visible, no animation replay."
            - id: line3
              actions:
                dialogue:
                  content:
                    - text: "Line 3: Still no animation - background persists without re-animating."
            - id: line4
              actions:
                dialogue:
                  content:
                    - text: "Line 4: Animation only played once on line 1."
