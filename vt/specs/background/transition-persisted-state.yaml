---
title: Background Transition Persisted State
description: |
  Background animation-only actions should resolve the current background from
  presentation state when the line omits `resourceId`.
specs:
  - background should animate without repeating resourceId when the same background persists in state
  - the background should still be visible on the following line because state persistence is preserved
  - the transition line should not clear the background from presentation state
steps:
  - action: customEvent
    name: vt:nextLine
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 500
  - action: screenshot
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 500
  - action: screenshot
  - action: customEvent
    name: vt:nextLine
  - action: screenshot
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  controls:
    base1:
      elements:
        - id: click-area
          type: rect
          width: 1920
          height: 1080
          alpha: 0.001
          click:
            payload:
              actions:
                nextLine: {}
          colorId: overlayColor
  images:
    bg-door:
      fileId: lakjf3lka
      width: 1920
      height: 1080
  animations:
    bg-persisted-shift:
      name: Background Persisted Shift
      type: transition
      next:
        tween:
          translateX:
            initialValue: 1
            keyframes:
              - duration: 1000
                value: 0
                easing: linear
  colors:
    overlayColor:
      hex: "#000000"
story:
  initialSceneId: backgroundScene
  scenes:
    backgroundScene:
      name: Background Scene
      initialSectionId: main
      sections:
        main:
          lines:
            - id: line1
              actions:
                control:
                  resourceId: base1
                background:
                  resourceId: bg-door
            - id: line2
              actions:
                background:
                  animations:
                    resourceId: bg-persisted-shift
            - id: line3
              actions: {}
