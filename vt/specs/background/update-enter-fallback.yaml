---
title: Background Update Enter Fallback
description: |
  Background enter should animate the incoming image even when the referenced
  animation resource is typed as `update`.
specs:
  - background enter should animate the incoming image for update-type animation resources
  - the background should be partially visible halfway through the update tween
  - the background should be fully visible after the update tween completes
steps:
  - action: customEvent
    name: vt:nextLine
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 500
  - action: screenshot
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 500
  - action: screenshot
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  controls:
    base1:
      elements:
        - id: click-area
          type: rect
          width: 1920
          height: 1080
          alpha: 0.001
          click:
            payload:
              actions:
                nextLine: {}
          colorId: overlayColor
  images:
    bg-forest:
      fileId: dmni32
      width: 1920
      height: 1080
  animations:
    bg-update-fade-in:
      name: Background Update Fade In
      type: update
      tween:
        alpha:
          initialValue: 0
          keyframes:
            - duration: 1000
              value: 1
              easing: linear
        x:
          initialValue: 1920
          keyframes:
            - duration: 1000
              value: 0
              easing: linear
  colors:
    overlayColor:
      hex: "#000000"
story:
  initialSceneId: backgroundScene
  scenes:
    backgroundScene:
      name: Background Scene
      initialSectionId: main
      sections:
        main:
          lines:
            - id: line1
              actions:
                control:
                  resourceId: base1
            - id: line2
              actions:
                background:
                  resourceId: bg-forest
                  animations:
                    resourceId: bg-update-fade-in
