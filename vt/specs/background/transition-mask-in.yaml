---
title: Background Transition Mask In
description: Background image entering on first add with a mask-driven transition.
specs:
  - background in should accept transition-type animation resources
  - the mask should partially reveal the background halfway through the transition
  - the background should be fully visible after the transition completes
steps:
  - action: wait
    ms: 500
  - action: screenshot
  - action: wait
    ms: 600
  - action: screenshot
