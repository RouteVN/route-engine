---
title: Background Transition Mask In
description: Background image entering after manual line advance with a mask-driven transition.
specs:
  - background in should accept transition-type animation resources
  - the mask should partially reveal the background halfway through the transition
  - the background should be fully visible after the transition completes
steps:
  - action: customEvent
    name: vt:nextLine
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 500
  - action: screenshot
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 500
  - action: screenshot
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  controls:
    base1:
      elements:
        - id: click-area
          type: rect
          width: 1920
          height: 1080
          alpha: 0.001
          click:
            payload:
              actions:
                nextLine: {}
          colorId: overlayColor
  images:
    bg-moon:
      fileId: 23jkfa893
      width: 1920
      height: 1080
  animations:
    bg-mask-in:
      name: Background Mask In
      type: transition
      mask:
        kind: single
        texture: mask-diagonal
        channel: red
        softness: 0.06
        progress:
          initialValue: 0
          keyframes:
            - duration: 1000
              value: 1
              easing: linear
  colors:
    overlayColor:
      hex: "#000000"
story:
  initialSceneId: backgroundScene
  scenes:
    backgroundScene:
      name: Background Scene
      initialSectionId: main
      sections:
        main:
          lines:
            - id: line1
              actions:
                control:
                  resourceId: base1
            - id: line2
              actions:
                background:
                  resourceId: bg-moon
                  animations:
                    resourceId: bg-mask-in
