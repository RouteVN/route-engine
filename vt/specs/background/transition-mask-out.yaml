---
title: Background Transition Mask Out
description: Background image exiting to transparency with a mask-driven transition.
specs:
  - background out should accept transition-type animation resources
  - the mask should partially remove the background halfway through the transition
  - the background should be fully cleared after the transition completes
steps:
  - action: wait
    ms: 100
  - action: click
    x: 960
    "y": 540
  - action: wait
    ms: 500
  - action: screenshot
  - action: wait
    ms: 600
  - action: screenshot
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  images:
    bg-door:
      fileId: lakjf3lka
      width: 1920
      height: 1080
  layouts:
    bg-door-layout:
      name: Clickable Door Background
      elements:
        - id: bg-door-sprite
          type: sprite
          imageId: bg-door
          x: 0
          y: 0
          width: 1920
          height: 1080
        - id: click-area
          type: rect
          x: 0
          y: 0
          width: 1920
          height: 1080
          alpha: 0
          click:
            payload:
              actions:
                nextLine: {}
          colorId: overlayColor
  animations:
    bg-mask-out:
      name: Background Mask Out
      type: transition
      mask:
        kind: single
        texture: mask-diagonal
        channel: red
        softness: 0.06
        progress:
          initialValue: 0
          keyframes:
            - duration: 1000
              value: 1
              easing: linear
  colors:
    overlayColor:
      hex: "#000000"
story:
  initialSceneId: backgroundScene
  scenes:
    backgroundScene:
      name: Background Scene
      initialSectionId: main
      sections:
        main:
          lines:
            - id: line1
              actions:
                background:
                  resourceId: bg-door-layout
            - id: line2
              actions:
                background:
                  animations:
                    resourceId: bg-mask-out