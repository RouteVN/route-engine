---
title: Background Transition Tween Out
description: Background image animating with a transition tween while the same background persists in state.
specs:
  - background should accept transition-type animation resources without repeating resourceId
  - the background should be partially moved offscreen halfway through the transition
  - the background should remain resolved from state after the transition completes
steps:
  - action: customEvent
    name: vt:nextLine
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 500
  - action: screenshot
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 500
  - action: screenshot
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  controls:
    base1:
      elements:
        - id: click-area
          type: rect
          width: 1920
          height: 1080
          alpha: 0.001
          click:
            payload:
              actions:
                nextLine: {}
          colorId: overlayColor
  images:
    bg-forest:
      fileId: dmni32
      width: 1920
      height: 1080
  animations:
    bg-slide-out:
      name: Background Slide Out
      type: transition
      prev:
        tween:
          translateX:
            initialValue: 0
            keyframes:
              - duration: 1000
                value: -1
                easing: linear
  colors:
    overlayColor:
      hex: "#000000"
story:
  initialSceneId: backgroundScene
  scenes:
    backgroundScene:
      name: Background Scene
      initialSectionId: main
      sections:
        main:
          lines:
            - id: line1
              actions:
                control:
                  resourceId: base1
                background:
                  resourceId: bg-forest
            - id: line2
              actions:
                background:
                  animations:
                    resourceId: bg-slide-out
