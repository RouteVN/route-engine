---
title: AutoMode Completion Gates (Video + Animation)
description: |
  Tests nextLineConfig auto in two phases:
  - fromStart: timer starts when line starts
  - fromComplete: timer starts after line completion
  Each phase covers video background and tween animation.
  Intended for manual/video-capable runs.
skipScreenshot: true
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  images:
    bg-moon:
      fileId: 23jkfa893
      width: 1920
      height: 1080
  videos:
    bg-video:
      fileId: video_sample
      width: 1920
      height: 1080
  tweens:
    fade-in-800:
      properties:
        alpha:
          initialValue: 0
          keyframes:
            - duration: 800
              value: 1
              easing: linear
  layouts:
    baseLayout:
      elements:
        - id: click-area
          type: rect
          width: 1920
          height: 1080
          click:
            actionPayload:
              actions:
                nextLine: {}
          colorId: layoutColor1
    dialogueLayout:
      mode: adv
      elements:
        - id: dialogue-box
          type: rect
          x: 100
          y: 780
          width: 1720
          height: 220
          colorId: layoutColor2
        - id: dialogue-text
          type: text-revealing
          x: 140
          y: 845
          width: 1640
          displaySpeed: 24
          content: ${dialogue.content}
          textStyleId: textStyle1
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: "#FFFFFF"
    layoutColor1:
      hex: "#000000"
    layoutColor2:
      hex: "#4D4D4D"
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 32
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: testScene
  scenes:
    testScene:
      initialSectionId: main
      sections:
        main:
          lines:
            - id: line0
              actions:
                base:
                  resourceId: baseLayout
                dialogue:
                  mode: adv
                  ui:
                    resourceId: dialogueLayout
                  content:
                    - text: "Line 0: click once to allow video playback in browser."
            - id: line1
              actions:
                setNextLineConfig:
                  manual:
                    enabled: true
                  auto:
                    enabled: true
                    trigger: fromStart
                    delay: 300
                  applyMode: persistent
                dialogue:
                  mode: adv
                  ui:
                    resourceId: dialogueLayout
                  content:
                    - text: "Line 1: auto enabled (fromStart)."
            - id: line2
              actions:
                background:
                  resourceId: bg-video
                  resourceType: video
                dialogue:
                  content:
                    - text: "Line 2: fromStart on video background."
            - id: line3
              actions:
                background:
                  resourceId: bg-moon
                  animations:
                    in:
                      resourceId: fade-in-800
                dialogue:
                  content:
                    - text: "Line 3: fromStart on animation."
            - id: line4
              actions:
                setNextLineConfig:
                  manual:
                    enabled: true
                  auto:
                    enabled: true
                    trigger: fromComplete
                    delay: 300
                  applyMode: persistent
                dialogue:
                  content:
                    - text: "Line 4: switch to fromComplete."
            - id: line5
              actions:
                background:
                  resourceId: bg-video
                  resourceType: video
                dialogue:
                  content:
                    - text: "Line 5: fromComplete on video background."
            - id: line6
              actions:
                background:
                  resourceId: bg-moon
                  animations:
                    in:
                      resourceId: fade-in-800
                dialogue:
                  content:
                    - text: "Line 6: fromComplete on animation."
            - id: line7
              actions:
                setNextLineConfig:
                  manual:
                    enabled: true
                  auto:
                    enabled: false
                dialogue:
                  content:
                    - text: "Line 7: done."
