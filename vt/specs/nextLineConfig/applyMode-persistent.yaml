---
title: nextLineConfig applyMode persistent
description: persistent should keep auto-advancing until changed or section end
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  sounds:
    bgmMain:
      fileId: bgm-3.mp3
  layouts:
    baseLayout:
      elements:
        - id: bg
          type: rect
          x: 0
          y: 0
          width: 1920
          height: 1080
          click:
            actionPayload:
              actions:
                nextLine: {}
          colorId: layoutColor1
    dialogueLayout:
      mode: adv
      elements:
        - id: dialogue-box
          type: rect
          x: 100
          y: 760
          width: 1720
          height: 260
          colorId: layoutColor2
        - id: dialogue-text
          type: text
          x: 140
          y: 835
          content: ${dialogue.content[0].text}
          textStyleId: textStyle1
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: white
    layoutColor1:
      hex: "#111111"
    layoutColor2:
      hex: "#404040"
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 34
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: bgm_scene
  scenes:
    bgm_scene:
      initialSectionId: test_section
      sections:
        test_section:
          lines:
            - id: line1
              actions:
                base:
                  resourceId: baseLayout
                bgm:
                  resourceId: bgmMain
                setNextLineConfig:
                  manual:
                    enabled: true
                  auto:
                    enabled: true
                    trigger: fromStart
                    delay: 900
                  applyMode: persistent
                dialogue:
                  mode: adv
                  ui:
                    resourceId: dialogueLayout
                  content:
                    - text: Line 1: nextLineConfig auto is enabled with applyMode=persistent.
            - id: line2
              actions:
                dialogue:
                  content:
                    - text: Line 2: Should auto-advance.
            - id: line3
              actions:
                dialogue:
                  content:
                    - text: Line 3: Should auto-advance.
            - id: line4
              actions:
                dialogue:
                  content:
                    - text: Line 4: Should auto-advance.
            - id: line5
              actions:
                dialogue:
                  content:
                    - text: Line 5: End.
