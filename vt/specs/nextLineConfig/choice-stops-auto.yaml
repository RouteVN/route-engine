---
title: nextLineConfig with Choice
description: Scene auto (fromStart) should pause when a choice is visible
specs:
  - scene auto advances from line 1 to line 3 without manual input
  - once the choice is visible on line 3, waiting longer than the configured delay does not advance to line 4
  - the first choice button still advances to line 4 when clicked
skipInitialScreenshot: true
viewport:
  id: capture
  width: 1920
  height: 1080
steps:
  - action: wait
    ms: 2300
  - action: screenshot
  - action: wait
    ms: 1300
  - action: screenshot
  - action: click
    x: 960
    y: 400
  - action: wait
    ms: 150
  - action: screenshot
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  sounds:
    bgmMain:
      fileId: bgm-1.mp3
  layouts:
    baseLayout:
      elements:
        - id: bg
          type: rect
          x: 0
          y: 0
          width: 1920
          height: 1080
          click:
            payload:
              actions:
                nextLine: {}
          colorId: layoutColor1
    dialogueLayout:
      mode: adv
      elements:
        - id: dialogue-box
          type: rect
          x: 100
          y: 760
          width: 1720
          height: 260
          colorId: layoutColor2
        - id: dialogue-text
          type: text
          x: 140
          y: 835
          content: ${dialogue.content[0].text}
          textStyleId: textStyle1
    choiceLayout:
      elements:
        - id: choice-container
          type: container
          x: 260
          y: 220
          direction: vertical
          gapX: 24
          gapY: 24
          children:
            - $each: item, i in choice.items
              id: choice-item-${i}
              type: container
              children:
                - id: choice-btn-${i}
                  type: rect
                  x: 0
                  y: 0
                  width: 1400
                  height: 80
                  click:
                    payload:
                      actions:
                        nextLine: {}
                  colorId: layoutColor3
                - id: choice-text-${i}
                  type: text
                  x: 36
                  y: 24
                  content: ${item.content}
                  textStyleId: textStyle2
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: "#FFFFFF"
    layoutColor1:
      hex: "#101010"
    layoutColor2:
      hex: "#3E3E3E"
    layoutColor3:
      hex: "#5C5C5C"
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 34
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle2:
      fontId: fontDefault
      colorId: color1
      fontSize: 30
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: bgm_scene
  scenes:
    bgm_scene:
      initialSectionId: test_section
      sections:
        test_section:
          lines:
            - id: line1
              actions:
                background:
                  resourceId: baseLayout
                bgm:
                  resourceId: bgmMain
                setNextLineConfig:
                  manual:
                    enabled: true
                  auto:
                    enabled: true
                    trigger: fromStart
                    delay: 1000
                  applyMode: persistent
                dialogue:
                  mode: adv
                  ui:
                    resourceId: dialogueLayout
                  content:
                    - text: "Line 1: Scene auto is enabled (persistent)."
            - id: line2
              actions:
                dialogue:
                  content:
                    - text: "Line 2: Auto advanced here. Next line shows a choice."
            - id: line3
              actions:
                dialogue:
                  content:
                    - text: "Line 3: Choice is visible. Auto should NOT continue now."
                choice:
                  resourceId: choiceLayout
                  items:
                    - id: c1
                      content: "Choice A: continue"
                    - id: c2
                      content: "Choice B: continue"
            - id: line4
              actions:
                choice: {}
                dialogue:
                  content:
                    - text: "Line 4: Reached after selecting a choice item."
            - id: line5
              actions:
                setNextLineConfig:
                  manual:
                    enabled: true
                  auto:
                    enabled: false
                dialogue:
                  content:
                    - text: "Line 5: End."
