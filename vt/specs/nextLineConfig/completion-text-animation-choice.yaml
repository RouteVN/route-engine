---
title: AutoMode Completion Gates (Text + Animation + Choice)
description: |
  Tests auto mode with fromComplete trigger:
  - waits for text-revealing to finish
  - waits for background tween animation to finish
  - then stops on a choice line
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  images:
    bg-forest:
      fileId: dmni32
      width: 1920
      height: 1080
  tweens:
    fade-in-1s:
      properties:
        alpha:
          initialValue: 0
          keyframes:
            - duration: 1000
              value: 1
              easing: linear
  layouts:
    baseLayout:
      elements:
        - id: click-area
          type: rect
          width: 1920
          height: 1080
          click:
            actionPayload:
              actions:
                nextLine: {}
          colorId: layoutColor1
    dialogueLayout:
      mode: adv
      elements:
        - id: dialogue-box
          type: rect
          x: 100
          y: 780
          width: 1720
          height: 220
          colorId: layoutColor2
        - id: dialogue-text
          type: text-revealing
          x: 140
          y: 845
          width: 1640
          displaySpeed: 30
          content: ${dialogue.content}
          textStyleId: textStyle1
    choiceLayout:
      elements:
        - id: choice-container
          type: container
          x: 240
          y: 220
          direction: vertical
          gap: 20
          children:
            - $each: item, i in choice.items
              id: choice-item-${i}
              type: container
              children:
                - id: choice-item-bg-${i}
                  type: rect
                  width: 1440
                  height: 76
                  click:
                    actionPayload:
                      actions:
                        nextLine: {}
                  colorId: layoutColor2
                - id: choice-item-text-${i}
                  type: text
                  x: 28
                  y: 22
                  content: ${item.content}
                  textStyleId: textStyle2
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: "#FFFFFF"
    layoutColor1:
      hex: "#000000"
    layoutColor2:
      hex: "#4D4D4D"
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 32
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle2:
      fontId: fontDefault
      colorId: color1
      fontSize: 28
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: testScene
  scenes:
    testScene:
      initialSectionId: main
      sections:
        main:
          lines:
            - id: line1
              actions:
                base:
                  resourceId: baseLayout
                startAutoMode: {}
                setNextLineConfig:
                  manual:
                    enabled: true
                  auto:
                    enabled: true
                    trigger: fromComplete
                    delay: 350
                  applyMode: persistent
                dialogue:
                  mode: adv
                  ui:
                    resourceId: dialogueLayout
                  content:
                    - text: "Line 1: text-revealing must complete before auto-next."
            - id: line2
              actions:
                background:
                  resourceId: bg-forest
                  animations:
                    in:
                      resourceId: fade-in-1s
                dialogue:
                  content:
                    - text: "Line 2: background fade-in animation must complete before auto-next."
            - id: line3
              actions:
                dialogue:
                  content:
                    - text: "Line 3: auto should continue here."
            - id: line4
              actions:
                dialogue:
                  content:
                    - text: "Line 4: choice is visible. auto must stop on this line."
                choice:
                  resourceId: choiceLayout
                  items:
                    - id: continue-a
                      content: Continue A
                    - id: continue-b
                      content: Continue B
            - id: line5
              actions:
                choice: {}
                stopAutoMode: {}
                setNextLineConfig:
                  manual:
                    enabled: true
                  auto:
                    enabled: false
                dialogue:
                  content:
                    - text: "Line 5: reached after selecting a choice."
