---
title: History
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  images:
    3kda832:
      fileId: 3kda832
      width: 1920
      height: 1080
  layouts:
    base1:
      elements:
        - id: af32
          type: rect
          width: 1920
          height: 1080
          click:
            actionPayload:
              actions:
                nextLine: {}
          colorId: layoutColor1
    storyScreenLayout:
      name: Story Screen Background
      elements:
        - id: story-screen-bg
          type: rect
          x: 0
          y: 0
          width: 1920
          height: 1080
          clickEventName: system
          clickEventPayload:
            actions:
              nextLine: {}
          colorId: layoutColor1
    fi3l:
      name: Dialogue Screen
      mode: adv
      elements:
        - id: dialogue-container
          type: container
          x: 50
          y: 300
          children:
            - id: bfeawjk2g
              type: sprite
              width: 1400
              height: 300
              imageId: 3kda832
              x: 0
              y: 0
            - id: dialogue-character-name
              type: text
              content: ${dialogue.character.name}
              x: 20
              y: 40
              textStyleId: textStyle1
            - id: dialogue-text
              type: text
              x: 20
              y: 100
              content: ${dialogue.content[0].text}
              textStyleId: textStyle1
        - id: history-button-text
          type: text
          x: 1220
          y: 35
          content: History
          hover:
            textStyleId: textStyle3
          click:
            actionPayload:
              actions:
                pushLayeredView:
                  resourceId: historyLayout
                  resourceType: layout
          textStyleId: textStyle2
    historyLayout:
      name: Dialogue History
      elements:
        - id: history-bg
          type: rect
          width: 1920
          height: 1080
          x: 0
          y: 0
          opacity: 0.8
          click:
            actionPayload:
              actions:
                popLayeredView: {}
          colorId: layoutColor2
        - id: history-panel
          type: rect
          width: 1000
          height: 700
          x: 460
          y: 190
          click:
            actionPayload:
              actions: {}
          colorId: layoutColor1
        - id: history-title
          type: text
          content: Dialogue History
          x: 810
          y: 230
          textStyleId: textStyle4
        - id: history-scroll-container
          type: container
          direction: vertical
          x: 490
          y: 290
          width: 940
          height: 450
          scroll: true
          gap: 15
          children:
            - $for item, i in historyDialogue:
                id: history-item-${i}
                type: container
                direction: vertical
                width: 920
                gap: 5
                children:
                  - id: history-character-${i}
                    type: text
                    content: ${item.characterName}
                    textStyleId: textStyle5
                  - id: history-text-${i}
                    type: text
                    content: ${item.content[0].text}
                    textStyleId: textStyle6
        - id: close-button-bg
          type: rect
          width: 120
          height: 50
          x: 900
          y: 800
          click:
            actionPayload:
              actions:
                popLayeredView: {}
          colorId: layoutColor3
        - id: close-button-text
          type: text
          content: Close
          x: 935
          y: 815
          textStyleId: textStyle7
  characters:
    ajf34a:
      name: Character A
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: "#FFFFFF"
    color2:
      hex: "#FFFF00"
    color3:
      hex: "#FFFFFF"
    color4:
      hex: "#D9D9D9"
    layoutColor1:
      hex: "#000000"
    layoutColor2:
      hex: "#000000"
    layoutColor3:
      hex: "#737373"
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 24
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle2:
      fontId: fontDefault
      colorId: color1
      fontSize: 20
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle3:
      fontId: fontDefault
      colorId: color2
      fontSize: 32
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle4:
      fontId: fontDefault
      colorId: color3
      fontSize: 36
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle5:
      fontId: fontDefault
      colorId: color4
      fontSize: 20
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle6:
      fontId: fontDefault
      colorId: color3
      fontSize: 18
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
      wordWrap: true
      wordWrapWidth: 900
    textStyle7:
      fontId: fontDefault
      colorId: color3
      fontSize: 24
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: ajfl3a
  scenes:
    ajfl3a:
      name: Scene 1
      initialSectionId: l3kjfawelf
      sections:
        l3kjfawelf:
