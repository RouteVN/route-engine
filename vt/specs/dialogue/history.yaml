                dialogue:
                  content:
                    - text: Line 7 - Even more content here.
                  characterId: ajf34a
            - id: line8
              actions:
                dialogue:
                  content:
                    - text: Line 8 - Keep scrolling down!
                  characterId: ajf34a
            - id: line9
              actions:
                dialogue:
                  content:
                    - text: Line 9 - Almost there...
                  characterId: ajf34a
            - id: line10
              actions:
                dialogue:
                  content:
                    - text: Line 10 - This should definitely require scrolling now.
                  characterId: ajf34a
            - id: line11
              actions:
                dialogue:
                  content:
                    - text: Line 11 - More and more dialogue.
                  characterId: ajf34a
            - id: line12
              actions:
                dialogue:
                  content:
                    - text: Line 12 - Testing the scroll functionality.
                  characterId: ajf34a
            - id: line13
              actions:
                dialogue:
                  content:
                    - text: Line 13 - Nearly at the end now.
                  characterId: ajf34a
            - id: line14
              actions:
