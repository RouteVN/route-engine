                dialogue:
                  content:
                    - text: This is the final line. Try the History button!
                  characterId: ajf34a
            - id: line6
              actions:
                dialogue:
                  content:
                    - text: Line 6 - More dialogue to test scrolling.
                  characterId: ajf34a
            - id: line7
