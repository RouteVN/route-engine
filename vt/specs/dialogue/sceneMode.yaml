---
title: Scene Mode
description: Test unskippable, auto-advancing scene mode using setNextLineConfig
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  characters:
    narrator:
      name: ""
  layouts:
    baseLayout:
      elements:
        - id: background
          type: rect
          x: 0
          y: 0
          width: 1920
          height: 1080
          click:
            payload:
              actions:
                nextLine: {}
          colorId: layoutColor1
    dialogueLayout:
      name: Dialogue Screen
      mode: adv
      elements:
        - id: dialogue-box
          type: rect
          x: 100
          y: 800
          width: 1720
          height: 200
          colorId: layoutColor2
        - id: dialogue-text
          type: text
          x: 150
          y: 850
          content: ${dialogue.content[0].text}
          textStyleId: textStyle1
        - id: start-scene-button
          type: text
          x: 1700
          y: 50
          content: Start Scene
          hover:
            textStyleId: textStyle2
          click:
            payload:
              actions:
                setNextLineConfig:
                  manual:
                    enabled: false
                  auto:
                    enabled: true
                    trigger: fromStart
                    delay: 1500
          textStyleId: textStyle1
        - id: stop-scene-button
          type: text
          x: 1500
          y: 50
          content: Stop Scene
          hover:
            textStyleId: textStyle2
          click:
            payload:
              actions:
                setNextLineConfig:
                  manual:
                    enabled: true
                  auto:
                    enabled: false
          textStyleId: textStyle1
        - id: skip-button
          type: text
          x: 1350
          y: 50
          content: Skip
          hover:
            textStyleId: textStyle2
          click:
            payload:
              actions:
                toggleSkipMode: {}
          textStyleId:
            $if skipMode: textStyle3
            $else: textStyle1
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: "#FFFFFF"
    color2:
      hex: "#FFFF00"
    color3:
      hex: "#D9D9D9"
    layoutColor1:
      hex: "#000000"
    layoutColor2:
      hex: "#4D4D4D"
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 32
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle2:
      fontId: fontDefault
      colorId: color2
      fontSize: 32
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle3:
      fontId: fontDefault
      colorId: color3
      fontSize: 32
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: test_scene
  scenes:
    test_scene:
      initialSectionId: test_section
      sections:
        test_section:
          lines:
            - id: line1
              actions:
                base:
                  resourceId: baseLayout
                dialogue:
                  mode: adv
                  ui:
                    resourceId: dialogueLayout
                  content:
                    - text: "Line 1: Click 'Start Scene' to begin unskippable sequence."
                  characterId: narrator
            - id: line2
              actions:
                dialogue:
                  content:
                    - text: "Line 2: This line advanced automatically."
                  characterId: narrator
            - id: line3
              actions:
                dialogue:
                  content:
                    - text: "Line 3: Clicks and Skip are disabled during this sequence."
                  characterId: narrator
            - id: line4
              actions:
                dialogue:
                  content:
                    - text: "Line 4: This will continue until the end..."
                  characterId: narrator
            - id: line5
              actions:
                setNextLineConfig:
                  manual:
                    enabled: true
                  auto:
                    enabled: false
                dialogue:
                  content:
                    - text: "Line 5: Sequence finished. Manual control is now restored."
                  characterId: narrator
