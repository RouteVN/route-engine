---
title: Dialogue Skip Revealing
description: 80-line skip sandbox using text-revealing dialogue. It isolates skip-time reveal behavior, and the stable browser path now lands on line 2 already fully revealed by the 20ms screenshot checkpoint.
skipInitialScreenshot: true
viewport:
  id: capture
  width: 960
  height: 540
steps:
  - action: click
    x: 805
    y: 55
  - action: wait
    ms: 20
  - action: screenshot
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  characters:
    narrator:
      name: Narrator
  layouts:
    stageLayout:
      elements:
        - id: stage
          type: rect
          width: 1920
          height: 1080
          colorId: bg
    revealDialogue:
      mode: adv
      elements:
        - id: dialogue-box
          type: rect
          x: 100
          y: 760
          width: 1720
          height: 240
          colorId: panel
        - id: dialogue-text
          type: text-revealing
          x: 140
          y: 830
          width: 1540
          displaySpeed: 18
          revealEffect: typewriter
          content: ${dialogue.content}
          textStyleId: textMain
        - id: skip-button
          type: rect
          x: 1500
          y: 70
          width: 220
          height: 70
          colorId: button
          click:
            payload:
              actions:
                toggleSkipMode: {}
        - id: skip-label
          type: text
          x: 1562
          y: 92
          content: "[SKIP]"
          textStyleId: textButton
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    bg:
      hex: "#000000"
    panel:
      hex: "#4D4D4D"
    button:
      hex: "#737373"
    fg:
      hex: "#FFFFFF"
  textStyles:
    textMain:
      fontId: fontDefault
      colorId: fg
      fontSize: 30
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textButton:
      fontId: fontDefault
      colorId: fg
      fontSize: 28
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: main
  scenes:
    main:
      initialSectionId: section1
      sections:
        section1:
          lines:
            - id: line1
              actions:
                setSkipUnseenText:
