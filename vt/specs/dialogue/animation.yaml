---
title: Dialogue Animation
description: Test dialogue UI animation in and out
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  layouts:
    base1:
      elements:
        - id: af32
          type: rect
          width: 1920
          height: 1080
          click:
            payload:
              actions:
                nextLine: {}
          colorId: layoutColor1
    dialogueLayout:
      name: Dialogue Screen
      mode: adv
      elements:
        - id: dialogue-container
          type: container
          x: 50
          y: 700
          children:
            - id: dialogue-bg
              type: rect
              width: 1820
              height: 300
              opacity: 0.7
              x: 0
              y: 0
              colorId: layoutColor2
            - id: dialogue-character-name
              type: text
              content: ${dialogue.character.name}
              x: 20
              y: 40
              textStyleId: textStyle1
            - id: dialogue-text
              type: text
              x: 20
              y: 100
              content: ${dialogue.content[0].text}
              textStyleId: textStyle1
  characters:
    char1:
      name: Alice
  animations:
    fadeIn:
      name: Fade In
      type: update
      tween:
        alpha:
          initialValue: 0
          keyframes:
            - duration: 500
              value: 1
              easing: easeOutQuad
    fadeOut:
      name: Fade Out
      type: update
      tween:
        alpha:
          keyframes:
            - duration: 500
              value: 0
              easing: easeInQuad
    slideUp:
      name: Slide Up
      type: update
      tween:
        y:
          initialValue: 800
          keyframes:
            - duration: 400
              value: 700
              easing: easeOutQuad
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: "#FFFFFF"
    layoutColor1:
      hex: "#000000"
    layoutColor2:
      hex: "#000000"
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 24
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: scene1
  scenes:
    scene1:
      name: Scene 1
      initialSectionId: section1
      sections:
        section1:
          name: Section 1
          lines:
            - id: line1
              actions:
                background:
                  resourceId: base1
                dialogue:
                  ui:
                    resourceId: dialogueLayout
                    animations:
                      in:
                        resourceId: fadeIn
                  mode: adv
                  content:
                    - text: Hello! The dialogue box just faded in.
                  characterId: char1
            - id: line2
              actions:
                dialogue:
                  content:
                    - text: This is the second line. No animation here.
            - id: line3
              actions:
                dialogue:
                  content:
                    - text: This is the third line. About to fade out...
                  characterId: char1
            - id: line4
              actions:
                dialogue:
                  ui:
                    animations:
                      out:
                        resourceId: fadeOut
                  clear: true
