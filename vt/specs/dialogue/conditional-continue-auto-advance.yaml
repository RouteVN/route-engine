---
title: Conditional Unmatched Auto Continue
description: A conditional with no matching or default branch immediately enters and renders the next line.
specs:
  - the only conditioned branch evaluates to false
  - no default branch is authored
  - the engine enters the next line without another click
  - only the destination presentation is rendered
skipInitialScreenshot: true
viewport:
  id: capture
  width: 960
  height: 540
steps:
  - action: wait
    ms: 1000
  - action: screenshot
---
screen:
  width: 1920
  height: 1080
resources:
  variables:
    score:
      type: number
      scope: context
      default: 0
  layouts:
    backgroundLayout:
      elements:
        - id: background
          type: rect
          width: 1920
          height: 1080
          colorId: bg
    destinationDialogueLayout:
      mode: adv
      elements:
        - id: destination-dialogue-box
          type: rect
          x: 120
          y: 760
          width: 1680
          height: 220
          colorId: panel
        - id: destination-dialogue-text
          type: text
          x: 160
          y: 830
          width: 1600
          content: ${dialogue.content[0].text}
          textStyleId: dialogueText
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    bg:
      hex: "#000000"
    panel:
      hex: "#4D4D4D"
    fg:
      hex: "#FFFFFF"
  textStyles:
    dialogueText:
      fontId: fontDefault
      colorId: fg
      fontSize: 40
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: main
  scenes:
    main:
      initialSectionId: test
      sections:
        test:
          lines:
            - id: conditional-unmatched
              actions:
                background:
                  resourceId: backgroundLayout
                conditional:
                  branches:
                    - when:
                        eq:
                          - var: variables.score
                          - 1
                      actions:
                        updateVariable:
                          id: unreachableBranch
                          operations:
                            - variableId: score
                              op: set
                              value: 99
            - id: next-line
              actions:
                dialogue:
                  mode: adv
                  ui:
                    resourceId: destinationDialogueLayout
                  content:
                    - text: Next line reached automatically.
