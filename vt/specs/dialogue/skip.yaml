---
title: Autoplay
---
l10n:
  packages:
    eklekfjwalefj:
      label: English
      lang: en
      keys:
        line1: "Line 1: Testing skip functionality"
        line2: "Line 2: Click Skip to skip through lines"
        line3: "Line 3: Toggle Skip All to control skip behavior"
        line4: "Line 4: Skip All ON (green) = skip everything"
        line5: "Line 5: Skip All OFF (white) = skip only viewed lines"
        restartButton: Restart
        skipButton: Skip
        skipAllButton: Skip All
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  characters:
    narrator:
      name: ""
  layouts:
    baseLayout:
      elements:
        - id: background
          type: rect
          x: 0
          y: 0
          width: 1920
          height: 1080
          click:
            actionPayload:
              actions:
                nextLine: {}
          colorId: layoutColor1
    dialogueLayout:
      name: Dialogue Screen
      mode: adv
      elements:
        - id: dialogue-box
          type: rect
          x: 100
          y: 800
          width: 1720
          height: 200
          colorId: layoutColor2
        - id: dialogue-text
          type: text
          x: 150
          y: 850
          content: ${dialogue.content[0].text}
          textStyleId: textStyle1
        - id: restart-button
          type: text
          x: 1700
          y: 50
          content: ${l10n.keys.restartButton}
          hover:
            textStyleId: textStyle2
          click:
            actionPayload:
              actions:
                jumpToLine:
                  lineId: line1
          textStyleId: textStyle1
        - id: skip-button
          type: text
          x: 1550
          y: 50
          content: ${l10n.keys.skipButton}
          hover:
            textStyleId: textStyle2
          click:
            actionPayload:
              actions:
                toggleSkipMode: {}
          textStyleId:
            $if skipMode: textStyle3
            $else: textStyle1
        - id: skip-all-button
          type: text
          x: 1350
          y: 50
          content: ${l10n.keys.skipAllButton}
          hover:
            textStyleId: textStyle2
          click:
            actionPayload:
              actions:
                toggleSkipOnlyViewedLines: {}
          textStyleId:
            $if skipOnlyViewedLines: textStyle1
            $else: textStyle3
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: white
    color2:
      hex: yellow
    color3:
      hex: "#D9D9D9"
    layoutColor1:
      hex: "#000000"
    layoutColor2:
      hex: "#4D4D4D"
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 32
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle2:
      fontId: fontDefault
      colorId: color2
      fontSize: 32
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle3:
      fontId: fontDefault
      colorId: color3
      fontSize: 32
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: test_scene
  scenes:
    test_scene:
      initialSectionId: test_section
      sections:
        test_section:
          lines:
            - id: line1
              actions:
                base:
                  resourceId: baseLayout
                dialogue:
                  mode: adv
                  gui:
                    resourceId: dialogueLayout
                  content:
                    - text: ${l10n.keys.line1}
                  characterId: narrator
            - id: line2
              actions:
                dialogue:
                  content:
                    - text: ${l10n.keys.line2}
                  characterId: narrator
            - id: line3
              actions:
                dialogue:
                  content:
                    - text: ${l10n.keys.line3}
                  characterId: narrator
            - id: line4
              actions:
                dialogue:
                  content:
                    - text: ${l10n.keys.line4}
                  characterId: narrator
            - id: line5
              actions:
                dialogue:
                  content:
                    - text: ${l10n.keys.line5}
                  characterId: narrator
