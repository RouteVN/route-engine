---
title: NVL Mode
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  layouts:
    base1:
      elements:
        - id: base-bg
          type: rect
          width: 1920
          height: 1080
          click:
            actionPayload:
              actions:
                nextLine: {}
          colorId: layoutColor1
    adv-layout:
      elements:
        - id: dialogue-bg
          type: rect
          x: 0
          y: 820
          width: 1920
          height: 260
          colorId: layoutColor2
        - id: character-name
          type: text
          x: 100
          y: 850
          content: ${dialogue.character.name}
          textStyleId: textStyle1
        - id: dialogue-text
          type: text
          x: 100
          y: 900
          content: ${dialogue.content[0].text}
          textStyleId: textStyle2
    nvl-layout:
      elements:
        - id: nvl-bg
          type: rect
          x: 0
          y: 0
          width: 1920
          height: 1080
          colorId: layoutColor3
        - id: nvl-container
          type: container
          x: 100
          y: 80
          direction: vertical
          gap: 30
          children:
            - $for line, i in dialogue.lines:
                - id: line-${i}
                  type: container
                  direction: horizontal
                  gap: 10
                  children:
                    - $if line.characterName:
                        - id: name-${i}
                          type: text
                          content: "${line.characterName}:"
                          textStyleId: textStyle3
                    - id: text-${i}
                      type: text
                      content: ${line.content[0].text}
                      textStyleId: textStyle4
  characters:
    alice:
      name: Alice
    bob:
      name: Bob
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: "#D9D9D9"
    color2:
      hex: "#FFFFFF"
    layoutColor1:
      hex: "#000000"
    layoutColor2:
      hex: rgba(0, 0, 0, 0.8)
    layoutColor3:
      hex: rgba(0, 0, 0, 0.85)
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 28
      fontWeight: bold
      fontStyle: normal
      lineHeight: 1.2
    textStyle2:
      fontId: fontDefault
      colorId: color2
      fontSize: 24
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle3:
      fontId: fontDefault
      colorId: color1
      fontSize: 22
      fontWeight: bold
      fontStyle: normal
      lineHeight: 1.2
    textStyle4:
      fontId: fontDefault
      colorId: color2
      fontSize: 22
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: main
  scenes:
    main:
      name: NVL Test
      initialSectionId: section1
      sections:
        section1:
          name: Section 1
          lines:
            - id: "1"
              actions:
                base:
                  resourceId: base1
                dialogue:
                  mode: adv
                  ui:
                    resourceId: adv-layout
                  characterId: alice
                  content:
                    - text: Starting in ADV mode. Click to switch to NVL.
            - id: "2"
              actions:
                dialogue:
                  mode: nvl
                  ui:
                    resourceId: nvl-layout
                  content:
                    - text: Now in NVL mode. This is narration without a speaker.
            - id: "3"
              actions:
                dialogue:
                  characterId: alice
                  content:
                    - text: This line has Alice as the speaker.
            - id: "4"
              actions:
                dialogue:
                  characterId: bob
                  content:
                    - text: And this one is Bob speaking.
            - id: "5"
              actions:
                dialogue:
                  content:
                    - text: Another narration line. All lines should be visible above.
            - id: "6"
              actions:
                dialogue:
                  clearPage: true
                  characterId: alice
                  content:
                    - text: Page cleared! This is the only line now.
            - id: "7"
              actions:
                dialogue:
                  characterId: bob
                  content:
                    - text: Second line on the new page.
            - id: "8"
              actions:
                dialogue:
                  mode: adv
                  ui:
                    resourceId: adv-layout
                  characterId: alice
                  content:
                    - text: Back to ADV mode. Test complete!
