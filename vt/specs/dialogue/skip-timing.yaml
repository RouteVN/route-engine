---
title: Dialogue Skip Timing
description: Minimal skip timing sandbox with 100 numbered lines. With the current 80ms skip cadence, the stable browser path is already around line 4 by the 40ms screenshot checkpoint after enabling skip.
skipInitialScreenshot: true
viewport:
  id: capture
  width: 960
  height: 540
steps:
  - action: click
    x: 805
    y: 55
  - action: wait
    ms: 40
  - action: screenshot
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  variables:
    _skipUnseenText:
      type: boolean
      scope: global-device
      default: true
  characters:
    narrator:
      name: Narrator
  layouts:
    stageLayout:
      elements:
        - id: stage
          type: rect
          width: 1920
          height: 1080
          colorId: bg
    dialogueLayout:
      mode: adv
      elements:
        - id: dialogue-box
          type: rect
          x: 100
          y: 760
          width: 1720
          height: 220
          colorId: panel
        - id: dialogue-text
          type: text
          x: 140
          y: 835
          width: 1200
          content: ${dialogue.content[0].text}
          textStyleId: textMain
        - id: skip-button
          type: rect
          x: 1500
          y: 70
          width: 220
          height: 70
          colorId: button
          click:
            payload:
              actions:
                toggleSkipMode: {}
        - id: skip-label
          type: text
          x: 1562
          y: 92
          content: "[SKIP]"
          textStyleId: textButton
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    bg:
      hex: "#000000"
    panel:
      hex: "#4D4D4D"
    button:
      hex: "#737373"
    fg:
      hex: "#FFFFFF"
  textStyles:
    textMain:
      fontId: fontDefault
      colorId: fg
      fontSize: 34
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textButton:
      fontId: fontDefault
      colorId: fg
      fontSize: 28
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: main
  scenes:
    main:
      initialSectionId: section1
      sections:
        section1:
