---
title: Autoplay
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  characters:
    narrator:
      name: ""
  layouts:
    baseLayout:
      elements:
        - id: background
          type: rect
          x: 0
          y: 0
          width: 1920
          height: 1080
          click:
            actionPayload:
              actions:
                nextLine: {}
          colorId: layoutColor1
    dialogueLayout:
      name: Dialogue Screen
      mode: adv
      elements:
        - id: dialogue-box
          type: rect
          x: 100
          y: 800
          width: 1720
          height: 200
          colorId: layoutColor2
        - id: dialogue-text
          type: text
          x: 150
          y: 850
          content: ${dialogue.content[0].text}
          textStyleId: textStyle1
        - id: auto-button
          type: text
          x: 1700
          y: 50
          content: Auto
          hover:
            textStyleId: textStyle3
          click:
            actionPayload:
              actions:
                toggleAutoMode: {}
          textStyleId:
            $if autoMode: textStyle2
            $else: textStyle1
        - id: skip-button
          type: text
          x: 1550
          y: 50
          content: Skip
          hover:
            textStyleId: textStyle3
          click:
            actionPayload:
              actions:
                toggleSkipMode: {}
          textStyleId:
            $if skipMode: textStyle2
            $else: textStyle1
        - id: speed-slow-button
          type: text
          x: 1400
          y: 50
          content: Slow
          hover:
            textStyleId: textStyle3
          click:
            actionPayload:
              actions:
                setAutoplayDelay:
                  delay: 2000
          textStyleId: textStyle1
        - id: speed-fast-button
          type: text
          x: 1250
          y: 50
          content: Fast
          hover:
            textStyleId: textStyle3
          click:
            actionPayload:
              actions:
                setAutoplayDelay:
                  delay: 250
          textStyleId: textStyle1
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: "#FFFFFF"
    color2:
      hex: "#D9D9D9"
    color3:
      hex: "#FFFF00"
    layoutColor1:
      hex: "#000000"
    layoutColor2:
      hex: "#4D4D4D"
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 32
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle2:
      fontId: fontDefault
      colorId: color2
      fontSize: 32
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle3:
      fontId: fontDefault
      colorId: color3
      fontSize: 32
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: test_scene
  scenes:
    test_scene:
      initialSectionId: test_section
      sections:
        test_section:
          lines:
            - id: line1
              actions:
                base:
                  resourceId: baseLayout
                dialogue:
                  mode: adv
                  ui:
                    resourceId: dialogueLayout
                  content:
                    - text: "Line 1: Testing autoplay functionality"
                  characterId: narrator
            - id: line2
              actions:
                dialogue:
                  content:
                    - text: "Line 2: This should auto-advance after 1 second"
                  characterId: narrator
            - id: line3
              actions:
                dialogue:
                  content:
                    - text: "Line 3: Click Auto button to enable/disable"
                  characterId: narrator
            - id: line4
              actions:
                dialogue:
                  content:
                    - text: "Line 4: Auto mode should continue through all lines"
                  characterId: narrator
            - id: line5
              actions:
                dialogue:
                  content:
                    - text: "Line 5: Final line - auto mode stops here"
                  characterId: narrator
