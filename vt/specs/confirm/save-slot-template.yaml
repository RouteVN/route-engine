---
title: Confirm Save Slot Template
description: Confirm dialog rendering saveSlots template data.
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  variables:
    savedAtLabel:
      type: string
      scope: context
      default: "1700000000000"
  layouts:
    sceneLayout:
      elements:
        - id: scene-bg
          type: rect
          width: 1920
          height: 1080
          x: 0
          y: 0
          colorId: layoutColor1
        - id: scene-title
          type: text
          x: 140
          y: 128
          content: Confirm Save Slot Template
          textStyleId: textStyle1
        - id: scene-copy
          type: text
          x: 140
          y: 206
          content: This confirm layout uses the standard saveSlots template input.
          textStyleId: textStyle2
    saveSlotConfirmLayout:
      elements:
        - id: confirm-panel
          type: rect
          width: 780
          height: 288
          x: 570
          y: 240
          colorId: layoutColor3
        - id: confirm-title
          type: text
          x: 650
          y: 308
          content: Slot ${saveSlots[0].slotId}
          textStyleId: textStyle1
        - id: confirm-copy
          type: text
          x: 650
          y: 372
          content: Saved ${saveSlots[0].savedAt}
          textStyleId: textStyle2
        - id: confirm-copy-2
          type: text
          x: 650
          y: 426
          content: Confirm actions still come from confirmDialog.confirmActions.
          textStyleId: textStyle3
        - id: confirm-yes
          type: container
          width: 220
          height: 68
          x: 650
          y: 468
          click:
            payload:
              actions: ${confirmDialog.confirmActions}
          children:
            - id: confirm-yes-bg
              type: rect
              width: 220
              height: 68
              x: 0
              y: 0
              colorId: layoutColor4
            - id: confirm-yes-text
              type: text
              x: 70
              y: 18
              content: Confirm
              textStyleId: textStyle4
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: "#FFFFFF"
    color2:
      hex: "#B0B0B0"
    layoutColor1:
      hex: "#0B0B0B"
    layoutColor3:
      hex: "#262626"
    layoutColor4:
      hex: "#3C3C3C"
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 40
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle2:
      fontId: fontDefault
      colorId: color2
      fontSize: 26
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle3:
      fontId: fontDefault
      colorId: color1
      fontSize: 22
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle4:
      fontId: fontDefault
      colorId: color1
      fontSize: 24
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: confirm
  scenes:
    confirm:
      initialSectionId: start
      sections:
        start:
          lines:
            - id: line1
              actions:
                background:
                  resourceId: sceneLayout
                saveSlot:
                  slotId: 1
                  savedAt: 1700000000000
                showConfirmDialog:
                  resourceId: saveSlotConfirmLayout
                  confirmActions:
                    loadSlot:
                      slotId: 1
