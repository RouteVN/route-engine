---
title: Save/Load Test
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  characters:
    narrator:
      name: ""
  layouts:
    baseLayout:
      elements:
        - id: background
          type: rect
          x: 0
          y: 0
          width: 1920
          height: 1080
          click:
            payload:
              actions:
                nextLine: {}
          colorId: layoutColor1
    dialogueLayout:
      name: Dialogue Screen
      mode: adv
      elements:
        - id: dialogue-box
          type: rect
          x: 100
          y: 800
          width: 1720
          height: 200
          colorId: layoutColor2
        - id: dialogue-text
          type: text
          x: 150
          y: 850
          content: ${dialogue.content[0].text}
          textStyleId: textStyle1
        - id: save-button
          type: rect
          x: 1780
          y: 20
          width: 100
          height: 50
          hover:
            colorId: color3
          click:
            payload:
              actions:
                pushLayeredView:
                  resourceId: saveMenuLayout
                  resourceType: layout
          colorId: layoutColor3
        - id: save-button-text
          type: text
          x: 1810
          y: 35
          content: Save
          textStyleId: textStyle2
        - id: load-button
          type: rect
          x: 1660
          y: 20
          width: 100
          height: 50
          hover:
            colorId: color3
          click:
            payload:
              actions:
                pushLayeredView:
                  resourceId: loadMenuLayout
                  resourceType: layout
          colorId: layoutColor3
        - id: load-button-text
          type: text
          x: 1690
          y: 35
          content: Load
          textStyleId: textStyle2
    saveMenuLayout:
      elements:
        - id: save-menu-overlay
          type: rect
          width: 1920
          height: 1080
          x: 0
          y: 0
          opacity: 0.7
          colorId: layoutColor4
        - id: save-menu-bg
          type: rect
          width: 800
          height: 500
          x: 560
          y: 290
          colorId: layoutColor1
        - id: save-menu-title
          type: text
          content: Save Game
          x: 900
          y: 340
          textStyleId: textStyle3
        - id: close-btn
          type: rect
          width: 50
          height: 50
          x: 1290
          y: 300
          hover:
            colorId: color3
          click:
            payload:
              actions:
                clearLayeredViews: {}
          colorId: layoutColor3
        - id: close-text
          type: text
          content: X
          x: 1305
          y: 310
          textStyleId: textStyle4
        - id: save-slot-1-btn
          type: rect
          width: 600
          height: 70
          x: 660
          y: 400
          hover:
            colorId: color3
          click:
            payload:
              actions:
                saveSlot:
                  slotId: 1
          colorId: layoutColor3
        - id: save-slot-1-text
          type: text
          content: Slot 1
          x: 920
          y: 420
          textStyleId: textStyle4
        - id: save-slot-2-btn
          type: rect
          width: 600
          height: 70
          x: 660
          y: 490
          hover:
            colorId: color3
          click:
            payload:
              actions:
                saveSlot:
                  slotId: 2
          colorId: layoutColor3
        - id: save-slot-2-text
          type: text
          content: Slot 2
          x: 920
          y: 510
          textStyleId: textStyle4
        - id: save-slot-3-btn
          type: rect
          width: 600
          height: 70
          x: 660
          y: 580
          hover:
            colorId: color3
          click:
            payload:
              actions:
                saveSlot:
                  slotId: 3
          colorId: layoutColor3
        - id: save-slot-3-text
          type: text
          content: Slot 3
          x: 920
          y: 600
          textStyleId: textStyle4
        - id: save-menu-info
          type: text
          content: Click X to close
          x: 880
          y: 730
          textStyleId: textStyle5
    loadMenuLayout:
      elements:
        - id: load-menu-overlay
          type: rect
          width: 1920
          height: 1080
          x: 0
          y: 0
          opacity: 0.7
          colorId: layoutColor4
        - id: load-menu-bg
          type: rect
          width: 800
          height: 500
          x: 560
          y: 290
          colorId: layoutColor1
        - id: load-menu-title
          type: text
          content: Load Game
          x: 900
          y: 340
          textStyleId: textStyle3
        - id: load-close-btn
          type: rect
          width: 50
          height: 50
          x: 1290
          y: 300
          hover:
            colorId: color3
          click:
            payload:
              actions:
                clearLayeredViews: {}
          colorId: layoutColor3
        - id: load-close-text
          type: text
          content: X
          x: 1305
          y: 310
          textStyleId: textStyle4
        - id: load-slot-1-btn
          type: rect
          width: 600
          height: 70
          x: 660
          y: 400
          hover:
            colorId: color3
          click:
            payload:
              actions:
                loadSlot:
                  slotId: 1
          colorId: layoutColor3
        - id: load-slot-1-text
          type: text
          content: Slot 1
          x: 920
          y: 420
          textStyleId: textStyle4
        - id: load-slot-2-btn
          type: rect
          width: 600
          height: 70
          x: 660
          y: 490
          hover:
            colorId: color3
          click:
            payload:
              actions:
                loadSlot:
                  slotId: 2
          colorId: layoutColor3
        - id: load-slot-2-text
          type: text
          content: Slot 2
          x: 920
          y: 510
          textStyleId: textStyle4
        - id: load-slot-3-btn
          type: rect
          width: 600
          height: 70
          x: 660
          y: 580
          hover:
            colorId: color3
          click:
            payload:
              actions:
                loadSlot:
                  slotId: 3
          colorId: layoutColor3
        - id: load-slot-3-text
          type: text
          content: Slot 3
          x: 920
          y: 600
          textStyleId: textStyle4
        - id: load-menu-info
          type: text
          content: Click X to close
          x: 880
          y: 730
          textStyleId: textStyle5
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: "#FFFFFF"
    color2:
      hex: "#FFFFFF"
    color3:
      hex: "#A6A6A6"
    layoutColor1:
      hex: "#000000"
    layoutColor2:
      hex: "#4D4D4D"
    layoutColor3:
      hex: "#737373"
    layoutColor4:
      hex: "#000000"
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 32
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle2:
      fontId: fontDefault
      colorId: color1
      fontSize: 24
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle3:
      fontId: fontDefault
      colorId: color2
      fontSize: 48
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle4:
      fontId: fontDefault
      colorId: color2
      fontSize: 32
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle5:
      fontId: fontDefault
      colorId: color3
      fontSize: 20
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: test_scene
  scenes:
    test_scene:
      initialSectionId: test_section
      sections:
        test_section:
          lines:
            - id: line1
              actions:
                background:
                  resourceId: baseLayout
                dialogue:
                  mode: adv
                  ui:
                    resourceId: dialogueLayout
                  content:
                    - text: "Line 1: Welcome to Save/Load test"
                  characterId: narrator
            - id: line2
              actions:
                dialogue:
                  content:
                    - text: "Line 2: Click Save in top right to save your game"
                  characterId: narrator
            - id: line3
              actions:
                dialogue:
                  content:
                    - text: "Line 3: Choose a slot, then click X to close"
                  characterId: narrator
            - id: line4
              actions:
                dialogue:
                  content:
                    - text: "Line 4: Click Load to load a saved game"
                  characterId: narrator
            - id: line5
              actions:
                dialogue:
                  content:
                    - text: "Line 5: Try saving now, then continue to next section"
                  characterId: narrator
            - id: line6
              actions:
                sectionTransition:
                  sectionId: section2
        section2:
          lines:
            - id: line1
              actions:
                dialogue:
                  content:
                    - text: "Line 6: This is section 2 - loading returns you to section 1"
                  characterId: narrator
            - id: line2
              actions:
                dialogue:
                  content:
                    - text: "Line 1: Welcome to Save/Load test"
                  characterId: narrator
            - id: line3
              actions:
                sectionTransition:
                  sectionId: test_section
