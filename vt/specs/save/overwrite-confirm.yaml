story:
  initialSceneId: overwrite-confirm
  scenes:
    overwrite-confirm:
      name: Overwrite Confirm
      initialSectionId: main
      sections:
        main:
          name: Main
          lines:
            - id: "1"
              actions:
                background:
                  resourceId: readingLayout
                hideDialogueUI: {}
                dialogue:
                  ui:
                    resourceId: readingDialogueLayout
                  content:
                    - text: "Line 1. Rain against the platform glass."
            - id: "2"
              actions:
                background:
                  resourceId: readingLayout
                updateVariable:
                  id: preview02
                  operations:
                    - variableId: previewFrame
                      op: set
                      value: "02"
                    - variableId: previewTitle
                      op: set
                      value: "Ticket"
                    - variableId: previewDetail
                      op: set
                      value: "Yellow fold."
                dialogue:
                  ui:
                    resourceId: readingDialogueLayout
                  content:
                    - text: "Line 2. The ticket stays warm in my fist."
            - id: "3"
              actions:
                background:
                  resourceId: readingLayout
                updateVariable:
                  id: preview03
                  operations:
                    - variableId: previewFrame
                      op: set
                      value: "03"
                    - variableId: previewTitle
                      op: set
                      value: "Tunnel"
                    - variableId: previewDetail
                      op: set
                      value: "Low metal hum."
                dialogue:
                  ui:
                    resourceId: readingDialogueLayout
                  content:
                    - text: "Line 3. A low tunnel hum rolls under the station."
