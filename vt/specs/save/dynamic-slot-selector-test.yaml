                  ui:
                    resourceId: readingDialogueLayout
                  characterId: narrator
                  content:
                    - text: "Line 12. The clock skips from 11:58 to 12:04 as if six minutes were cut from the scene."
            - id: line13
              actions:
                background:
                  resourceId: readingLayout
                updateVariable:
                  id: line13Preview
                  operations:
