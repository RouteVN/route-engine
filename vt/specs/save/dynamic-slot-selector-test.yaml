---
title: Dynamic Save Slot Selector Test
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  variables:
    loadPage:
      type: number
      scope: global-device
      default: 1
  layouts:
    base1:
      elements:
        - id: clickArea
          type: rect
          width: 1920
          height: 1080
          click:
            actionPayload:
              actions:
                contextNextLine: {}
          colorId: layoutColor1
    dynamicSlotsTestUI:
      name: Dynamic Slots Grid Test
      elements:
        - id: title
          type: text
          content: Dynamic Save Slots - Selector Test
          x: 960
          y: 50
          anchorX: 0.5
          textStyleId: textStyle1
        - id: subtitle
          type: text
          content: Page ${variables.loadPage}
          x: 960
          y: 100
          anchorX: 0.5
          textStyleId: textStyle2
        - id: pageNav
          type: container
          x: 960
          y: 180
          anchorX: 0.5
          children:
            - id: btnPrevPage
              type: text
              content: ← Previous Page
              x: -150
              y: 0
              anchorX: 0.5
              hover:
                textStyleId: textStyle4
              click:
                actionPayload:
                  actions:
                    updateVariable:
                      id: uv1
                      operations:
                        - variableId: loadPage
                          op: decrement
              textStyleId: textStyle3
            - id: btnNextPage
              type: text
              content: Next Page →
              x: 150
              y: 0
              anchorX: 0.5
              hover:
                textStyleId: textStyle4
              click:
                actionPayload:
                  actions:
                    updateVariable:
                      id: uv2
                      operations:
                        - variableId: loadPage
                          op: increment
              textStyleId: textStyle3
        - id: slotsGrid
          type: container
          direction: horizontal
          gap: 30
          width: 720
          x: 960
          y: 300
          anchorX: 0.5
          children:
            - $for slot in saveSlots:
                id: slot_${slot.slotNumber}_container
                type: container
                direction: vertical
                gap: 10
                children:
                  - id: slot_${slot.slotNumber}_box
                    type: rect
                    width: 200
                    height: 150
                    hover:
                      colorId: layoutColor2
                    click:
                      actionPayload:
                        actions:
                          saveSaveSlot:
                            slot: ${slot.slotNumber}
                    colorId: layoutColor2
                  - id: slot_${slot.slotNumber}_label
                    type: text
                    content: Slot ${slot.slotNumber}
                    x: 100
                    y: 60
                    anchorX: 0.5
                    anchorY: 0.5
                    textStyleId: textStyle5
                  - id: slot_${slot.slotNumber}_status
                    type: text
                    content: $if{slot.date:Saved:Empty}
                    x: 100
                    y: 90
                    anchorX: 0.5
                    anchorY: 0.5
                    textStyleId: textStyle6
        - id: instructions
          type: text
          content: Use Previous/Next to change pages. Click slots to save.
          x: 960
          y: 650
          anchorX: 0.5
          textStyleId: textStyle7
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: "#FFFFFF"
    color2:
      hex: "#737373"
    color3:
      hex: "#D9D9D9"
    color4:
      hex: "#A6A6A6"
    layoutColor1:
      hex: "#000000"
    layoutColor2:
      hex: "#4D4D4D"
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 42
      fontWeight: bold
      fontStyle: normal
      lineHeight: 1.2
    textStyle2:
      fontId: fontDefault
      colorId: color2
      fontSize: 32
      fontWeight: bold
      fontStyle: normal
      lineHeight: 1.2
    textStyle3:
      fontId: fontDefault
      colorId: color1
      fontSize: 24
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle4:
      fontId: fontDefault
      colorId: color2
      fontSize: 24
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle5:
      fontId: fontDefault
      colorId: color3
      fontSize: 20
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle6:
      fontId: fontDefault
      colorId: color4
      fontSize: 16
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle7:
      fontId: fontDefault
      colorId: color4
      fontSize: 20
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: main
  scenes:
    main:
      name: Dynamic Slot Selector Scene
      initialSectionId: section1
      sections:
        section1:
          name: Test Section
          lines:
            - id: line1
              actions:
                base:
                  resourceId: base1
                layout:
                  resourceId: dynamicSlotsTestUI
