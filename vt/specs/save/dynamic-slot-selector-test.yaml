                  operations:
                    - variableId: previewFrame
                      op: set
                      value: "14 / 20"
                    - variableId: previewTitle
                      op: set
                      value: "Low Hum"
                    - variableId: previewDetail
                      op: set
                      value: "Every page turn gets louder when the air goes quiet."
                dialogue:
                  ui:
                    resourceId: readingDialogueLayout
                  characterId: narrator
                  content:
                    - text: "Line 14. The air conditioner hum drops low enough that every page turn sounds louder."
            - id: line15
              actions:
                background:
                  resourceId: readingLayout
                updateVariable:
                  id: line15Preview
                  operations:
                    - variableId: previewFrame
                      op: set
                      value: "15 / 20"
                    - variableId: previewTitle
                      op: set
                      value: "Drone Lights"
                    - variableId: previewDetail
                      op: set
                      value: "Three white dots. Far ceiling."
                dialogue:
                  ui:
                    resourceId: readingDialogueLayout
                  characterId: narrator
                  content:
                    - text: "Line 15. Drone lights."
            - id: line16
              actions:
                background:
                  resourceId: readingLayout
                updateVariable:
                  id: line16Preview
                  operations:
                    - variableId: previewFrame
                      op: set
                      value: "16 / 20"
                    - variableId: previewTitle
                      op: set
                      value: "Speaker Blink"
                    - variableId: previewDetail
                      op: set
                      value: "One small icon flashes, then the whole room goes still."
                dialogue:
                  ui:
                    resourceId: readingDialogueLayout
                  characterId: narrator
                  content:
                    - text: "Line 16. The speaker icon blinks once on the console, then the room falls completely still."
            - id: line17
              actions:
                background:
                  resourceId: readingLayout
                updateVariable:
                  id: line17Preview
                  operations:
                    - variableId: previewFrame
                      op: set
                      value: "17 / 20"
                    - variableId: previewTitle
                      op: set
                      value: "Turn Left"
                    - variableId: previewDetail
                      op: set
                      value: "Painted arrow. Plain wall."
                dialogue:
                  ui:
                    resourceId: readingDialogueLayout
                  characterId: narrator
                  content:
                    - text: "Line 17. Turn left."
            - id: line18
              actions:
                background:
                  resourceId: readingLayout
                updateVariable:
                  id: line18Preview
                  operations:
                    - variableId: previewFrame
                      op: set
                      value: "18 / 20"
                    - variableId: previewTitle
                      op: set
                      value: "Projector Dust"
                    - variableId: previewDetail
                      op: set
                      value: "Particles drift through the beam and turn the corner hazy."
                dialogue:
                  ui:
                    resourceId: readingDialogueLayout
                  characterId: narrator
                  content:
                    - text: "Line 18. Dust lifts in the projector beam and makes the whole corner look underwater."
            - id: line19
              actions:
                background:
                  resourceId: readingLayout
                updateVariable:
                  id: line19Preview
                  operations:
                    - variableId: previewFrame
                      op: set
                      value: "19 / 20"
                    - variableId: previewTitle
                      op: set
                      value: "Exit Sign"
                    - variableId: previewDetail
                      op: set
                      value: "Green edge. Dark hall."
                dialogue:
                  ui:
                    resourceId: readingDialogueLayout
                  characterId: narrator
                  content:
                    - text: "Line 19. Exit sign."
            - id: line20
              actions:
                background:
                  resourceId: readingLayout
                updateVariable:
                  id: line20Preview
                  operations:
                    - variableId: previewFrame
                      op: set
                      value: "20 / 20"
                    - variableId: previewTitle
                      op: set
                      value: "Final Checkpoint"
                    - variableId: previewDetail
                      op: set
                      value: "Quiet room. Ready slot. Last frame."
                dialogue:
                  ui:
                    resourceId: readingDialogueLayout
                  characterId: narrator
                  content:
                    - text: "Line 20. Final checkpoint. The room is quiet, the save slot is ready, and the frame should look different."
