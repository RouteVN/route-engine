---
title: Multi-Slot Save Test
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  variables:
    playerName:
      type: string
      scope: context
      default: New Player
    playerLevel:
      type: number
      scope: context
      default: 1
    playerGold:
      type: number
      scope: context
      default: 0
    questCompleted:
      type: boolean
      scope: context
      default: false
  layouts:
    base1:
      elements:
        - id: clickArea
          type: rect
          width: 1920
          height: 1080
          click:
            payload:
              actions:
                contextNextLine: {}
          colorId: layoutColor1
    multiSlotTestUI:
      name: Multi-Slot Save Test
      elements:
        - id: title
          type: text
          content: Multi-Slot Save Test - Runtime Variables
          x: 960
          y: 50
          anchorX: 0.5
          textStyleId: textStyle1
        - id: subtitle
          type: text
          content: Each save slot stores different context variables
          x: 960
          y: 100
          anchorX: 0.5
          textStyleId: textStyle2
        - id: currentStateLabel
          type: text
          content: CURRENT STATE
          x: 960
          y: 180
          anchorX: 0.5
          textStyleId: textStyle3
        - id: nameDisplay
          type: text
          content: "Name: ${variables.playerName}"
          x: 300
          y: 240
          textStyleId: textStyle4
        - id: levelDisplay
          type: text
          content: "Level: ${variables.playerLevel}"
          x: 700
          y: 240
          textStyleId: textStyle4
        - id: goldDisplay
          type: text
          content: "Gold: ${variables.playerGold}"
          x: 1000
          y: 240
          textStyleId: textStyle4
        - id: questDisplay
          type: text
          content: "Quest Done: ${variables.questCompleted}"
          x: 1400
          y: 240
          textStyleId: textStyle4
        - id: modifyLabel
          type: text
          content: MODIFY CURRENT STATE
          x: 960
          y: 320
          anchorX: 0.5
          textStyleId: textStyle3
        - id: nameButtons
          type: container
          x: 300
          y: 380
          children:
            - id: nameLabel
              type: text
              content: "Set Name:"
              x: 0
              y: 0
              textStyleId: textStyle5
            - id: btnAlice
              type: text
              content: Alice
              x: 120
              y: 0
              hover:
                textStyleId: textStyle7
              click:
                payload:
                  actions:
                    updateVariable:
                      id: uv1
                      operations:
                        - variableId: playerName
                          op: set
                          value: Alice
              textStyleId: textStyle6
            - id: btnBob
              type: text
              content: Bob
              x: 200
              y: 0
              hover:
                textStyleId: textStyle7
              click:
                payload:
                  actions:
                    updateVariable:
                      id: uv2
                      operations:
                        - variableId: playerName
                          op: set
                          value: Bob
              textStyleId: textStyle6
            - id: btnCharlie
              type: text
              content: Charlie
              x: 270
              y: 0
              hover:
                textStyleId: textStyle7
              click:
                payload:
                  actions:
                    updateVariable:
                      id: uv3
                      operations:
                        - variableId: playerName
                          op: set
                          value: Charlie
              textStyleId: textStyle6
        - id: levelButtons
          type: container
          x: 700
          y: 380
          children:
            - id: levelLabel
              type: text
              content: "Level:"
              x: 0
              y: 0
              textStyleId: textStyle5
            - id: btnLevelUp
              type: text
              content: "+1"
              x: 80
              y: 0
              hover:
                textStyleId: textStyle8
              click:
                payload:
                  actions:
                    updateVariable:
                      id: uv4
                      operations:
                        - variableId: playerLevel
                          op: increment
              textStyleId: textStyle7
            - id: btnLevelDown
              type: text
              content: "-1"
              x: 130
              y: 0
              hover:
                textStyleId: textStyle8
              click:
                payload:
                  actions:
                    updateVariable:
                      id: uv5
                      operations:
                        - variableId: playerLevel
                          op: decrement
              textStyleId: textStyle7
        - id: goldButtons
          type: container
          x: 1000
          y: 380
          children:
            - id: goldLabel
              type: text
              content: "Gold:"
              x: 0
              y: 0
              textStyleId: textStyle5
            - id: btnGoldAdd
              type: text
              content: "+100"
              x: 70
              y: 0
              hover:
                textStyleId: textStyle9
              click:
                payload:
                  actions:
                    updateVariable:
                      id: uv6
                      operations:
                        - variableId: playerGold
                          op: increment
                          value: 100
              textStyleId: textStyle7
            - id: btnGoldReset
              type: text
              content: Reset
              x: 140
              y: 0
              hover:
                textStyleId: textStyle9
              click:
                payload:
                  actions:
                    updateVariable:
                      id: uv7
                      operations:
                        - variableId: playerGold
                          op: set
                          value: 0
              textStyleId: textStyle9
        - id: questButton
          type: container
          x: 1400
          y: 380
          children:
            - id: questLabel
              type: text
              content: "Quest:"
              x: 0
              y: 0
              textStyleId: textStyle5
            - id: btnQuestToggle
              type: text
              content: Toggle
              x: 80
              y: 0
              hover:
                textStyleId: textStyle8
              click:
                payload:
                  actions:
                    updateVariable:
                      id: uv8
                      operations:
                        - variableId: questCompleted
                          op: toggle
              textStyleId: textStyle7
        - id: saveLabel
          type: text
          content: SAVE TO SLOT
          x: 960
          y: 480
          anchorX: 0.5
          textStyleId: textStyle3
        - id: saveSlotButtons
          type: container
          x: 960
          y: 540
          anchorX: 0.5
          children:
            - id: btnSaveSlot1
              type: text
              content: Save Slot 1
              x: -300
              y: 0
              anchorX: 0.5
              hover:
                textStyleId: textStyle11
              click:
                payload:
                  actions:
                    saveSaveSlot:
                      slot: 1
              textStyleId: textStyle10
            - id: btnSaveSlot2
              type: text
              content: Save Slot 2
              x: -100
              y: 0
              anchorX: 0.5
              hover:
                textStyleId: textStyle11
              click:
                payload:
                  actions:
                    saveSaveSlot:
                      slot: 2
              textStyleId: textStyle10
            - id: btnSaveSlot3
              type: text
              content: Save Slot 3
              x: 100
              y: 0
              anchorX: 0.5
              hover:
                textStyleId: textStyle11
              click:
                payload:
                  actions:
                    saveSaveSlot:
                      slot: 3
              textStyleId: textStyle10
            - id: btnSaveSlot4
              type: text
              content: Save Slot 4
              x: 300
              y: 0
              anchorX: 0.5
              hover:
                textStyleId: textStyle11
              click:
                payload:
                  actions:
                    saveSaveSlot:
                      slot: 4
              textStyleId: textStyle10
        - id: loadLabel
          type: text
          content: LOAD FROM SLOT
          x: 960
          y: 640
          anchorX: 0.5
          textStyleId: textStyle3
        - id: loadSlotButtons
          type: container
          x: 960
          y: 700
          anchorX: 0.5
          children:
            - id: btnLoadSlot1
              type: text
              content: Load Slot 1
              x: -300
              y: 0
              anchorX: 0.5
              hover:
                textStyleId: textStyle11
              click:
                payload:
                  actions:
                    loadSaveSlot:
                      slot: 1
              textStyleId: textStyle10
            - id: btnLoadSlot2
              type: text
              content: Load Slot 2
              x: -100
              y: 0
              anchorX: 0.5
              hover:
                textStyleId: textStyle11
              click:
                payload:
                  actions:
                    loadSaveSlot:
                      slot: 2
              textStyleId: textStyle10
            - id: btnLoadSlot3
              type: text
              content: Load Slot 3
              x: 100
              y: 0
              anchorX: 0.5
              hover:
                textStyleId: textStyle11
              click:
                payload:
                  actions:
                    loadSaveSlot:
                      slot: 3
              textStyleId: textStyle10
            - id: btnLoadSlot4
              type: text
              content: Load Slot 4
              x: 300
              y: 0
              anchorX: 0.5
              hover:
                textStyleId: textStyle11
              click:
                payload:
                  actions:
                    loadSaveSlot:
                      slot: 4
              textStyleId: textStyle10
        - id: instructions
          type: text
          content: |-
            1. Modify the current state (name, level, gold, quest)
            2. Save to a slot
            3. Modify state again differently
            4. Save to another slot
            5. Load different slots to see each has its own context variables!
          x: 960
          y: 850
          anchorX: 0.5
          textStyleId: textStyle12
        - id: devToolsHint
          type: text
          content: "Open DevTools Console and type:
            JSON.parse(localStorage.getItem('saveSlots'))"
          x: 960
          y: 1000
          anchorX: 0.5
          textStyleId: textStyle13
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: "#FFFFFF"
    color2:
      hex: "#A6A6A6"
    color3:
      hex: "#737373"
    color4:
      hex: "#D9D9D9"
    color5:
      hex: "#4D4D4D"
    layoutColor1:
      hex: "#000000"
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 42
      fontWeight: bold
      fontStyle: normal
      lineHeight: 1.2
    textStyle2:
      fontId: fontDefault
      colorId: color2
      fontSize: 24
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle3:
      fontId: fontDefault
      colorId: color3
      fontSize: 28
      fontWeight: bold
      fontStyle: normal
      lineHeight: 1.2
    textStyle4:
      fontId: fontDefault
      colorId: color4
      fontSize: 26
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle5:
      fontId: fontDefault
      colorId: color2
      fontSize: 22
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle6:
      fontId: fontDefault
      colorId: color1
      fontSize: 20
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle7:
      fontId: fontDefault
      colorId: color3
      fontSize: 20
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle8:
      fontId: fontDefault
      colorId: color5
      fontSize: 20
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle9:
      fontId: fontDefault
      colorId: color2
      fontSize: 20
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle10:
      fontId: fontDefault
      colorId: color1
      fontSize: 24
      fontWeight: bold
      fontStyle: normal
      lineHeight: 1.2
    textStyle11:
      fontId: fontDefault
      colorId: color3
      fontSize: 24
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle12:
      fontId: fontDefault
      colorId: color2
      fontSize: 20
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
      align: center
    textStyle13:
      fontId: fontDefault
      colorId: color5
      fontSize: 18
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
      align: center
story:
  initialSceneId: main
  scenes:
    main:
      name: Multi-Slot Save Scene
      initialSectionId: section1
      sections:
        section1:
          name: Multi-Slot Test Section
          lines:
            - id: line1
              actions:
                base:
                  resourceId: base1
                layout:
                  resourceId: multiSlotTestUI
