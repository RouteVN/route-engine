---
title: Rollback Test
description: Simple visual novel simulation to test variable rollback
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  variables:
    score:
      type: number
      scope: context
      default: 0
  characters:
    narrator:
      name: Guide
  layouts:
    baseLayout:
      elements:
        - id: bg
          type: rect
          width: 1920
          height: 1080
          click:
            actionPayload:
              actions:
                nextLine: {}
          colorId: layoutColor1
    dialogueUI:
      name: Dialogue UI
      mode: adv
      elements:
        - id: dialogueBox
          type: rect
          x: 100
          y: 750
          width: 1720
          height: 280
          opacity: 0.9
          click:
            actionPayload:
              actions:
                nextLine: {}
          colorId: layoutColor2
        - id: charName
          type: text
          content: ${dialogue.character.name}
          x: 150
          y: 770
          textStyleId: textStyle1
        - id: dialogueText
          type: text
          content: ${dialogue.content[0].text}
          x: 150
          y: 820
          width: 1620
          textStyleId: textStyle2
        - id: scoreDisplay
          type: text
          content: "Score: ${variables.score}"
          x: 1700
          y: 50
          anchorX: 1
          textStyleId: textStyle3
        - id: backBtn
          type: text
          content: "[BACK to Line 1]"
          x: 100
          y: 700
          hover:
            textStyleId: textStyle5
          click:
            actionPayload:
              actions:
                rollbackToLine:
                  sectionId: story
                  lineId: line1
          textStyleId: textStyle4
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: "#737373"
    color2:
      hex: "#D9D9D9"
    color3:
      hex: "#A6A6A6"
    layoutColor1:
      hex: "#000000"
    layoutColor2:
      hex: "#4D4D4D"
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 28
      fontWeight: bold
      fontStyle: normal
      lineHeight: 1.2
    textStyle2:
      fontId: fontDefault
      colorId: color2
      fontSize: 24
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle3:
      fontId: fontDefault
      colorId: color3
      fontSize: 32
      fontWeight: bold
      fontStyle: normal
      lineHeight: 1.2
    textStyle4:
      fontId: fontDefault
      colorId: color1
      fontSize: 28
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle5:
      fontId: fontDefault
      colorId: color3
      fontSize: 28
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: main
  scenes:
    main:
      name: Main Scene
      initialSectionId: story
      sections:
        story:
          name: Story
          lines:
            - id: line1
              actions:
                base:
                  resourceId: baseLayout
                dialogue:
                  mode: adv
                  gui:
                    resourceId: dialogueUI
                  content:
                    - text: Welcome! Your current score is 0. Click to continue...
                  characterId: narrator
            - id: line2
              actions:
                dialogue:
                  content:
                    - text: This is the second line. Nothing changes here yet.
                  characterId: narrator
            - id: line3
              actions:
                updateVariable:
                  id: uvAddScore
                  operations:
                    - variableId: score
                      op: increment
                      value: 10
                dialogue:
                  content:
                    - text: You gained +10 points! Watch the score in the corner.
                  characterId: narrator
            - id: line4
              actions:
                updateVariable:
                  id: uvAddMore
                  operations:
                    - variableId: score
                      op: increment
                      value: 20
                dialogue:
                  content:
                    - text: Another +20 points! Now try clicking [BACK] to return to line 1.
                  characterId: narrator
            - id: line5
              actions:
                dialogue:
                  content:
                    - text: If rollback works, your score should reset to 0 when you go back!
                  characterId: narrator
