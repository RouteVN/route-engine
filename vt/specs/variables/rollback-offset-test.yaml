---
title: Rollback By Offset Test
description: Test rollbackByOffset action - go back N lines with variable reversion
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  variables:
    score:
      type: number
      scope: context
      default: 0
    lineVisited:
      type: number
      scope: context
      default: 1
  characters:
    narrator:
      name: Guide
  layouts:
    baseLayout:
      elements:
        - id: bg
          type: rect
          width: 1920
          height: 1080
          click:
            actionPayload:
              actions:
                nextLine: {}
          colorId: layoutColor1
    dialogueUI:
      name: Dialogue UI
      mode: adv
      elements:
        - id: dialogueBox
          type: rect
          x: 100
          y: 750
          width: 1720
          height: 280
          opacity: 0.9
          click:
            actionPayload:
              actions:
                nextLine: {}
          colorId: color4
        - id: charName
          type: text
          content: ${dialogue.character.name}
          x: 150
          y: 770
          textStyleId: textStyle1
        - id: dialogueText
          type: text
          content: ${dialogue.content[0].text}
          x: 150
          y: 820
          width: 1620
          textStyleId: textStyle2
        - id: scoreDisplay
          type: text
          content: "Score: ${variables.score}"
          x: 1700
          y: 50
          anchorX: 1
          textStyleId: textStyle3
        - id: lineIndicator
          type: text
          content: "Line visited: ${variables.lineVisited}"
          x: 1700
          y: 100
          anchorX: 1
          textStyleId: textStyle4
        - id: backOneBtn
          type: text
          content: "[BACK 1 LINE]"
          x: 100
          y: 680
          hover:
            textStyleId: textStyle5
          click:
            actionPayload:
              actions:
                rollbackByOffset:
                  offset: -1
          textStyleId: textStyle4
        - id: backTwoBtn
          type: text
          content: "[BACK 2 LINES]"
          x: 350
          y: 680
          hover:
            textStyleId: textStyle4
          click:
            actionPayload:
              actions:
                rollbackByOffset:
                  offset: -2
          textStyleId: textStyle4
        - id: backThreeBtn
          type: text
          content: "[BACK 3 LINES]"
          x: 620
          y: 680
          hover:
            textStyleId: textStyle4
          click:
            actionPayload:
              actions:
                rollbackByOffset:
                  offset: -3
          textStyleId: textStyle6
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: "#737373"
    color2:
      hex: "#D9D9D9"
    color3:
      hex: "#A6A6A6"
    color4:
      hex: "#4D4D4D"
    layoutColor1:
      hex: "#000000"
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 28
      fontWeight: bold
      fontStyle: normal
      lineHeight: 1.2
    textStyle2:
      fontId: fontDefault
      colorId: color2
      fontSize: 24
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle3:
      fontId: fontDefault
      colorId: color3
      fontSize: 32
      fontWeight: bold
      fontStyle: normal
      lineHeight: 1.2
    textStyle4:
      fontId: fontDefault
      colorId: color1
      fontSize: 24
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle5:
      fontId: fontDefault
      colorId: color3
      fontSize: 24
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle6:
      fontId: fontDefault
      colorId: color4
      fontSize: 24
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: main
  scenes:
    main:
      name: Main Scene
      initialSectionId: story
      sections:
        story:
          name: Story
          lines:
            - id: line1
              actions:
                base:
                  resourceId: baseLayout
                updateVariable:
                  id: uvLine1
                  operations:
                    - variableId: lineVisited
                      op: set
                      value: 1
                dialogue:
                  mode: adv
                  ui:
                    resourceId: dialogueUI
                  content:
                    - text: "LINE 1: Score is 0. Use the back buttons above to test offset rollback!"
                  characterId: narrator
            - id: line2
              actions:
                updateVariable:
                  id: uvLine2Score
                  operations:
                    - variableId: score
                      op: increment
                      value: 5
                    - variableId: lineVisited
                      op: set
                      value: 2
                dialogue:
                  content:
                    - text: "LINE 2: +5 points! (Total: 5)"
                  characterId: narrator
            - id: line3
              actions:
                updateVariable:
                  id: uvLine3Score
                  operations:
                    - variableId: score
                      op: increment
                      value: 10
                    - variableId: lineVisited
                      op: set
                      value: 3
                dialogue:
                  content:
                    - text: "LINE 3: +10 points! (Total: 15)"
                  characterId: narrator
            - id: line4
              actions:
                updateVariable:
                  id: uvLine4Score
                  operations:
                    - variableId: score
                      op: increment
                      value: 15
                    - variableId: lineVisited
                      op: set
                      value: 4
                dialogue:
                  content:
                    - text: "LINE 4: +15 points! (Total: 30)"
                  characterId: narrator
            - id: line5
              actions:
                updateVariable:
                  id: uvLine5Score
                  operations:
                    - variableId: score
                      op: increment
                      value: 20
                    - variableId: lineVisited
                      op: set
                      value: 5
                dialogue:
                  content:
                    - text: "LINE 5: +20 points! (Total: 50) - Try the back buttons now!"
                  characterId: narrator
            - id: line6
              actions:
                updateVariable:
                  id: uvLine6
                  operations:
                    - variableId: lineVisited
                      op: set
                      value: 6
                dialogue:
                  content:
                    - text:
                        "LINE 6: End of test. Expected behavior: [BACK 1] goes to line 5 (score
                        30), [BACK 2] goes to line 4 (score 15), etc."
                  characterId: narrator
