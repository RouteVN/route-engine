---
title: String Variables Test
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#4D4D4D"
resources:
  variables:
    playerName:
      type: string
      scope: context
      default: Guest
    currentStatus:
      type: string
      scope: global-account
      default: Idle
  layouts:
    base1:
      elements:
        - id: clickArea
          type: rect
          width: 1920
          height: 1080
          click:
            payload:
              actions:
                nextLine: {}
          colorId: layoutColor1
    stringTestUI:
      name: String Variable Test Screen
      elements:
        - id: title
          type: text
          content: String Variable Test
          x: 960
          y: 100
          anchorX: 0.5
          textStyleId: textStyle1
        - id: nameLabel
          type: text
          content: "Player Name (context):"
          x: 400
          y: 300
          textStyleId: textStyle2
        - id: nameValue
          type: text
          content: ${variables.playerName}
          x: 800
          y: 300
          textStyleId: textStyle3
        - id: statusLabel
          type: text
          content: "Status (global):"
          x: 400
          y: 400
          textStyleId: textStyle2
        - id: statusValue
          type: text
          content: ${variables.currentStatus}
          x: 800
          y: 400
          textStyleId: textStyle3
        - id: nameButtonsContainer
          type: container
          x: 960
          y: 550
          anchorX: 0.5
          children:
            - id: btnAlice
              type: text
              content: Alice
              x: -200
              y: 0
              anchorX: 0.5
              hover:
                textStyleId: textStyle5
              click:
                payload:
                  actions:
                    updateVariable:
                      id: uv1
                      operations:
                        - variableId: playerName
                          op: set
                          value: Alice
              textStyleId: textStyle4
            - id: btnBob
              type: text
              content: Bob
              x: -50
              y: 0
              anchorX: 0.5
              hover:
                textStyleId: textStyle5
              click:
                payload:
                  actions:
                    updateVariable:
                      id: uv2
                      operations:
                        - variableId: playerName
                          op: set
                          value: Bob
              textStyleId: textStyle4
            - id: btnCharlie
              type: text
              content: Charlie
              x: 100
              y: 0
              anchorX: 0.5
              hover:
                textStyleId: textStyle5
              click:
                payload:
                  actions:
                    updateVariable:
                      id: uv3
                      operations:
                        - variableId: playerName
                          op: set
                          value: Charlie
              textStyleId: textStyle4
            - id: btnReset
              type: text
              content: Reset
              x: 250
              y: 0
              anchorX: 0.5
              hover:
                textStyleId: textStyle5
              click:
                payload:
                  actions:
                    updateVariable:
                      id: uv4
                      operations:
                        - variableId: playerName
                          op: set
                          value: Guest
              textStyleId: textStyle6
        - id: statusButtonsContainer
          type: container
          x: 960
          y: 700
          anchorX: 0.5
          children:
            - id: btnIdle
              type: text
              content: Idle
              x: -200
              y: 0
              anchorX: 0.5
              hover:
                textStyleId: textStyle5
              click:
                payload:
                  actions:
                    updateVariable:
                      id: uv5
                      operations:
                        - variableId: currentStatus
                          op: set
                          value: Idle
              textStyleId: textStyle4
            - id: btnActive
              type: text
              content: Active
              x: -50
              y: 0
              anchorX: 0.5
              hover:
                textStyleId: textStyle5
              click:
                payload:
                  actions:
                    updateVariable:
                      id: uv6
                      operations:
                        - variableId: currentStatus
                          op: set
                          value: Active
              textStyleId: textStyle4
            - id: btnBusy
              type: text
              content: Busy
              x: 100
              y: 0
              anchorX: 0.5
              hover:
                textStyleId: textStyle5
              click:
                payload:
                  actions:
                    updateVariable:
                      id: uv7
                      operations:
                        - variableId: currentStatus
                          op: set
                          value: Busy
              textStyleId: textStyle4
            - id: btnOffline
              type: text
              content: Offline
              x: 250
              y: 0
              anchorX: 0.5
              hover:
                textStyleId: textStyle5
              click:
                payload:
                  actions:
                    updateVariable:
                      id: uv8
                      operations:
                        - variableId: currentStatus
                          op: set
                          value: Offline
              textStyleId: textStyle4
        - id: instructions
          type: text
          content: Click buttons to change variable values
          x: 960
          y: 900
          anchorX: 0.5
          textStyleId: textStyle7
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: "#D9D9D9"
    color2:
      hex: "#A6A6A6"
    color3:
      hex: "#737373"
    color4:
      hex: "#FFFFFF"
    layoutColor1:
      hex: "#000000"
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 48
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle2:
      fontId: fontDefault
      colorId: color2
      fontSize: 32
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle3:
      fontId: fontDefault
      colorId: color3
      fontSize: 32
      fontWeight: bold
      fontStyle: normal
      lineHeight: 1.2
    textStyle4:
      fontId: fontDefault
      colorId: color4
      fontSize: 28
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle5:
      fontId: fontDefault
      colorId: color3
      fontSize: 28
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle6:
      fontId: fontDefault
      colorId: color2
      fontSize: 28
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle7:
      fontId: fontDefault
      colorId: color2
      fontSize: 24
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: main
  scenes:
    main:
      name: String Test Scene
      initialSectionId: section1
      sections:
        section1:
          name: String Test Section
          lines:
            - id: line1
              actions:
                background:
                  resourceId: base1
                layout:
                  resourceId: stringTestUI
