---
title: Variable Scopes Comparison
description: Demonstrates context, global-device, and global-account variable scopes
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  variables:
    playerGold:
      type: number
      scope: context
      default: 100
    currentLocation:
      type: string
      scope: context
      default: Town Square
    textSpeed:
      type: number
      scope: global-device
      default: 50
    volume:
      type: number
      scope: global-device
      default: 80
    totalPlaythroughs:
      type: number
      scope: global-account
      default: 0
    secretUnlocked:
      type: boolean
      scope: global-account
      default: false
  layouts:
    base1:
      elements:
        - id: clickArea
          type: rect
          width: 1920
          height: 1080
          click:
            payload:
              actions:
                nextLine: {}
          colorId: layoutColor1
    scopeComparisonUI:
      name: Variable Scopes Comparison
      elements:
        - id: title
          type: text
          content: "Variable Scopes: Context vs Global-Device vs Global-Account"
          x: 960
          y: 60
          anchorX: 0.5
          textStyleId: textStyle1
        - id: contextSection
          type: container
          x: 100
          y: 150
          children:
            - id: contextTitle
              type: text
              content: CONTEXT SCOPE
              x: 0
              y: 0
              textStyleId: textStyle2
            - id: contextDesc
              type: text
              content: Tied to this playthrough
              x: 0
              y: 40
              textStyleId: textStyle3
            - id: contextDesc2
              type: text
              content: ✓ Saved in save slots
              x: 0
              y: 70
              textStyleId: textStyle4
            - id: contextDesc3
              type: text
              content: ✗ Lost on new game
              x: 0
              y: 95
              textStyleId: textStyle4
            - id: goldLabel
              type: text
              content: "Player Gold:"
              x: 0
              y: 150
              textStyleId: textStyle5
            - id: goldValue
              type: text
              content: ${variables.playerGold}
              x: 180
              y: 150
              textStyleId: textStyle6
            - id: goldPlus
              type: text
              content: "[+10]"
              x: 280
              y: 150
              hover:
                textStyleId: textStyle8
              click:
                payload:
                  actions:
                    updateVariable:
                      id: uv1
                      operations:
                        - variableId: playerGold
                          op: increment
                          value: 10
              textStyleId: textStyle7
            - id: goldMinus
              type: text
              content: "[-10]"
              x: 360
              y: 150
              hover:
                textStyleId: textStyle8
              click:
                payload:
                  actions:
                    updateVariable:
                      id: uv2
                      operations:
                        - variableId: playerGold
                          op: decrement
                          value: 10
              textStyleId: textStyle7
            - id: locationLabel
              type: text
              content: "Location:"
              x: 0
              y: 200
              textStyleId: textStyle5
            - id: locationValue
              type: text
              content: ${variables.currentLocation}
              x: 140
              y: 200
              textStyleId: textStyle6
            - id: locationTown
              type: text
              content: "[Town]"
              x: 350
              y: 200
              hover:
                textStyleId: textStyle10
              click:
                payload:
                  actions:
                    updateVariable:
                      id: uv3
                      operations:
                        - variableId: currentLocation
                          op: set
                          value: Town Square
              textStyleId: textStyle9
            - id: locationForest
              type: text
              content: "[Forest]"
              x: 450
              y: 200
              hover:
                textStyleId: textStyle10
              click:
                payload:
                  actions:
                    updateVariable:
                      id: uv4
                      operations:
                        - variableId: currentLocation
                          op: set
                          value: Dark Forest
              textStyleId: textStyle9
        - id: global-deviceSection
          type: container
          x: 100
          y: 450
          children:
            - id: global-deviceTitle
              type: text
              content: GLOBAL-DEVICE SCOPE
              x: 0
              y: 0
              textStyleId: textStyle2
            - id: global-deviceDesc
              type: text
              content: Settings stored on this device
              x: 0
              y: 40
              textStyleId: textStyle3
            - id: global-deviceDesc2
              type: text
              content: ✓ Persists across sessions
              x: 0
              y: 70
              textStyleId: textStyle4
            - id: global-deviceDesc3
              type: text
              content: ✗ NOT in save slots
              x: 0
              y: 95
              textStyleId: textStyle4
            - id: speedLabel
              type: text
              content: "Text Speed:"
              x: 0
              y: 150
              textStyleId: textStyle5
            - id: speedValue
              type: text
              content: ${variables.textSpeed}
              x: 180
              y: 150
              textStyleId: textStyle6
            - id: speedSlow
              type: text
              content: "[Slow]"
              x: 240
              y: 150
              hover:
                textStyleId: textStyle10
              click:
                payload:
                  actions:
                    updateVariable:
                      id: uv5
                      operations:
                        - variableId: textSpeed
                          op: set
                          value: 25
              textStyleId: textStyle9
            - id: speedMedium
              type: text
              content: "[Medium]"
              x: 330
              y: 150
              hover:
                textStyleId: textStyle10
              click:
                payload:
                  actions:
                    updateVariable:
                      id: uv6
                      operations:
                        - variableId: textSpeed
                          op: set
                          value: 50
              textStyleId: textStyle9
            - id: speedFast
              type: text
              content: "[Fast]"
              x: 450
              y: 150
              hover:
                textStyleId: textStyle10
              click:
                payload:
                  actions:
                    updateVariable:
                      id: uv7
                      operations:
                        - variableId: textSpeed
                          op: set
                          value: 100
              textStyleId: textStyle9
            - id: volumeLabel
              type: text
              content: "Volume:"
              x: 0
              y: 200
              textStyleId: textStyle5
            - id: volumeValue
              type: text
              content: ${variables.volume}%
              x: 130
              y: 200
              textStyleId: textStyle6
            - id: volumeUp
              type: text
              content: "[+10]"
              x: 240
              y: 200
              hover:
                textStyleId: textStyle8
              click:
                payload:
                  actions:
                    updateVariable:
                      id: uv8
                      operations:
                        - variableId: volume
                          op: increment
                          value: 10
              textStyleId: textStyle7
            - id: volumeDown
              type: text
              content: "[-10]"
              x: 320
              y: 200
              hover:
                textStyleId: textStyle8
              click:
                payload:
                  actions:
                    updateVariable:
                      id: uv9
                      operations:
                        - variableId: volume
                          op: decrement
                          value: 10
              textStyleId: textStyle7
        - id: global-accountSection
          type: container
          x: 100
          y: 750
          children:
            - id: global-accountTitle
              type: text
              content: GLOBAL-ACCOUNT SCOPE
              x: 0
              y: 0
              textStyleId: textStyle2
            - id: global-accountDesc
              type: text
              content: Achievements across all playthroughs
              x: 0
              y: 40
              textStyleId: textStyle3
            - id: global-accountDesc2
              type: text
              content: ✓ Persists forever
              x: 0
              y: 70
              textStyleId: textStyle4
            - id: global-accountDesc3
              type: text
              content: ✓ Shared across saves
              x: 0
              y: 95
              textStyleId: textStyle4
            - id: playthroughsLabel
              type: text
              content: "Playthroughs:"
              x: 0
              y: 150
              textStyleId: textStyle5
            - id: playthroughsValue
              type: text
              content: ${variables.totalPlaythroughs}
              x: 200
              y: 150
              textStyleId: textStyle6
            - id: playthroughsInc
              type: text
              content: "[+1]"
              x: 250
              y: 150
              hover:
                textStyleId: textStyle8
              click:
                payload:
                  actions:
                    updateVariable:
                      id: uv10
                      operations:
                        - variableId: totalPlaythroughs
                          op: increment
              textStyleId: textStyle7
            - id: secretLabel
              type: text
              content: "Secret Unlocked:"
              x: 0
              y: 200
              textStyleId: textStyle5
            - id: secretValue
              type: text
              content: ${variables.secretUnlocked}
              x: 230
              y: 200
              textStyleId: textStyle6
            - id: secretToggle
              type: text
              content: toggle
              x: 320
              y: 200
              hover:
                textStyleId: textStyle10
              click:
                payload:
                  actions:
                    updateVariable:
                      id: uv11
                      operations:
                        - variableId: secretUnlocked
                          op: set
                          value: true
              textStyleId: textStyle9
        - id: comparisonTable
          type: container
          x: 1100
          y: 150
          children:
            - id: tableTitle
              type: text
              content: Behavior Comparison
              x: 0
              y: 0
              textStyleId: textStyle11
            - id: headerScope
              type: text
              content: Scope
              x: 0
              y: 60
              textStyleId: textStyle9
            - id: headerSaved
              type: text
              content: Saved?
              x: 200
              y: 60
              textStyleId: textStyle9
            - id: headerPersist
              type: text
              content: Persist?
              x: 350
              y: 60
              textStyleId: textStyle9
            - id: contextRow
              type: text
              content: Runtime
              x: 0
              y: 100
              textStyleId: textStyle4
            - id: contextSaved
              type: text
              content: ✓ Yes
              x: 200
              y: 100
              textStyleId: textStyle4
            - id: contextPersist
              type: text
              content: ✗ No
              x: 350
              y: 100
              textStyleId: textStyle4
            - id: global-deviceRow
              type: text
              content: Device
              x: 0
              y: 140
              textStyleId: textStyle4
            - id: global-deviceSaved
              type: text
              content: ✗ No
              x: 200
              y: 140
              textStyleId: textStyle4
            - id: global-devicePersist
              type: text
              content: ✓ Yes
              x: 350
              y: 140
              textStyleId: textStyle4
            - id: global-accountRow
              type: text
              content: Global
              x: 0
              y: 180
              textStyleId: textStyle4
            - id: global-accountSaved
              type: text
              content: ✗ No*
              x: 200
              y: 180
              textStyleId: textStyle4
            - id: global-accountPersist
              type: text
              content: ✓ Yes
              x: 350
              y: 180
              textStyleId: textStyle4
            - id: global-accountNote
              type: text
              content: "* Shared across all saves"
              x: 0
              y: 215
              textStyleId: textStyle12
            - id: useCasesTitle
              type: text
              content: "Common Use Cases:"
              x: 0
              y: 280
              textStyleId: textStyle13
            - id: useRuntime
              type: text
              content: "Runtime: Story progress, items"
              x: 0
              y: 330
              textStyleId: textStyle14
            - id: useDevice
              type: text
              content: "Device: Volume, text speed"
              x: 0
              y: 360
              textStyleId: textStyle14
            - id: useGlobal
              type: text
              content: "Global: Achievements, unlocks"
              x: 0
              y: 390
              textStyleId: textStyle14
            - id: lifecycleTitle
              type: text
              content: "Variable Lifecycle:"
              x: 0
              y: 460
              textStyleId: textStyle13
            - id: lifecycleRuntime
              type: text
              content: "Runtime: Created → Saved → Loaded"
              x: 0
              y: 510
              textStyleId: textStyle14
            - id: lifecycleDevice
              type: text
              content: "Device: Created → localStorage"
              x: 0
              y: 540
              textStyleId: textStyle14
            - id: lifecycleGlobal
              type: text
              content: "Global: Created → localStorage"
              x: 0
              y: 570
              textStyleId: textStyle14
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: "#D9D9D9"
    color2:
      hex: "#737373"
    color3:
      hex: "#A6A6A6"
    color4:
      hex: "#FFFFFF"
    color5:
      hex: "#4D4D4D"
    layoutColor1:
      hex: "#000000"
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 42
      fontWeight: bold
      fontStyle: normal
      lineHeight: 1.2
    textStyle2:
      fontId: fontDefault
      colorId: color2
      fontSize: 32
      fontWeight: bold
      fontStyle: normal
      lineHeight: 1.2
    textStyle3:
      fontId: fontDefault
      colorId: color3
      fontSize: 18
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle4:
      fontId: fontDefault
      colorId: color2
      fontSize: 18
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle5:
      fontId: fontDefault
      colorId: color4
      fontSize: 24
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle6:
      fontId: fontDefault
      colorId: color2
      fontSize: 24
      fontWeight: bold
      fontStyle: normal
      lineHeight: 1.2
    textStyle7:
      fontId: fontDefault
      colorId: color2
      fontSize: 24
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle8:
      fontId: fontDefault
      colorId: color5
      fontSize: 24
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle9:
      fontId: fontDefault
      colorId: color3
      fontSize: 20
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle10:
      fontId: fontDefault
      colorId: color4
      fontSize: 20
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle11:
      fontId: fontDefault
      colorId: color1
      fontSize: 28
      fontWeight: bold
      fontStyle: normal
      lineHeight: 1.2
    textStyle12:
      fontId: fontDefault
      colorId: color3
      fontSize: 14
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle13:
      fontId: fontDefault
      colorId: color1
      fontSize: 24
      fontWeight: bold
      fontStyle: normal
      lineHeight: 1.2
    textStyle14:
      fontId: fontDefault
      colorId: color2
      fontSize: 16
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: main
  scenes:
    main:
      name: Scope Comparison Scene
      initialSectionId: section1
      sections:
        section1:
          name: Test Section
          lines:
            - id: line1
              actions:
                background:
                  resourceId: base1
                layout:
                  resourceId: scopeComparisonUI
