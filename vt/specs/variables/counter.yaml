---
title: Sample
---
l10n:
  packages:
    eklekfjwalefj:
      label: English
      lang: en
      keys: {}
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  variables:
    count:
      type: number
      scope: global-account
      default: 0
  images:
    dmni32:
      fileId: dmni32
      width: 1920
      height: 1080
  layouts:
    base1:
      elements:
        - id: af32
          type: rect
          fill: "#000000"
          width: 1920
          height: 1080
          click:
            actionPayload:
              actions:
                nextLine: {}
    j3i8dk32:
      name: Title Screen
      elements:
        - id: bg
          type: sprite
          imageId: dmni32
          width: 1920
          height: 1080
          x: 0
          y: 0
        - id: container
          type: container
          x: 400
          y: 400
          children:
            - id: zero
              type: text
              content: ${variables.count}
              x: 0
              y: 0
              textStyleId: textStyle1
            - id: plus
              type: text
              content: +
              x: 0
              y: -100
              hover:
                textStyleId: textStyle2
              click:
                actionPayload:
                  actions:
                    updateVariable:
                      id: uvIncrement
                      operations:
                        - variableId: count
                          op: increment
              textStyleId: textStyle1
            - id: minus
              type: text
              content: "-"
              x: 0
              y: 100
              hover:
                textStyleId: textStyle2
              click:
                actionPayload:
                  actions:
                    updateVariable:
                      id: uvDecrement
                      operations:
                        - variableId: count
                          op: decrement
              textStyleId: textStyle1
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: white
    color2:
      hex: yellow
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 48
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle2:
      fontId: fontDefault
      colorId: color2
      fontSize: 48
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: ajfl3a
  scenes:
    ajfl3a:
      name: Scene 1
      initialSectionId: l3kjfawelf
      sections:
        l3kjfawelf:
          name: Section 1
          lines:
            - id: line1
              actions:
                base:
                  resourceId: base1
                layout:
                  resourceId: j3i8dk32
