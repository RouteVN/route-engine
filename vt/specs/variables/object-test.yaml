---
title: Object Type Variables Test
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#4D4D4D"
resources:
  variables:
    player:
      type: object
      scope: context
      default:
        name: Alice
        level: 5
        health: 100
    inventory:
      type: object
      scope: context
      default:
        gold: 250
        items:
          - Sword
          - Shield
          - Potion
  controls:
    base1:
      elements:
        - id: clickArea
          type: rect
          width: 1920
          height: 1080
          click:
            payload:
              actions:
                nextLine: {}
          colorId: layoutColor1
  layouts:
    objectTestUI:
      name: Object Variable Test Screen
      elements:
        - id: title
          type: text
          content: Object Type Variables Test
          x: 960
          y: 50
          anchorX: 0.5
          textStyleId: textStyle1
        - id: test1Title
          type: text
          content: "1. Nested Object Properties:"
          x: 100
          y: 150
          textStyleId: textStyle2
        - id: playerName
          type: text
          content: "Player Name: ${variables.player.name} (Expected: Alice)"
          x: 100
          y: 200
          textStyleId: textStyle3
        - id: playerLevel
          type: text
          content: "Player Level: ${variables.player.level} (Expected: 5)"
          x: 100
          y: 240
          textStyleId: textStyle3
        - id: playerHealth
          type: text
          content: "Player Health: ${variables.player.health} (Expected: 100)"
          x: 100
          y: 280
          textStyleId: textStyle3
        - id: test2Title
          type: text
          content: "2. Object Containing Array:"
          x: 100
          y: 380
          textStyleId: textStyle2
        - id: inventoryGold
          type: text
          content: "Gold: ${variables.inventory.gold} (Expected: 250)"
          x: 100
          y: 430
          textStyleId: textStyle3
        - id: inventoryCount
          type: text
          content: "Item Count: ${variables.inventory.items.length} (Expected: 3)"
          x: 100
          y: 470
          textStyleId: textStyle3
        - id: test3Title
          type: text
          content: "3. Array Access:"
          x: 100
          y: 570
          textStyleId: textStyle2
        - id: item1
          type: text
          content: "First Item: ${variables.inventory.items.0} (Expected: Sword)"
          x: 100
          y: 620
          textStyleId: textStyle3
        - id: item2
          type: text
          content: "Second Item: ${variables.inventory.items.1} (Expected: Shield)"
          x: 100
          y: 660
          textStyleId: textStyle3
        - id: item3
          type: text
          content: "Third Item: ${variables.inventory.items.2} (Expected: Potion)"
          x: 100
          y: 700
          textStyleId: textStyle3
        - id: instructions
          type: text
          content:
            All nested values should display correctly • Numbers stay as numbers •
            Strings stay as strings • Arrays are accessible
          x: 960
          y: 950
          anchorX: 0.5
          textStyleId: textStyle4
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: "#D9D9D9"
    color2:
      hex: "#737373"
    color3:
      hex: "#A6A6A6"
    layoutColor1:
      hex: "#000000"
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 48
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle2:
      fontId: fontDefault
      colorId: color2
      fontSize: 32
      fontWeight: bold
      fontStyle: normal
      lineHeight: 1.2
    textStyle3:
      fontId: fontDefault
      colorId: color1
      fontSize: 28
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle4:
      fontId: fontDefault
      colorId: color3
      fontSize: 24
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: main
  scenes:
    main:
      name: Object Test Scene
      initialSectionId: section1
      sections:
        section1:
          name: Object Test Section
          lines:
            - id: line1
              actions:
                control:
                  resourceId: base1
                layout:
                  resourceId: objectTestUI
