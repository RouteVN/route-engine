screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  characters:
    narrator:
      name: Guide
  layouts:
    baseLayout:
      elements:
        - id: bg
          type: rect
          width: 1920
          height: 1080
          click:
            payload:
              actions:
                nextLine: {}
          colorId: bg
    toSectionA2Layout:
      elements:
        - id: bg
          type: rect
          width: 1920
          height: 1080
          click:
            payload:
              actions:
                sectionTransition:
                  sectionId: sectionA2
          colorId: bg
    toSectionB1Layout:
      elements:
        - id: bg
          type: rect
          width: 1920
          height: 1080
          click:
            payload:
              actions:
                sectionTransition:
                  sectionId: sectionB1
          colorId: bg
    toSectionB2Layout:
      elements:
        - id: bg
          type: rect
          width: 1920
          height: 1080
          click:
            payload:
              actions:
                sectionTransition:
                  sectionId: sectionB2
          colorId: bg
    dialogueLayout:
      mode: adv
      elements:
        - id: dialogue-box
          type: rect
          x: 100
          y: 760
          width: 1720
          height: 240
          colorId: panel
        - id: dialogue-text
          type: text
          x: 140
          y: 835
          width: 1460
          content: ${dialogue.content[0].text}
          textStyleId: textMain
        - id: rollback-button
          type: rect
          x: 100
          y: 680
          width: 320
          height: 60
          colorId: button
          click:
            payload:
              actions:
                rollbackByOffset:
                  offset: -1
        - id: rollback-label
          type: text
          x: 130
          y: 700
          content: "[BACK 1 LINE]"
          textStyleId: textButton
        - id: hint-label
          type: text
          x: 1820
          y: 70
          anchorX: 1
          content: "Click screen to advance"
          textStyleId: textHint
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    bg:
      hex: "#000000"
    panel:
      hex: "#4D4D4D"
    button:
      hex: "#737373"
    fg:
      hex: "#FFFFFF"
    fgMuted:
      hex: "#D9D9D9"
  textStyles:
    textMain:
      fontId: fontDefault
      colorId: fg
      fontSize: 30
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textButton:
      fontId: fontDefault
      colorId: fg
      fontSize: 26
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textHint:
      fontId: fontDefault
      colorId: fgMuted
      fontSize: 28
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
