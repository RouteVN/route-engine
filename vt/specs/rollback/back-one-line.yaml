---
title: Rollback Back One Line
description: A twenty-line rollback sandbox that crosses multiple sections and scenes while exposing only a single-step back action
specs:
  - covers twenty visible checkpoints in total
  - crosses four sections across two scenes
  - boundary lines enter the next section or scene on a normal screen click
  - uses only single-step rollback so you can back up one line at a time
