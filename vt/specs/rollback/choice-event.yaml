---
title: Rollback Choice Event
description: Choice click actions should stay attached to the source checkpoint through rollback
specs:
  - two branch choices are visible on the source line
  - a choice click updates score and transitions to another section
  - rollback returns to the source line instead of the result section
  - the source line keeps the branch score from the executed choice action
skipInitialScreenshot: true
viewport:
  id: capture
  width: 960
  height: 540
steps:
  - action: click
    x: 780
    y: 140
  - action: wait
    ms: 150
  - action: click
    x: 195
    y: 360
  - action: wait
    ms: 150
  - action: screenshot
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  variables:
    score:
      type: number
      scope: context
      default: 0
  characters:
    narrator:
      name: Guide
  layouts:
    baseLayout:
      elements:
        - id: bg
          type: rect
          width: 1920
          height: 1080
          colorId: bg
    dialogueLayout:
      mode: adv
      elements:
        - id: dialogue-box
          type: rect
          x: 100
          y: 760
          width: 1720
          height: 240
          colorId: panel
        - id: dialogue-text
          type: text
          x: 140
          y: 835
          width: 1200
          content: ${dialogue.content[0].text}
          textStyleId: textMain
        - id: score-display
          type: text
          x: 1780
          y: 70
          anchorX: 1
          content: "Score: ${variables.score}"
          textStyleId: textScore
        - id: rollback-button
          type: rect
          x: 100
          y: 680
          width: 320
          height: 60
          colorId: button
          click:
            payload:
              actions:
                rollbackByOffset:
                  offset: -1
        - id: rollback-label
          type: text
          x: 130
          y: 700
          content: "[ROLLBACK]"
          textStyleId: textButton
    choiceLayout:
      elements:
        - id: choice-a-button
          type: rect
          x: 260
          y: 220
          width: 1400
          height: 80
          colorId: button
          click:
            payload:
              actions:
                updateVariable:
                  id: chooseA15
                  operations:
                    - variableId: score
                      op: set
                      value: 15
                sectionTransition:
                  sectionId: result
        - id: choice-a-label
          type: text
          x: 320
          y: 245
          content: "Choose A"
          textStyleId: textMain
        - id: choice-b-button
          type: rect
          x: 260
          y: 330
          width: 1400
          height: 80
          colorId: button
          click:
            payload:
              actions:
                updateVariable:
                  id: chooseB5
                  operations:
                    - variableId: score
                      op: set
                      value: 5
                sectionTransition:
                  sectionId: resultB
        - id: choice-b-label
          type: text
          x: 320
          y: 355
          content: "Choose B"
          textStyleId: textMain
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    bg:
      hex: "#000000"
    panel:
      hex: "#4D4D4D"
    button:
      hex: "#737373"
    fg:
      hex: "#FFFFFF"
    fgMuted:
      hex: "#D9D9D9"
  textStyles:
    textMain:
      fontId: fontDefault
      colorId: fg
      fontSize: 30
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textScore:
      fontId: fontDefault
      colorId: fgMuted
      fontSize: 32
      fontWeight: bold
      fontStyle: normal
      lineHeight: 1.2
    textButton:
      fontId: fontDefault
      colorId: fg
      fontSize: 28
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: main
  scenes:
    main:
      initialSectionId: source
      sections:
        source:
          lines:
            - id: line1
              actions:
                background:
                  resourceId: baseLayout
                dialogue:
                  mode: adv
                  ui:
                    resourceId: dialogueLayout
                  content:
                    - text: "Source line. Score should stay at 15 after rollback."
                  characterId: narrator
                choice:
                  resourceId: choiceLayout
                  items:
                    - id: a
                      content: Choose A
                    - id: b
                      content: Choose B
        result:
          lines:
            - id: line1
              actions:
                choice: {}
                dialogue:
                  mode: adv
                  ui:
                    resourceId: dialogueLayout
                  content:
                    - text: "Result line after the choice click."
                  characterId: narrator
        resultB:
          lines:
            - id: line1
              actions:
                choice: {}
                dialogue:
                  mode: adv
                  ui:
                    resourceId: dialogueLayout
                  content:
                    - text: "Result line after choice B."
                  characterId: narrator
