---
title: Rollback To Line
description: Direct rollbackToLine should restore the source line and reset context score
specs:
  - advances through score-changing lines
  - uses rollbackToLine to return to the first line
  - restores score and dialogue content for the target line
skipInitialScreenshot: true
viewport:
  id: capture
  width: 960
  height: 540
steps:
  - action: click
    x: 480
    y: 270
  - action: click
    x: 480
    y: 270
  - action: click
    x: 480
    y: 270
  - action: wait
    ms: 120
  - action: click
    x: 200
    y: 360
  - action: wait
    ms: 150
  - action: screenshot
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  variables:
    score:
      type: number
      scope: context
      default: 0
  characters:
    narrator:
      name: Guide
  layouts:
    baseLayout:
      elements:
        - id: bg
          type: rect
          width: 1920
          height: 1080
          click:
            payload:
              actions:
                nextLine: {}
          colorId: bg
    dialogueLayout:
      mode: adv
      elements:
        - id: dialogue-box
          type: rect
          x: 100
          y: 760
          width: 1720
          height: 240
          colorId: panel
        - id: dialogue-text
          type: text
          x: 140
          y: 835
          width: 1400
          content: ${dialogue.content[0].text}
          textStyleId: textMain
        - id: score-display
          type: text
          x: 1780
          y: 70
          anchorX: 1
          content: "Score: ${variables.score}"
          textStyleId: textScore
        - id: rollback-button
          type: rect
          x: 100
          y: 680
          width: 320
          height: 60
          colorId: button
          click:
            payload:
              actions:
                rollbackToLine:
                  sectionId: story
                  lineId: line1
        - id: rollback-label
          type: text
          x: 130
          y: 700
          content: "[BACK TO LINE 1]"
          textStyleId: textButton
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    bg:
      hex: "#000000"
    panel:
      hex: "#4D4D4D"
    button:
      hex: "#737373"
    fg:
      hex: "#FFFFFF"
    fgMuted:
      hex: "#D9D9D9"
  textStyles:
    textMain:
      fontId: fontDefault
      colorId: fg
      fontSize: 30
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textScore:
      fontId: fontDefault
      colorId: fgMuted
      fontSize: 32
      fontWeight: bold
      fontStyle: normal
      lineHeight: 1.2
    textButton:
      fontId: fontDefault
      colorId: fg
      fontSize: 26
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: main
  scenes:
    main:
      initialSectionId: story
      sections:
        story:
          lines:
            - id: line1
              actions:
                background:
                  resourceId: baseLayout
                dialogue:
                  mode: adv
                  ui:
                    resourceId: dialogueLayout
                  content:
                    - text: "Line 1. After rollback, score should be back at 0."
                  characterId: narrator
            - id: line2
              actions:
                dialogue:
                  content:
                    - text: "Line 2. Score is still 0."
                  characterId: narrator
            - id: line3
              actions:
                updateVariable:
                  id: add10
                  operations:
                    - variableId: score
                      op: increment
                      value: 10
                dialogue:
                  content:
                    - text: "Line 3. Score increased to 10."
                  characterId: narrator
            - id: line4
              actions:
                updateVariable:
                  id: add20
                  operations:
                    - variableId: score
                      op: increment
                      value: 20
                dialogue:
                  content:
                    - text: "Line 4. Score is now 30. Use rollback."
                  characterId: narrator
