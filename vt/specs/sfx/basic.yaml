---
title: Sample
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  sounds:
    dk392:
      fileId: xj323
    93k22:
      fileId: 39csl
  layouts:
    base1:
      elements:
        - id: af32
          type: rect
          width: 1920
          height: 1080
          click:
            actionPayload:
              actions:
                nextLine: {}
          colorId: layoutColor1
    storyScreenLayout:
      name: Story Screen Background
      elements:
        - id: story-screen-bg
          type: rect
          x: 0
          y: 0
          width: 1920
          height: 1080
          clickEventName: system
          clickEventPayload:
            actions:
              nextLine: {}
          colorId: layoutColor1
    fi3l:
      name: Dialogue Screen
      mode: adv
      elements:
        - id: dialogue-container
          type: container
          x: 100
          y: 100
          children:
            - id: dialogue-text
              type: text
              y: 100
              content: ${dialogue.content[0].text}
              textStyleId: textStyle1
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: "#FFFFFF"
    layoutColor1:
      hex: "#000000"
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 24
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: ajfl3a
  scenes:
    ajfl3a:
      name: Scene 1
      initialSectionId: l3kjfawelf
      sections:
        l3kjfawelf:
          name: Section 1
          lines:
            - id: line0
              actions:
                base:
                  resourceId: base1
                dialogue:
                  ui:
                    resourceId: fi3l
                  mode: adv
                  content:
                    - text: Click to play sfx
            - id: line1
              actions:
                sfx:
                  items:
                    - id: sfx-1
                      resourceId: dk392
                dialogue:
                  ui:
                    resourceId: fi3l
                  mode: adv
                  content:
                    - text: Playing multiple SFX sounds
            - id: line2
              actions:
                sfx:
                  items:
                    - id: sfx-2
                      resourceId: 93k22
                dialogue:
                  ui:
                    resourceId: fi3l
                  mode: adv
                  content:
                    - text: Playing single SFX sound
            - id: line3
              actions:
                dialogue:
                  ui:
                    resourceId: fi3l
                  mode: adv
                  content:
                    - text: No SFX playing
