---
title: Sound Volume Test
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  variables:
    _soundVolume:
      type: number
      scope: global-device
      default: 500
    _muteAll:
      type: boolean
      scope: global-device
      default: false
  layouts:
    main:
      elements:
        - id: title
          type: text
          x: 960
          y: 100
          anchorX: 0.5
          content: "Sound Volume: ${variables._soundVolume}"
          textStyleId: textStyle1
        - id: vol-250
          type: text
          x: 400
          y: 300
          content: "250"
          click:
            soundSrc: xj323
            soundVolume: 250
          textStyleId: textStyle2
        - id: vol-500
          type: text
          x: 700
          y: 300
          content: "500"
          click:
            soundSrc: xj323
            soundVolume: 500
          textStyleId: textStyle2
        - id: vol-750
          type: text
          x: 1000
          y: 300
          content: "750"
          click:
            soundSrc: xj323
            soundVolume: 750
          textStyleId: textStyle2
        - id: vol-1000
          type: text
          x: 1300
          y: 300
          content: "1000"
          click:
            soundSrc: xj323
            soundVolume: 1000
          textStyleId: textStyle2
        - id: play-dynamic
          type: text
          x: 960
          y: 500
          anchorX: 0.5
          content: Play at _soundVolume
          click:
            soundSrc: xj323
            soundVolume: ${effectiveSoundVolume}
          textStyleId: textStyle3
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: "#FFFFFF"
    color2:
      hex: "#D9D9D9"
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 48
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle2:
      fontId: fontDefault
      colorId: color1
      fontSize: 32
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle3:
      fontId: fontDefault
      colorId: color2
      fontSize: 36
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: main
  scenes:
    main:
      name: Main
      initialSectionId: main
      sections:
        main:
          name: Main
          lines:
            - id: start
              actions:
                layout:
                  resourceId: main
