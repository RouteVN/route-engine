            soundVolume: 25
          textStyleId: textStyle2
        - id: vol-50
          type: text
          x: 700
          y: 300
          content: "50"
          click:
            soundSrc: xj323
            soundVolume: 50
          textStyleId: textStyle2
        - id: vol-75
          type: text
          x: 1000
          y: 300
          content: "75"
          click:
            soundSrc: xj323
            soundVolume: 75
          textStyleId: textStyle2
        - id: vol-100
          type: text
          x: 1300
          y: 300
          content: "100"
          click:
            soundSrc: xj323
            soundVolume: 100
          textStyleId: textStyle2
        - id: play-dynamic
          type: text
          x: 960
          y: 500
          anchorX: 0.5
          content: Play at runtime.soundVolume
          click:
            soundSrc: xj323
            soundVolume: ${runtime.soundVolume}
