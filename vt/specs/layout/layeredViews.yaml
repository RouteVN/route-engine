---
title: Layered Views Test
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  layouts:
    baseLayout:
      elements:
        - id: bg
          type: rect
          width: 1920
          height: 1080
          colorId: layoutColor1
        - id: title
          type: text
          content: Layered Views Test
          x: 700
          y: 100
          textStyleId: textStyle1
        - id: pushMenuBtn
          type: rect
          width: 300
          height: 60
          x: 100
          y: 300
          click:
            actionPayload:
              actions:
                pushLayeredView:
                  resourceId: menuLayout
                  resourceType: layout
          colorId: color2
        - id: pushMenuText
          type: text
          content: Push Menu Layer
          x: 140
          y: 325
          textStyleId: textStyle2
        - id: pushOverlayBtn
          type: rect
          width: 300
          height: 60
          x: 100
          y: 400
          click:
            actionPayload:
              actions:
                pushLayeredView:
                  resourceId: overlayLayout
                  resourceType: layout
          colorId: color2
        - id: pushOverlayText
          type: text
          content: Push Overlay Layer
          x: 115
          y: 425
          textStyleId: textStyle2
        - id: popBtn
          type: rect
          width: 300
          height: 60
          x: 100
          y: 500
          click:
            actionPayload:
              actions:
                popLayeredView: {}
          colorId: color2
        - id: popText
          type: text
          content: Pop Layer
          x: 180
          y: 525
          textStyleId: textStyle2
        - id: replaceBtn
          type: rect
          width: 300
          height: 60
          x: 100
          y: 600
          click:
            actionPayload:
              actions:
                replaceLastLayeredView:
                  resourceId: animatedLayout
                  resourceType: layout
          colorId: color2
        - id: replaceText
          type: text
          content: Replace Last Layer
          x: 115
          y: 625
          textStyleId: textStyle2
        - id: clearBtn
          type: rect
          width: 300
          height: 60
          x: 100
          y: 700
          click:
            actionPayload:
              actions:
                clearLayeredViews: {}
          colorId: color2
        - id: clearText
          type: text
          content: Clear All Layers
          x: 135
          y: 725
          textStyleId: textStyle2
    menuLayout:
      elements:
        - id: menuBg
          type: rect
          width: 400
          height: 600
          x: 800
          y: 240
          colorId: layoutColor2
        - id: menuText
          type: text
          content: Menu Layer
          x: 900
          y: 300
          textStyleId: textStyle3
    overlayLayout:
      elements:
        - id: overlayBg
          type: rect
          width: 300
          height: 200
          x: 1300
          y: 440
          colorId: layoutColor2
        - id: overlayText
          type: text
          content: Overlay Layer
          x: 1340
          y: 520
          textStyleId: textStyle4
    animatedLayout:
      elements:
        - id: animatedBg
          type: rect
          width: 350
          height: 250
          x: 1250
          y: 650
          colorId: color2
        - id: animatedText
          type: text
          content: Replaced Layer
          x: 1290
          y: 760
          textStyleId: textStyle5
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: "#FFFFFF"
    color2:
      hex: "#737373"
    layoutColor1:
      hex: "#000000"
    layoutColor2:
      hex: "#4D4D4D"
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 48
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle2:
      fontId: fontDefault
      colorId: color1
      fontSize: 24
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle3:
      fontId: fontDefault
      colorId: color1
      fontSize: 32
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle4:
      fontId: fontDefault
      colorId: color2
      fontSize: 24
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle5:
      fontId: fontDefault
      colorId: color1
      fontSize: 28
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: testScene
  scenes:
    testScene:
      name: Test
      initialSectionId: section1
      sections:
        section1:
          name: Test Section
          lines:
            - id: line1
              actions:
                base:
                  resourceId: baseLayout
