---
title: Layout Animation
description: Test layout animation in and out
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  layouts:
    base1:
      elements:
        - id: af32
          type: rect
          width: 1920
          height: 1080
          click:
            payload:
              actions:
                nextLine: {}
          colorId: layoutColor1
    menuLayout:
      name: Menu Layout
      elements:
        - id: menu-container
          type: container
          x: 400
          y: 300
          children:
            - id: menu-bg
              type: rect
              width: 400
              height: 400
              opacity: 0.9
              colorId: layoutColor2
            - id: menu-title
              type: text
              content: Menu
              x: 150
              y: 40
              textStyleId: textStyle1
            - id: menu-item-1
              type: text
              content: Option 1
              x: 40
              y: 120
              textStyleId: textStyle2
            - id: menu-item-2
              type: text
              content: Option 2
              x: 40
              y: 180
              textStyleId: textStyle2
  animations:
    fadeIn:
      name: Fade In
      type: update
      tween:
        alpha:
          initialValue: 0
          keyframes:
            - duration: 400
              value: 1
              easing: easeOutQuad
    fadeOut:
      name: Fade Out
      type: update
      tween:
        alpha:
          keyframes:
            - duration: 400
              value: 0
              easing: easeInQuad
    scaleIn:
      name: Scale In
      type: update
      tween:
        scaleX:
          initialValue: 0.8
          keyframes:
            - duration: 300
              value: 1
              easing: easeOutQuad
        scaleY:
          initialValue: 0.8
          keyframes:
            - duration: 300
              value: 1
              easing: easeOutQuad
        alpha:
          initialValue: 0
          keyframes:
            - duration: 300
              value: 1
              easing: easeOutQuad
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: "#FFFFFF"
    layoutColor1:
      hex: "#000000"
    layoutColor2:
      hex: "#323250"
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 36
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    textStyle2:
      fontId: fontDefault
      colorId: color1
      fontSize: 24
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: scene1
  scenes:
    scene1:
      name: Scene 1
      initialSectionId: section1
      sections:
        section1:
          name: Section 1
          lines:
            - id: line1
              actions:
                background:
                  resourceId: base1
            - id: line2
              actions:
                layout:
                  resourceId: menuLayout
                  animations:
                    in:
                      resourceId: scaleIn
            - id: line3
              actions:
                layout:
                  resourceId: menuLayout
            - id: line4
              actions:
                layout:
                  animations:
                    out:
                      resourceId: fadeOut
