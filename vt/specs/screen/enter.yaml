---
title: Screen Enter Transition
description: First-line whole-screen transition fades the composed story frame in from black.
specs:
  - screen animations on the initial line should run as a story-container enter transition
  - the halfway screenshot should show the whole composed screen partially visible
  - the final screenshot should show the settled composed screen
steps:
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 500
  - action: screenshot
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 500
  - action: screenshot
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  images:
    bg-forest:
      fileId: dmni32
      width: 1920
      height: 1080
    character-a:
      fileId: char_sprite_1
      width: 512
      height: 1024
  transforms:
    character-center:
      x: 960
      y: 1080
      anchorX: 0.5
      anchorY: 1
      rotation: 0
      scaleX: 1
      scaleY: 1
  animations:
    screen-fade-in:
      name: Screen Fade In
      type: transition
      next:
        tween:
          alpha:
            initialValue: 0
            keyframes:
              - duration: 1000
                value: 1
                easing: linear
story:
  initialSceneId: scene1
  scenes:
    scene1:
      name: Scene 1
      initialSectionId: main
      sections:
        main:
          name: Main
          lines:
            - id: initial-frame
              actions:
                screen:
                  animations:
                    resourceId: screen-fade-in
                background:
                  resourceId: bg-forest
                character:
                  items:
                    - id: lead
                      transformId: character-center
                      sprites:
                        - id: body
                          resourceId: character-a
