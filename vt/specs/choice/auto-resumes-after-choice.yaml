---
title: Choice Pauses Active Auto
description: Auto mode should stay enabled while a choice is visible, pause advancement until a choice is clicked, and resume after the choice.
specs:
  - auto mode advances from the first line to the choice line
  - waiting longer than the auto delay does not advance past the visible choice
  - clicking the choice keeps auto mode enabled
  - auto mode advances from the post-choice line to the following line
skipInitialScreenshot: true
viewport:
  id: capture
  width: 1280
  height: 720
steps:
  - action: wait
    ms: 1300
  - action: screenshot
  - action: wait
    ms: 500
  - action: screenshot
  - action: click
    x: 790
    y: 220
  - action: wait
    ms: 60
  - action: screenshot
  - action: wait
    ms: 450
  - action: screenshot
---
screen:
  width: 1280
  height: 720
resources:
  controls:
    guardControls:
      elements:
        - id: bg-hit
          type: rect
          x: 0
          y: 0
          width: 1280
          height: 720
          colorId: backgroundColor
        - id: auto-status-on
          $when: runtime.autoMode
          type: text
          x: 300
          y: 56
          content: "AUTO: ON"
          textStyleId: statusText
        - id: auto-status-off
          $when: "!runtime.autoMode"
          type: text
          x: 300
          y: 56
          content: "AUTO: OFF"
          textStyleId: statusText
        - id: choice-status-on
          $when: isChoiceVisible
          type: text
          x: 300
          y: 102
          content: "CHOICE: ON"
          textStyleId: statusText
        - id: choice-status-off
          $when: "!isChoiceVisible"
          type: text
          x: 300
          y: 102
          content: "CHOICE: OFF"
          textStyleId: statusText
  layouts:
    dialogueLayout:
      mode: adv
      elements:
        - id: dialogue-box
          type: rect
          x: 40
          y: 520
          width: 1200
          height: 150
          colorId: dialogueColor
        - id: dialogue-text
          type: text
          x: 72
          y: 566
          width: 1140
          content: ${dialogue.content[0].text}
          textStyleId: dialogueText
    choiceLayout:
      elements:
        - id: choice-button-bg
          type: rect
          x: 680
          y: 180
          width: 520
          height: 84
          click:
            payload:
              actions:
                nextLine: {}
          colorId: choiceColor
        - id: choice-button-text
          type: text
          x: 720
          y: 208
          content: ${choice.items[0].content}
          textStyleId: statusText
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    textColor:
      hex: "#F4F1E8"
    backgroundColor:
      hex: "#171717"
    dialogueColor:
      hex: "#2A2A2A"
    choiceColor:
      hex: "#5F7A8A"
  textStyles:
    statusText:
      fontId: fontDefault
      colorId: textColor
      fontSize: 28
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    dialogueText:
      fontId: fontDefault
      colorId: textColor
      fontSize: 30
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.25
story:
  initialSceneId: choiceGuards
  scenes:
    choiceGuards:
      initialSectionId: main
      sections:
        main:
          lines:
            - id: line1
              actions:
                setAutoForwardDelay:
                  value: 350
                startAutoMode: {}
                control:
                  resourceId: guardControls
                dialogue:
                  mode: adv
                  ui:
                    resourceId: dialogueLayout
                  content:
                    - text: "Line 1: auto mode is on and should advance to the choice."
            - id: line2
              actions:
                dialogue:
                  content:
                    - text: "Line 2: the choice is visible and auto must remain on without advancing."
                choice:
                  resourceId: choiceLayout
                  items:
                    - id: continue
                      content: Continue from choice
            - id: line3
              actions:
                choice: {}
                dialogue:
                  content:
                    - text: "Line 3: reached from the choice with auto still enabled."
            - id: line4
              actions:
                dialogue:
                  content:
                    - text: "Line 4: auto resumed after the choice click."
