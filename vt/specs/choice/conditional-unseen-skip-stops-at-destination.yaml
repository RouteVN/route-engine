---
title: Conditional Choice Enters Unseen Destination Before Stopping Skip
description: An authorized unmatched choice conditional enters the unseen destination once and stops skip there.
specs:
  - skip is enabled before the blocking choice is entered
  - the choice switches skip-unseen behavior off before its conditional runs
  - the unmatched conditional has no default branch
  - one click enters the unseen destination and turns skip off there
  - waiting does not advance to the sentinel or repeat the click mutation
skipInitialScreenshot: true
viewport:
  id: capture
  width: 1280
  height: 720
steps:
  - action: wait
    ms: 200
  - action: click
    x: 150
    y: 74
  - action: wait
    ms: 150
  - action: screenshot
  - action: click
    x: 790
    y: 220
  - action: wait
    ms: 100
  - action: screenshot
  - action: wait
    ms: 300
  - action: screenshot
---
screen:
  width: 1280
  height: 720
resources:
  controls:
    guardControls:
      elements:
        - id: bg-hit
          type: rect
          x: 0
          y: 0
          width: 1280
          height: 720
          click:
            payload:
              actions:
                nextLine: {}
          colorId: backgroundColor
        - id: skip-button
          type: rect
          x: 40
          y: 40
          width: 220
          height: 68
          click:
            payload:
              actions:
                toggleSkipMode: {}
                jumpToLine:
                  lineId: choiceLine
          colorId: choiceColor
        - id: skip-label
          type: text
          x: 100
          y: 62
          content: SKIP
          textStyleId: statusText
        - id: skip-status-on
          $when: runtime.skipMode
          type: text
          x: 300
          y: 56
          content: "SKIP: ON"
          textStyleId: statusText
        - id: skip-status-off
          $when: "!runtime.skipMode"
          type: text
          x: 300
          y: 56
          content: "SKIP: OFF"
          textStyleId: statusText
        - id: choice-status-on
          $when: isChoiceVisible
          type: text
          x: 300
          y: 102
          content: "CHOICE: ON"
          textStyleId: statusText
        - id: choice-status-off
          $when: "!isChoiceVisible"
          type: text
          x: 300
          y: 102
          content: "CHOICE: OFF"
          textStyleId: statusText
  layouts:
    dialogueLayout:
      mode: adv
      elements:
        - id: dialogue-box
          type: rect
          x: 40
          y: 520
          width: 1200
          height: 150
          colorId: dialogueColor
        - id: dialogue-text
          type: text
          x: 72
          y: 566
          width: 1140
          content: ${dialogue.content[0].text}
          textStyleId: dialogueText
    choiceLayout:
      elements:
        - id: choice-button-bg
          type: rect
          x: 680
          y: 180
          width: 520
          height: 84
          click:
            payload:
              actions:
                updateVariable:
                  id: countChoiceClick
                  operations:
                    - variableId: clickCount
                      op: increment
                      value: 1
                setSkipUnseenText:
                  value: false
                conditional:
                  branches:
                    - when: false
                      actions: {}
          colorId: choiceColor
        - id: choice-button-text
          type: text
          x: 720
          y: 208
          content: Enter unseen destination
          textStyleId: statusText
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    textColor:
      hex: "#F4F1E8"
    backgroundColor:
      hex: "#171717"
    dialogueColor:
      hex: "#2A2A2A"
    choiceColor:
      hex: "#9C6644"
  textStyles:
    statusText:
      fontId: fontDefault
      colorId: textColor
      fontSize: 28
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    dialogueText:
      fontId: fontDefault
      colorId: textColor
      fontSize: 30
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.25
  variables:
    clickCount:
      type: number
      scope: context
      default: 0
story:
  initialSceneId: unseenSkipChoice
  scenes:
    unseenSkipChoice:
      initialSectionId: main
      sections:
        main:
          lines:
            - id: source
              actions:
                setSkipUnseenText:
                  value: true
                control:
                  resourceId: guardControls
                dialogue:
                  mode: adv
                  ui:
                    resourceId: dialogueLayout
                  content:
                    - text: "Enable skip to enter the blocking choice."
            - id: choiceLine
              actions:
                dialogue:
                  content:
                    - text: "Skip is on and paused at this choice."
                choice:
                  resourceId: choiceLayout
                  items:
                    - id: continue
                      content: Continue
            - id: destination
              actions:
                choice: {}
                dialogue:
                  content:
                    - text: "Destination reached in ${variables.clickCount} click."
            - id: sentinel
              actions:
                dialogue:
                  content:
                    - text: "SENTINEL: skip advanced too far."
