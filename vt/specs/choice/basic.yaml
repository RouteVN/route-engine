---
title: Sample
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  images:
    3kda832:
      fileId: 3kda832
      width: 1920
      height: 1080
  layouts:
    base1:
      elements:
        - id: af32
          type: rect
          width: 1920
          height: 1080
          click:
            payload:
              actions:
                nextLine: {}
          colorId: layoutColor1
    fi3l:
      name: Choices
      elements:
        - id: 3943ar32jkd
          type: container
          x: 100
          y: 100
          gap: 80
          direction: vertical
          children:
            - $each: item, i in choice.items
              id: choice-item-${i}
              type: container
              x: 0
              y: 0
              height: 40
              children:
                - id: 23lksdf3
                  type: sprite
                  imageId: 3kda832
                  width: 400
                  height: 60
                  click:
                    payload:
                      actions:
                        sectionTransition: ${item.events.click.actions.sectionTransition}
                - id: 39dkk2
                  x: 40
                  y: 12
                  type: text
                  content: ${item.content}
                  textStyleId: textStyle1
    392fsadf:
      name: Dialogue Screen
      elements:
        - id: dialogue-container
          type: container
          x: 50
          y: 300
          children:
            - id: bfeawjk2g
              type: sprite
              imageId: 3kda832
              width: 1920
              height: 1080
              x: 0
              y: 0
            - id: dialogue-character-name
              type: text
              content: ${dialogue.character.name}
              x: 20
              y: 40
              textStyleId: textStyle1
            - id: dialogue-text
              type: text
              x: 20
              y: 100
              content: ${dialogue.content[0].text}
              textStyleId: textStyle1
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: "#FFFFFF"
    layoutColor1:
      hex: "#000000"
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 24
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: ajfl3a
  scenes:
    ajfl3a:
      name: Scene 1
      initialSectionId: l3kjfawelf
      sections:
        l3kjfawelf:
          name: Section 1
          lines:
            - id: line1
              actions:
                choice:
                  resourceId: fi3l
                  items:
                    - content: Choice 1 a
                      events:
                        click:
                          actions:
                            sectionTransition:
                              sectionId: fdakjf3aax
                    - content: Choice 2 b
                      events:
                        click:
                          actions:
                            sectionTransition:
                              sectionId: kdf903a
    3ijdfsa23:
      name: Scene 2
      initialSectionId: fdakjf3aax
      sections:
        fdakjf3aax:
          name: Section 1
          lines:
            - id: line1
              actions:
                base:
                  resourceId: base1
                dialogue:
                  mode: adv
                  ui:
                    resourceId: 392fsadf
                  content:
                    - text: Hello, this should be choice 1
            - id: line2
              actions:
                dialogue:
                  content:
                    - text: next line of choice 1
            - id: line3
              actions:
                sectionTransition:
                  sectionId: l3kjfawelf
    fd3j289df:
      name: Scene 3
      initialSectionId: kdf903a
      sections:
        kdf903a:
          name: Section 1
          lines:
            - id: line1
              actions:
                base:
                  resourceId: base1
                dialogue:
                  mode: adv
                  ui:
                    resourceId: 392fsadf
                  content:
                    - text: Hello, this should be choice 2
            - id: line2
              actions:
                dialogue:
                  content:
                    - text: Next line of choice 2
            - id: line3
              actions:
                sectionTransition:
                  sectionId: l3kjfawelf
