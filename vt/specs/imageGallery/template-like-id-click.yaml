---
title: Image Gallery Template-Like ID Click
description: A loop-rendered gallery action preserves literal template-like group and variant IDs through a Route Graphics click.
specs:
  - normal YAML loop syntax renders the current gallery page
  - clicking the loop-rendered item selects the literal IDs instead of the competing variable target
skipInitialScreenshot: true
viewport:
  id: capture
  width: 960
  height: 540
steps:
  - action: wait
    ms: 150
  - action: screenshot
  - action: click
    x: 480
    y: 250
  - action: wait
    ms: 150
  - action: screenshot
---
screen:
  width: 1920
  height: 1080
resources:
  variables:
    redirect:
      type: string
      scope: context
      default: wrong-target
  images:
    "${variables.redirect}":
      fileId: la3lka
      width: 100
      height: 100
  imageGallery:
    pageSize: 1
    groups:
      - id: "${variables.redirect}"
        variants:
          - id: "${variables.redirect}"
            imageId: "${variables.redirect}"
      - id: wrong-target
        variants:
          - id: wrong-target
            imageId: "${variables.redirect}"
  layouts:
    gallery:
      elements:
        - id: background
          type: rect
          width: 1920
          height: 1080
          colorId: background
        - id: title
          type: text
          content: Gallery
          x: 960
          y: 190
          anchorX: 0.5
          textStyleId: title
        - id: gallery-items
          type: container
          children:
            - $for group in imageGallery.pageGroups:
                - $for variant in group.variants:
                    - id: gallery-${group.groupId}-${variant.variantId}
                      type: rect
                      x: 560
                      y: 420
                      width: 800
                      height: 160
                      colorId: button
                      click:
                        payload:
                          actions:
                            showImageGalleryVariant:
                              groupId: "${group.groupId}"
                              variantId: "${variant.variantId}"
        - id: open-label
          $when: "!imageGallery.selection"
          type: text
          content: Open literal gallery item
          x: 960
          y: 465
          anchorX: 0.5
          textStyleId: body
        - id: selected-label
          $when: imageGallery.selection
          type: text
          content: "Selected: ${imageGallery.selection.groupId}"
          x: 960
          y: 465
          anchorX: 0.5
          textStyleId: body
        - id: page-label
          type: text
          content: "Page: ${imageGallery.pagination.pageIndex}"
          x: 960
          y: 650
          anchorX: 0.5
          textStyleId: muted
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    background:
      hex: "#000000"
    button:
      hex: "#4D4D4D"
    foreground:
      hex: "#FFFFFF"
    foregroundMuted:
      hex: "#A6A6A6"
  textStyles:
    title:
      fontId: fontDefault
      colorId: foreground
      fontSize: 56
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    body:
      fontId: fontDefault
      colorId: foreground
      fontSize: 38
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
    muted:
      fontId: fontDefault
      colorId: foregroundMuted
      fontSize: 30
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: galleryScene
  scenes:
    galleryScene:
      initialSectionId: main
      sections:
        main:
          lines:
            - id: gallery
              actions:
                addViewedResource:
                  resourceId: '\${variables.redirect}'
                layout:
                  resourceId: gallery
