---
title: Keyboard Navigation
description: Test basic keyboard controls. Enter = nextLine, Space = toggleDialogueUI.
---
screen:
  width: 1920
  height: 1080
  backgroundColor: "#000000"
resources:
  controls:
    gameplay:
      keyboard:
        Enter:
          actions:
            nextLine: {}
        space:
          actions:
            toggleDialogueUI: {}
      elements:
        - id: keyboard-hint
          type: text
          x: 1450
          y: 40
          content: "ENTER / SPACE"
          textStyleId: textStyle1
  layouts:
    baseLayout:
      elements:
        - id: bg
          type: rect
          width: 1920
          height: 1080
          colorId: layoutColor1
    dialogueLayout:
      name: Dialogue Screen
      mode: adv
      elements:
        - id: dialogue-box
          type: rect
          x: 100
          y: 800
          width: 1720
          height: 200
          colorId: layoutColor2
        - id: dialogue-text
          type: text
          x: 150
          y: 850
          content: ${dialogue.content[0].text}
          textStyleId: textStyle1
  fonts:
    fontDefault:
      fileId: Arial
  colors:
    color1:
      hex: "#FFFFFF"
    layoutColor1:
      hex: "#000000"
    layoutColor2:
      hex: "#4D4D4D"
  textStyles:
    textStyle1:
      fontId: fontDefault
      colorId: color1
      fontSize: 32
      fontWeight: "400"
      fontStyle: normal
      lineHeight: 1.2
story:
  initialSceneId: main
  scenes:
    main:
      initialSectionId: start
      sections:
        start:
          lines:
            - id: line1
              actions:
                base:
                  resourceId: baseLayout
                control:
                  resourceId: gameplay
                dialogue:
                  ui:
                    resourceId: dialogueLayout
                  mode: adv
                  content:
                    - text: Press ENTER to advance to the next line.
            - id: line2
              actions:
                dialogue:
                  content:
                    - text: Press SPACE to hide and show this dialogue box.
            - id: line3
              actions:
                dialogue:
                  content:
                    - text: Good job! The test is complete.
